# Workflow TẠM THỜI: xóa mọi nhánh trừ main. Tự chạy khi chính file này được push
# lên main (môi trường hiện tại không dispatch tay được). Sẽ gỡ ngay sau khi chạy.
name: cleanup-branches
on:
  push:
    branches: [main]
    paths: ['.github/workflows/cleanup-branches.yml']
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete all branches except main
        run: |
          for b in $(git ls-remote --heads origin | awk '{print $2}' | sed 's|refs/heads/||' | grep -vx 'main'); do
            echo "deleting: $b"
            git push origin --delete "$b" || echo "FAILED: $b"
          done
