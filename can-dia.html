<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cân Đĩa</title>
<style>
/* ============================================================
   CÂN ĐĨA THƯỞNG PHẠT — không chữ, cho trẻ nhỏ
   • Đĩa PHẢI 🙂 (việc tốt) / TRÁI 🙁 (việc chưa ngoan)
   • Ô đơn = 1 emoji (nặng 1), ô đôi = 2 emoji (nặng 2), các ô CHẠM nhau
   • Kim chỉ |hiệu trọng lượng| 0..20 hai bên; đòn nghiêng về đĩa nặng
   • Vòng số là MỘT PHẦN của cân (mặt số bán nguyệt gắn ở trục)
   • Realtime Database Firebase /candia (giống dong-ho.html), fallback localStorage
   ------------------------------------------------------------
   BẢNG MÀU (Color Hunt d35d6e-efb08c-f8d49d-5aa469) — solid, KHÔNG gradient/shadow/border/before/after:
     --bg #FBF6EC trắng-ấm · --wood/accent #EFB08C peach · --disc #F8D49D vàng-kem
     --good #5AA469 xanh lá (PHẢI) · --bad #D35D6E đỏ rose (TRÁI)
   ============================================================ */
:root{
  --bg:#FBF6EC;             /* NỀN trắng-ấm nhạt (palette ko có màu nền -> dẫn xuất để 4 màu nổi) */
  --wood:#EFB08C;           /* khung sơn peach (đòn/trụ/đế) — Color Hunt */
  --disc:#F8D49D;           /* mặt số vàng-kem — Color Hunt */
  --good:#5AA469;           /* phe tốt — xanh lá (PHẢI) — Color Hunt */
  --bad:#D35D6E;            /* phe chưa ngoan — đỏ rose (TRÁI) — Color Hunt */
  --accent:#EFB08C;         /* peach — nút reset (cùng tông khung gỗ) */
  --radius:8px;             /* BO GÓC DUY NHẤT cho mọi hình chữ nhật (tròn 50% chỉ cho nút tròn) */

  /* hình học cân (px) — JS đọc lại qua getComputedStyle */
  --cx:207px;
  /* MẶT SỐ + KIM + ĐÒN CÙNG 1 TÂM: disc-cy == pivot */
  --pivot:130px;          /* HẠ THẤP đòn/đĩa -> trụ NGẮN lại, chừa khoảng trống TRÊN để chồng 20 ô */
  --disc-cy:130px;        /* = --pivot (đĩa mặt số tròn bao quanh trục) */
  --disc-r:74px;          /* đĩa mặt số TO hơn -> vạch giãn ra, rõ hơn */
  --arm:145px;            /* nửa đòn cân DÀI hơn (đĩa to không chạm đĩa cân) */
  --dial-r:72px;          /* bán kính đặt vạch (từ tâm chung) */
  --needle-len:52px;      /* dài kim — < r59 (vạch trong) -> KHÔNG đè vạch */
  --string-len:100px;     /* dài dây treo (TĂNG — pan hạ thấp, thêm chỗ xếp ô dưới đòn) */
  --plate-rad:44px;       /* nửa miệng đĩa cân (vừa 4 ô = 4*26) */
  --base-top:280px;
  --unit:26px;            /* ô đĩa = 26 ; *1.4(scale) = 36 = ĐÚNG ô vuông ở list */
  --box-h:26px;
  --max-beam:9;           /* nghiêng đòn tối đa (deg) */
  --max-deg:70;           /* góc kim tối đa (deg) */
  --s:1.4;                /* HỆ SỐ phóng to cả khu cân (to lại cho dễ nhìn vạch) */
}
*{margin:0;padding:0;box-sizing:border-box;border:0;}   /* border:0 -> KHÔNG còn viền ở đâu (kể cả button/input native) */
button,input{outline:none;background:none;}              /* bỏ chrome mặc định + focus-ring của control */
html,body{height:100%;}
body{
  min-height:100dvh;background:var(--bg);color:var(--wood);
  font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
/* lúc TẢI TRANG: tắt mọi animation/transition (JS gỡ .preload sau khung hình đầu) */
.preload *{transition:none !important;animation:none !important;}

/* ===== BỐ CỤC: list TRÁI sát mép | cân | list PHẢI sát mép ===== */
.stage{
  min-height:100dvh;display:flex;align-items:center;justify-content:space-between;
  gap:6px;padding:0 8px;
}

/* ===== LIST SỰ VIỆC 2 BÊN ===== */
.panel{
  width:clamp(132px,17vw,210px);flex:0 0 auto;
  display:flex;flex-direction:column;gap:9px;
}
.event-list{list-style:none;display:flex;flex-direction:column;gap:11px;}
/* ROW = 1 DÒNG (không border, không xuống dòng): [emoji] = [ô-button] */
.event-row{position:relative;display:flex;align-items:center;justify-content:center;
  gap:8px;flex-wrap:nowrap;white-space:nowrap;min-height:38px;}
/* bề rộng CỐ ĐỊNH cho emoji + dấu = -> các ô THẲNG HÀNG DỌC giữa các row */
.ev{position:relative;font-size:1.5rem;line-height:1;width:36px;text-align:center;flex:0 0 auto;}   /* = bề rộng ô nhập -> ô THẲNG CỘT với list */
.eq{font-size:1.2rem;font-weight:700;width:16px;text-align:center;flex:0 0 auto;}
.panel.left  .eq{color:var(--bad);}       /* dấu = theo phe — TRÁI=rose */
.panel.right .eq{color:var(--good);}      /* PHẢI=mint */
/* list TRÁI căn trái, list PHẢI căn phải */
.panel.left  .event-row, .panel.left  .custom{justify-content:flex-start;}
.panel.right .event-row, .panel.right .custom{justify-content:flex-end;}
/* Ô = KHUNG vuông/chữ nhật (không nền màu), chứa 1 / 2 emoji. Dùng chung mọi nơi:
   - mặc định = ô trên đĩa (rộng = slot)
   - .mini = preview trong list & option · .big = trong popup */
.box{display:inline-flex;align-items:center;justify-content:center;box-sizing:border-box;
  border-radius:var(--radius);background:var(--disc);}   /* tile PHẲNG nền solid (không viền) */
.box.left{background:var(--bad);}              /* TRÁI = rose (chưa ngoan) */
.box.right{background:var(--good);}            /* PHẢI = mint (việc tốt) */
.box .f{line-height:1;}
/* .mini = nút bấm (ô vuông/chữ nhật) trong list & hàng custom */
.box.mini{position:relative;height:36px;cursor:pointer;user-select:none;transition:transform .12s ease;}
.box.mini.square{width:36px;} .box.mini.rect{width:64px;}
.box.mini .f{font-size:1.32rem;}
.box.mini:hover{transform:translateY(-3px) scale(1.04);}
.box.mini:active{transform:scale(.93);}
/* nút × xóa item — NGAY SÁT box (góc trên-ngoài của chính box) */
.row-del{
  position:absolute;top:-8px;display:none;z-index:3;
  width:18px;height:18px;border-radius:50%;cursor:pointer;
  background:var(--bad);color:var(--bg);font:700 12px/1 system-ui;align-items:center;justify-content:center;padding:0;
}
.panel.left  .row-del{left:-6px;}     /* emoji ở trái row -> × góc trái-ngoài */
.panel.right .row-del{right:-6px;}    /* emoji ở phải row -> × góc phải-ngoài */
.event-row:hover .row-del{display:flex;}

/* hàng custom = 1 DÒNG: [ô nhập] = [ô đơn][ô đôi] (mỗi ô là button) */
.custom{margin-top:6px;display:flex;flex-direction:row;align-items:center;justify-content:center;
  gap:8px;flex-wrap:nowrap;}
.emoji-input{
  width:36px;height:36px;border-radius:var(--radius);flex:0 0 auto;   /* VUÔNG, khớp ô đơn */
  background:rgba(248,212,157,.55);text-align:center;font-size:1.3rem;line-height:1;color:var(--wood);   /* gold (--disc) mờ */
}
/* ô nhập: nền rgba cố định, KHÔNG đổi theo focus (đã bỏ active css) */

/* ===== KHU CÂN ===== (cân + nút reset xếp DỌC; reset nằm trong luồng, ngay dưới cân) */
.scale-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;}
.scale{position:relative;width:414px;height:312px;   /* rộng hơn cho đĩa to + đòn dài */
  transform:scale(var(--s));transform-origin:center;
  margin:calc(156px * (var(--s) - 1)) calc(207px * (var(--s) - 1));}

/* ----- mặt số bán nguyệt = một phần của cân ----- */
/* mặt số = ĐĨA bán nguyệt gỗ phẳng (SVG, không số) — chỉ vạch khắc + kim vẽ đè lên */
.dial{position:absolute;left:0;top:0;width:414px;height:312px;overflow:visible;z-index:2;pointer-events:none;}

/* ----- kim (xoay tại TÂM ĐĨA; màu đặt bởi JS) ----- */
.needle{
  position:absolute;left:var(--cx);top:var(--disc-cy);
  width:11px;height:var(--needle-len);margin-left:-5.5px;margin-top:calc(-1 * var(--needle-len));
  transform-origin:50% 100%;z-index:6;background:var(--wood);
  clip-path:polygon(50% 0,100% 86%,50% 100%,0 86%);
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);
}
/* vít TRUNG TÂM (tâm chung) — KHÔNG border */
.hub{position:absolute;left:var(--cx);top:var(--pivot);width:10px;height:10px;
  margin-left:-5px;margin-top:-5px;border-radius:50%;z-index:8;
  background:var(--disc);}   /* chấm tròn nhỏ ở tâm đòn/kim — màu mặt số bán nguyệt (gold) */

/* ----- trụ gỗ phẳng (KHÔNG vân, KHÔNG border) ----- */
.post{position:absolute;left:var(--cx);top:var(--disc-cy);width:26px;margin-left:-13px;
  height:calc(var(--base-top) - var(--disc-cy));z-index:1;border-radius:0;   /* trục cân: KHÔNG bo góc */
  background:var(--disc);}   /* trục cân CÙNG MÀU mặt số bán nguyệt (gold) */

/* ----- đế gỗ: TẤM CHỮ NHẬT phẳng (KHÔNG vân, KHÔNG border, KHÔNG cạnh 3D) ----- */
.base{position:absolute;left:var(--cx);top:var(--base-top);transform:translateX(-50%);
  width:calc(2 * var(--disc-r));height:28px;z-index:2;border-radius:var(--radius);   /* dài = ĐƯỜNG KÍNH bán nguyệt (2*disc-r) */
  background:var(--wood);}   /* đế gỗ phẳng solid */

/* ----- đòn cân: TẤM gỗ phẳng (KHÔNG vân, KHÔNG border) ----- */
.beam{position:absolute;left:var(--cx);top:var(--pivot);width:calc(2 * var(--arm));height:15px;
  margin-left:calc(-1 * var(--arm));margin-top:-7.5px;border-radius:var(--radius);z-index:5;transform-origin:50% 50%;
  background:var(--wood);
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);}

/* ----- bộ treo: điểm tại đầu đòn, phản xoay để dây luôn thẳng ----- */
.hanger{position:absolute;top:50%;width:0;height:0;transform-origin:0 0;
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);}
.hanger.l{left:0;}
.hanger.r{left:100%;}
/* dây treo chữ V — vẽ TRÊN ô (z cao) nên ô không che dây; màu theo phe */
.chain{position:absolute;top:0;height:2.5px;transform-origin:left center;z-index:4;border-radius:var(--radius);}
.hanger.l .chain{background:rgba(211,93,110,.6);}   /* dây treo rose — rgba (mờ) */
.hanger.r .chain{background:rgba(90,164,105,.6);}   /* dây treo xanh lá — rgba */
/* ĐĨA CÂN = 1 ĐOẠN THẲNG solid (màu theo phe); ô đặt LÊN TRÊN */
.plate{position:absolute;left:50%;top:var(--string-len);transform:translateX(-50%);
  width:calc(2 * var(--plate-rad) + 26px);height:5px;border-radius:var(--radius);z-index:1;}
.hanger.l .plate{background:var(--bad);}
.hanger.r .plate{background:var(--good);}
/* ô xếp NẰM TRÊN đoạn thẳng (đáy ô = mặt thanh) */
.pan{position:absolute;left:50%;top:var(--string-len);transform:translateX(-50%);
  width:calc(4 * var(--unit));height:1px;z-index:2;}   /* 4 ô/hàng */
.box-slot{position:absolute;transition:left .4s cubic-bezier(.34,1.35,.6,1),bottom .4s cubic-bezier(.34,1.35,.6,1);}
.pan .box{position:relative;width:100%;height:var(--box-h);   /* ô trên đĩa CHẠM nhau (slot kề sát) */
  transition:transform .32s cubic-bezier(.3,1.4,.5,1),opacity .25s ease;}
.pan .box .f{font-size:.94rem;}   /* *1.4(scale) = 1.32rem = ĐÚNG emoji ô vuông ở list */
.pan .box.dropping{transform:translateY(-40px);opacity:.3;}   /* rơi NGẮN xuống đĩa */
/* emoji sự việc nhỏ — góc TRÊN-PHẢI mỗi ô (KHÔNG nền, chỉ emoji) */
.box-badge{position:absolute;top:-8px;right:-7px;z-index:6;font-size:.82rem;line-height:1;}
/* nút × xóa — góc TRÊN-TRÁI (tránh đè badge) */
.box-x{position:absolute;top:-9px;left:-9px;display:none;z-index:7;
  width:18px;height:18px;border-radius:50%;cursor:pointer;
  background:var(--bad);color:var(--bg);font:700 11px/1 system-ui;align-items:center;justify-content:center;padding:0;}
.pan .box:hover .box-x,.pan .box.show-x .box-x{display:flex;}

/* nút làm lại — núm gỗ, góc DƯỚI-PHẢI màn hình */
.reset{z-index:50;
  width:48px;height:48px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
  background:var(--accent);}   /* núm reset TRÒN — trong luồng, NGAY DƯỚI cân (không đè đế) */
.reset:active{transform:scale(.94);}
.reset svg{width:24px;height:24px;stroke:var(--disc);fill:none;stroke-width:2.6;stroke-linecap:round;}

/* ===== POPUP XÁC NHẬN (KHÔNG chữ) ===== */
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  padding:18px;}   /* KHÔNG overlay nền khi mở popup */
.modal.open{display:flex;}
.modal-card{background:var(--bg);border-radius:var(--radius);padding:22px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  animation:cardIn .26s cubic-bezier(.34,1.5,.5,1);}
@keyframes cardIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.preview{display:flex;align-items:center;justify-content:center;gap:10px;min-height:54px;}
.box.big{height:52px;position:relative;}   /* position:relative -> badge emoji góc neo vào ô */
.box.big.square{width:52px;} .box.big.rect{width:96px;}
.box.big .f{font-size:1.8rem;}
.box.big .box-badge{font-size:1.5rem;top:-12px;right:-10px;}   /* badge to hơn cho ô big (giống trên đĩa) */
.preview .del-mark{position:relative;}
.preview .del-mark .x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font:700 2.4rem/1 system-ui;color:var(--bad);}
.preview .del-mark.left .x{color:var(--good);}   /* xóa ô BAD (rose) -> ✕ XANH cho tương phản */
.preview .reset-ic{width:40px;height:40px;stroke:var(--bad);fill:none;stroke-width:2.6;stroke-linecap:round;}
.modal-btns{display:flex;gap:14px;}
.modal-btns button{width:52px;height:52px;border-radius:var(--radius);cursor:pointer;   /* = kích thước ô vuông (.box.big.square 52px) */
  font:700 1.6rem/1 system-ui;display:flex;align-items:center;justify-content:center;color:var(--bg);}
.btn-ok{background:var(--good);}
.btn-no{background:var(--bad);}

/* ===== MOBILE (≤860px): cân chiếm hàng TRÊN, 2 list thành 2 CỘT hàng dưới =====
   • --s do JS (fitScale) tính theo bề ngang màn hình -> cân luôn VỪA KHÍT, không tràn
   • align-content:flex-start -> 2 hàng không bị kéo giãn ra đầy màn hình */
@media (max-width:860px){
  .stage{flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:flex-start;align-content:flex-start;
    padding:10px 6px 24px;gap:8px 10px;}
  .scale-wrap{order:-1;width:100%;}               /* cân + nút reset chiếm TRỌN hàng trên -> 2 list bị đẩy xuống */
  .panel{flex:1 1 0;min-width:0;}                 /* 2 list chia ĐÔI hàng dưới (2 cột bằng nhau) */
}
</style>
</head>
<body class="preload">
  <div class="stage">
    <!-- ===== LIST VIỆC CHƯA NGOAN (TRÁI 🙁) ===== -->
    <aside class="panel left">
      <ul class="event-list" id="leftList"></ul>
      <div class="custom">
        <input class="emoji-input" id="leftEmoji" maxlength="4" inputmode="text" aria-label="emoji">
        <span class="eq">=</span>
        <span id="leftOpt1"></span>
        <span id="leftOpt2"></span>
      </div>
    </aside>

    <!-- ===== CÂN (+ nút reset dưới đáy) ===== -->
    <div class="scale-wrap">
      <div class="scale" id="scale">
      <svg class="dial" id="dial"></svg>
      <div class="needle" id="needle"></div>
      <div class="post"></div>
      <div class="base"></div>
      <div class="beam" id="beam">
        <div class="hanger l" id="hangerL">
          <div class="plate"></div>
          <div class="pan" id="panL"></div>
          <div class="chain ca"></div><div class="chain cb"></div>
        </div>
        <div class="hanger r" id="hangerR">
          <div class="plate"></div>
          <div class="pan" id="panR"></div>
          <div class="chain ca"></div><div class="chain cb"></div>
        </div>
      </div>
      <div class="hub"></div>
      </div><!-- /.scale -->
      <button class="reset" id="reset" aria-label="reset">
        <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 6"/><path d="M20 4v7h-7"/></svg>
      </button>
    </div><!-- /.scale-wrap -->

    <!-- ===== LIST VIỆC TỐT (PHẢI 🙂) ===== -->
    <aside class="panel right">
      <ul class="event-list" id="rightList"></ul>
      <div class="custom">
        <span id="rightOpt1"></span>
        <span id="rightOpt2"></span>
        <span class="eq">=</span>
        <input class="emoji-input" id="rightEmoji" maxlength="4" inputmode="text" aria-label="emoji">
      </div>
    </aside>
  </div>

  <!-- ===== POPUP XÁC NHẬN ===== -->
  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="preview" id="preview"></div>
      <div class="modal-btns">
        <button class="btn-no" id="btnNo">✕</button>
        <button class="btn-ok" id="btnOk">✓</button>
      </div>
    </div>
  </div>

<!-- Firebase compat — đồng bộ trạng thái cân qua Realtime Database (giống dong-ho.html).
     Không tải được SDK -> tự rớt về localStorage một máy. -->
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-database-compat.js"></script>
<script>
/* ===== 1. TIỆN ÍCH & HẰNG SỐ ===== */
const $ = id => document.getElementById(id);
const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const pxVar = n => parseFloat(css(n));

const ARM=pxVar('--arm'), DIAL_R=pxVar('--dial-r'), STRING_LEN=pxVar('--string-len'),
      PLATE_RAD=pxVar('--plate-rad'), UNIT=pxVar('--unit'), BOX_H=pxVar('--box-h'),
      MAX_BEAM=pxVar('--max-beam'), MAX_DEG=pxVar('--max-deg'),
      CX=pxVar('--cx'), PIVOT=pxVar('--pivot'),
      DISC_CY=pxVar('--disc-cy'), DISC_R=pxVar('--disc-r');   // tâm/bán kính ĐĨA mặt số tròn
const CAP_UNITS=4;   // 4 ô/hàng (giữ như cũ); chất đủ 20 ô = 5 tầng để đạt max
const FACE={left:'🙁', right:'🙂'};   // TRÁI = chưa ngoan, PHẢI = tốt
const weightOf = t => t==='rect' ? 2 : 1;
// deg đo từ 12 giờ, theo chiều kim -> [dx,dy] so với tâm
function polar(r,deg){ const a=(deg-90)*Math.PI/180; return [r*Math.cos(a), r*Math.sin(a)]; }

/* ===== 2. FIREBASE / STATE ===== */
let boxes=[], userItems=[];
let boxesRef=null, itemsRef=null;
const LS_BOXES='candiaBoxes', LS_ITEMS='candiaItems';

/* ⚠️ ĐỒNG BỘ ĐA THIẾT BỊ cần thêm RULE cho nhánh /candia trên Firebase Console
   (Realtime Database -> Rules), GỘP cùng rule /labels sẵn có:
       "candia": { ".read": true, ".write": true }
   Chưa thêm -> ghi bị permission_denied, app vẫn chạy LOCAL (localStorage). */
try{
  if(typeof firebase !== 'undefined'){
    firebase.initializeApp({
      apiKey: "AIzaSyCQnlQxrXyceuYHCNnyGIEAyU_KyBQUAXs",
      authDomain: "a2-1011-thoi-gian.firebaseapp.com",
      databaseURL: "https://a2-1011-thoi-gian-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "a2-1011-thoi-gian",
      storageBucket: "a2-1011-thoi-gian.firebasestorage.app",
      messagingSenderId: "1017684060626",
      appId: "1:1017684060626:web:636c64f4f049521074800b"
    });
    boxesRef = firebase.database().ref('candia/boxes');
    itemsRef = firebase.database().ref('candia/items');
  }
}catch(e){ boxesRef=itemsRef=null; }

const genId = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const sortByAt = a => a.sort((x,y)=>(x.at-y.at)||(x.id<y.id?-1:1));
const parseArr = v => sortByAt(Object.keys(v).map(id=>({id,side:v[id].side,type:v[id].type,
    event:String(v[id].event||''),at:+v[id].at}))
  .filter(b=>(b.side==='left'||b.side==='right') && b.event && isFinite(b.at)));

function loadCache(){
  try{ boxes=JSON.parse(localStorage.getItem(LS_BOXES))||[]; }catch(e){ boxes=[]; }
  try{ userItems=JSON.parse(localStorage.getItem(LS_ITEMS))||[]; }catch(e){ userItems=[]; }
  sortByAt(boxes); sortByAt(userItems);
}
const saveBoxes=()=>{ try{ localStorage.setItem(LS_BOXES,JSON.stringify(boxes)); }catch(e){} };
const saveItems=()=>{ try{ localStorage.setItem(LS_ITEMS,JSON.stringify(userItems)); }catch(e){} };

function startSync(){
  const onErr=()=>{};   // read-denied (chưa thêm rule) -> giữ cache local
  if(boxesRef) boxesRef.on('value', s=>{ const a=parseArr(s.val()||{});
    if(JSON.stringify(a)===JSON.stringify(boxes)) return; boxes=a; saveBoxes(); renderBoxes(); }, onErr);
  if(itemsRef) itemsRef.on('value', s=>{ const a=parseArr(s.val()||{});
    if(JSON.stringify(a)===JSON.stringify(userItems)) return; userItems=a; saveItems(); renderLists(); }, onErr);
}

/* ===== 3. DANH SÁCH SỰ VIỆC ===== */
// KHÔNG có mặc định — user tự thêm qua hàng custom; item đã thêm được LƯU (localStorage + Firebase /candia/items)
const itemsFor = side => userItems.filter(i=>i.side===side);

// Ô = khung vuông (1 emoji) / chữ nhật (2 emoji); viền theo phe. cls: 'mini'|'big'|'' (đĩa)
function boxHTML(side, type, cls){
  return `<span class="box ${cls} ${side} ${type==='rect'?'rect':'square'}">`+
    `<span class="f">${FACE[side]}</span>`.repeat(weightOf(type))+`</span>`;
}
function boxNode(side, type, cls){ const t=document.createElement('template'); t.innerHTML=boxHTML(side,type,cls); return t.content.firstChild; }
// 1 row = [emoji] = [ô-button]. CHỈ ô (vuông/chữ nhật) là button, không phải cả row.
function makeRow(it){
  const li=document.createElement('li'); li.className='event-row';
  const ev=document.createElement('span'); ev.className='ev'; ev.textContent=it.event;
  const eq=document.createElement('span'); eq.className='eq'; eq.textContent='=';
  const fc=boxNode(it.side, it.type, 'mini');
  fc.addEventListener('click', ()=>askAdd(it.side, it.type, it.event, false));
  // nút × xóa item — gắn vào EMOJI (không phải nút add/box)
  const del=document.createElement('button'); del.className='row-del'; del.textContent='×';
  del.addEventListener('click', e=>{ e.stopPropagation(); removeItem(it.id); });
  ev.appendChild(del);
  if(it.side==='left') li.append(ev, eq, fc); else li.append(fc, eq, ev);   // phải = gương
  return li;
}
function renderLists(){
  for(const side of ['left','right']){
    const ul = side==='left'?$('leftList'):$('rightList');
    ul.innerHTML='';
    for(const it of itemsFor(side)) ul.appendChild(makeRow(it));
  }
  // 2 ô-button custom (ô đơn / ô đôi) — click vào ô là ra popup (nhập emoji trước)
  for(const side of ['left','right']){
    const mk = type => { const b=boxNode(side,type,'mini'); b.addEventListener('click', ()=>{
      const ev=$(side+'Emoji').value.trim(); if(!ev){ $(side+'Emoji').focus(); return; }
      askAdd(side, type, ev, true); $(side+'Emoji').value='';
    }); return b; };
    // ô VUÔNG luôn SÁT dấu = (thẳng CỘT DỌC với ô trong list); ô đôi ra phía NGOÀI
    const inner=$(side+(side==='left'?'Opt1':'Opt2')), outer=$(side+(side==='left'?'Opt2':'Opt1'));
    inner.innerHTML=''; inner.appendChild(mk('square'));
    outer.innerHTML=''; outer.appendChild(mk('rect'));
  }
}
function addItem(side, type, event){
  // bỏ qua nếu đã có hệt trong list (tránh trùng)
  if(itemsFor(side).some(i=>i.event===event && i.type===type)) return;
  const it={id:genId('i'), side, type, event, at:Date.now()};
  if(itemsRef) itemsRef.child(it.id).set({side,type,event,at:it.at}).catch(()=>{});
  userItems.push(it); sortByAt(userItems); saveItems(); renderLists();
}
function removeItem(id){
  if(itemsRef) itemsRef.child(id).remove().catch(()=>{});
  userItems=userItems.filter(i=>i.id!==id); saveItems(); renderLists();
}

/* ===== 4. Ô TRÊN ĐĨA — xếp CHẠM nhau & rơi NGẮN ===== */
const boxEls=new Map();   // id -> .box-slot
let animateDrops=false;   // lúc TẢI: false -> ô hiện luôn (không rơi); sau init -> true
function buildBox(b){
  const slot=document.createElement('div'); slot.className='box-slot';
  const box=document.createElement('div'); box.className='box '+(animateDrops?'dropping ':'')+b.side+' '+(b.type==='rect'?'rect':'square');
  for(let i=0;i<weightOf(b.type);i++){ const f=document.createElement('span'); f.className='f'; f.textContent=FACE[b.side]; box.appendChild(f); }
  const badge=document.createElement('span'); badge.className='box-badge'; badge.textContent=b.event;   // sự việc -> góc trên-phải
  box.appendChild(badge);
  const x=document.createElement('button'); x.className='box-x'; x.textContent='×';
  x.addEventListener('click', e=>{ e.stopPropagation(); askDelete(b.id); });
  box.appendChild(x);
  box.addEventListener('click', ()=>box.classList.toggle('show-x'));   // chạm để hiện × (mobile)
  slot.appendChild(box);
  return slot;
}
function renderBoxes(){
  const present=new Set(boxes.map(b=>b.id));
  for(const [id,el] of boxEls){ if(!present.has(id)){ el.remove(); boxEls.delete(id); } }
  for(const b of boxes){
    if(boxEls.has(b.id)) continue;
    const slot=buildBox(b);
    $(b.side==='left'?'panL':'panR').appendChild(slot); boxEls.set(b.id, slot);
    const box=slot.firstChild;
    requestAnimationFrame(()=>requestAnimationFrame(()=>box.classList.remove('dropping')));
  }
  layoutBoxes('left'); layoutBoxes('right'); updateBalance();
}
// xếp bottom-up, mỗi tầng tối đa 4 đơn vị, các ô CHẠM nhau (không hở), căn giữa tầng
function layoutBoxes(side){
  const list=boxes.filter(b=>b.side===side);
  const rows=[]; let cur=[], used=0;
  for(const b of list){ const w=weightOf(b.type);
    if(used+w>CAP_UNITS){ rows.push(cur); cur=[]; used=0; } cur.push(b); used+=w; }
  if(cur.length) rows.push(cur);
  const contentW=CAP_UNITS*UNIT;
  rows.forEach((row,r)=>{
    const rowW=row.reduce((s,b)=>s+weightOf(b.type),0)*UNIT;
    let x=(contentW-rowW)/2;
    for(const b of row){ const w=weightOf(b.type)*UNIT; const slot=boxEls.get(b.id);
      if(slot){ slot.style.left=x+'px'; slot.style.bottom=(r*BOX_H)+'px'; slot.style.width=w+'px'; }
      x+=w; }
  });
}

/* ===== 5. CÂN BẰNG — kim / đòn / đĩa ===== */
function updateBalance(){
  let lw=0, rw=0;
  for(const b of boxes){ (b.side==='left'?lw+=weightOf(b.type):rw+=weightOf(b.type)); }
  const diff=lw-rw;
  const n=Math.max(-20,Math.min(20,diff))/20;   // -1..1 (max 20 mỗi bên)
  const beamDeg=-n*MAX_BEAM, needleDeg=-n*MAX_DEG;   // trái nặng -> đầu trái hạ, kim lệch trái
  $('beam').style.transform=`rotate(${beamDeg}deg)`;
  $('needle').style.transform=`rotate(${needleDeg}deg)`;
  // kim KHÔNG đổi màu theo cân bằng — luôn CÙNG MÀU cán cân (--wood, đặt ở CSS)
  $('hangerL').style.transform=`rotate(${-beamDeg}deg)`;
  $('hangerR').style.transform=`rotate(${-beamDeg}deg)`;
}
// ĐĨA MẶT SỐ TRÒN gắn trên đỉnh trụ (như ảnh): số + vạch khắc + vít trục kim
// ĐĨA TRÒN gỗ PHẲNG: KHÔNG số, KHÔNG border, chỉ vạch khắc + (kim/vít vẽ bằng HTML)
function buildDial(){
  const P=(r,deg)=>{ const [dx,dy]=polar(r,deg); return [CX+dx, DISC_CY+dy]; };
  let ticks='';
  for(let v=-20; v<=20; v++){ const [x1,y1]=P(DIAL_R-13, v/20*MAX_DEG), [x2,y2]=P(DIAL_R-6, v/20*MAX_DEG);
    const col = v===0?'var(--wood)':(v<0?'var(--bad)':'var(--good)');   // giữa=peach, TRÁI(<0)=rose, PHẢI(>0)=xanh lá
    const sw = (v%10===0)?1.6:(v%5===0?1.1:0.8);   // 41 vạch MẢNH; nhấn ở 0/±10/±20, vừa ở ±5/±15, mảnh ở còn lại
    ticks+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`; }
  $('dial').innerHTML =
      `<path d="M ${CX-DISC_R} ${DISC_CY} A ${DISC_R} ${DISC_R} 0 0 1 ${CX+DISC_R} ${DISC_CY} Z" fill="var(--disc)"/>`   // mặt số BÁN NGUYỆT (chỉ nửa TRÊN, bỏ nửa dưới)
    + ticks;
}
// dây treo chữ V — NỐI CHẠM rìa ngoài đĩa (không lơ lửng)
function layoutChains(){
  const RIM_X = PLATE_RAD + 13;     // nửa bề ngang đoạn thẳng = (2*plate_rad+26)/2
  const RIM_Y = STRING_LEN + 2;     // chạm đúng đoạn thẳng (dày 5px)
  const len = Math.hypot(RIM_X, RIM_Y);
  const ang = Math.atan2(RIM_Y, RIM_X)*180/Math.PI;   // từ trục NGANG
  document.querySelectorAll('.hanger').forEach(h=>{
    const a=h.querySelector('.ca'), b=h.querySelector('.cb');
    a.style.width=len+'px'; a.style.transform=`rotate(${ang}deg)`;     // xuống-phải tới rìa phải đĩa
    b.style.width=len+'px'; b.style.transform=`rotate(${180-ang}deg)`; // xuống-trái tới rìa trái đĩa
  });
}
/* ===== 6. POPUP XÁC NHẬN + THAO TÁC ===== */
let pending=null;   // {kind:'add'|'delete'|'reset', ...}
function openModal(html){ $('preview').innerHTML=html; $('modal').classList.add('open'); }
function closeModal(){ $('modal').classList.remove('open'); pending=null; }

function askAdd(side, type, event, persist){
  pending={kind:'add', side, type, event, persist};
  // popup = ĐÚNG ô như trên đĩa: hình vuông + emoji sự việc ở GÓC (badge); bỏ "emoji → mũi tên → ô"
  const faces=`<span class="f">${FACE[side]}</span>`.repeat(weightOf(type));
  openModal(`<span class="box big ${side} ${type==='rect'?'rect':'square'}">${faces}<span class="box-badge">${event}</span></span>`);
}
function askDelete(id){
  const b=boxes.find(x=>x.id===id); if(!b) return;
  pending={kind:'delete', id};
  openModal(`<span class="del-mark ${b.side}">${boxHTML(b.side,b.type,'big')}<span class="x">✕</span></span>`);
}
function askReset(){
  if(!boxes.length) return;
  pending={kind:'reset'};
  openModal('<svg class="reset-ic" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 6"/><path d="M20 4v7h-7"/></svg>');
}
function confirmPending(){
  if(!pending) return;
  if(pending.kind==='add'){
    if(pending.persist) addItem(pending.side, pending.type, pending.event);
    dropBox(pending.side, pending.type, pending.event);
  }else if(pending.kind==='delete'){ removeBox(pending.id); }
  else if(pending.kind==='reset'){ resetScale(); }
  closeModal();
}
function dropBox(side, type, event){
  const b={id:genId('b'), side, type, event, at:Date.now()};
  if(boxesRef) boxesRef.child(b.id).set({side,type,event,at:b.at}).catch(()=>{});
  boxes.push(b); sortByAt(boxes); saveBoxes(); renderBoxes();
}
function removeBox(id){
  if(boxesRef) boxesRef.child(id).remove().catch(()=>{});
  boxes=boxes.filter(b=>b.id!==id); saveBoxes(); renderBoxes();
}
function resetScale(){
  if(boxesRef) boxesRef.remove().catch(()=>{});
  boxes=[]; saveBoxes(); renderBoxes();
}

/* ===== 7. KHỞI ĐỘNG ===== */
// MOBILE responsive: thu cân cho VỪA bề ngang màn hình (footprint = 414*s, margin tự bù).
// Desktop (>860px) gỡ --s inline -> dùng lại --s:1.4 ở :root.
function fitScale(){
  const el=$('scale');
  if(!window.matchMedia('(max-width:860px)').matches){ el.style.removeProperty('--s'); return; }
  const s=Math.max(0.5, Math.min(1,(window.innerWidth-24)/414));   // 414 = bề ngang .scale; 24 = chừa lề; floor 0.5
  el.style.setProperty('--s', s.toFixed(3));
}
function init(){
  buildDial(); layoutChains(); loadCache();
  renderLists(); renderBoxes();   // option-button custom gắn click trong renderLists
  $('btnOk').addEventListener('click', confirmPending);
  $('btnNo').addEventListener('click', closeModal);
  $('modal').addEventListener('click', e=>{ if(e.target===$('modal')) closeModal(); });
  $('reset').addEventListener('click', askReset);
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
  fitScale();
  window.addEventListener('resize', fitScale);   // xoay máy / đổi bề ngang -> tính lại cho vừa
  startSync();
  // sau khung hình ĐẦU (đã vẽ xong trạng thái cuối): bật lại animation cho thao tác sau
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ document.body.classList.remove('preload'); animateDrops=true; }));
}
init();
</script>
