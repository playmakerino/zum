<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cân Đĩa</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap');

/* ============================================================
   CÂN ĐĨA THƯỞNG PHẠT — phong cách Ghibli, cho trẻ nhỏ
   • Đĩa TRÁI = 🙂 (việc tốt), đĩa PHẢI = 🙁 (việc chưa ngoan)
   • Ô vuông = 1 emoji (nặng 1), ô chữ nhật = 2 emoji (nặng 2)
   • Kim chỉ lệch về đĩa NẶNG hơn: số |hiệu| (0..10) hai bên
   • Realtime Database Firebase — đồng bộ mọi thiết bị (giống dong-ho.html)
   ------------------------------------------------------------
   Hằng số HÌNH HỌC khai báo ở :root (px) -> JS đọc lại để đặt
   số trên cung & tính cân bằng. MỘT nguồn, sửa một nơi.
   ============================================================ */
:root{
  --cream:#fbf3e4;
  --ink:#4a4364;
  --muted:#9a8fa6;

  /* bảng màu Ghibli: trời, đồng cỏ, gỗ ấm, đồng thau */
  --sky-top:#bfe6f0;
  --sky-bot:#eaf7ec;
  --hill:#bfe0a4;
  --hill-dark:#a6d188;
  --wood:#d59a68;
  --wood-dark:#a86c43;
  --wood-light:#ecc296;
  --brass:#e9b85c;
  --rope:#9a7350;

  --good:#7fbf6b;          /* phe việc tốt (xanh lá) */
  --bad:#ec8a6a;           /* phe việc chưa ngoan (cam đào) */
  --smile-box:#ffe08a;     /* nền ô 🙂 */
  --smile-edge:#f4c24b;
  --frown-box:#bcd6f4;     /* nền ô 🙁 */
  --frown-edge:#8fb6e6;

  /* ----- hình học cân (JS đọc qua getComputedStyle) ----- */
  --arm:140px;             /* nửa chiều dài đòn cân */
  --pivot-top:248px;       /* tâm trục (từ đỉnh khu .scale) */
  --needle-len:118px;      /* dài kim (chĩa tới vành số, không vượt số 0) */
  --gauge-r:126px;         /* bán kính đặt SỐ trên cung */
  --string-len:60px;       /* dài dây treo */
  --plate-rad:62px;        /* nửa bề ngang miệng đĩa (dây chữ V bám vào) */
  --base-top:452px;        /* mặt trên đế (chân trụ chạm tới đây) */
  --unit:36px;             /* 1 ô vuông = 1 đơn vị bề ngang; đĩa chứa 4 đơn vị */
  --row-h:38px;            /* cao mỗi tầng ô xếp chồng */
  --box-h:34px;            /* cao 1 ô */
  --max-beam:11;           /* độ nghiêng đòn tối đa (deg) ở hiệu = ±10 */
  --max-deg:72;            /* góc kim tối đa (deg) ở hiệu = ±10 */
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  min-height:100dvh;
  background:linear-gradient(180deg,var(--sky-top) 0%,#d7eede 52%,var(--sky-bot) 100%);
  color:var(--ink);
  font-family:'Baloo 2',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ===== KHUNG CẢNH GHIBLI (mặt trời, mây, đồi) ===== */
.scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.sun{position:absolute;top:6%;left:50%;transform:translateX(-50%);
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,#fff3c4 0%,#ffe79a 55%,rgba(255,231,154,0) 72%);}
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.92;
  box-shadow:0 8px 20px rgba(120,150,170,.18);}
.cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%;}
.cloud.c1{width:120px;height:34px;top:14%;left:8%;animation:drift 38s linear infinite;}
.cloud.c1::before{width:54px;height:54px;top:-24px;left:18px;}
.cloud.c1::after{width:40px;height:40px;top:-16px;left:62px;}
.cloud.c2{width:90px;height:28px;top:22%;right:10%;animation:drift 52s linear infinite reverse;}
.cloud.c2::before{width:42px;height:42px;top:-20px;left:14px;}
.cloud.c2::after{width:32px;height:32px;top:-12px;left:48px;}
.cloud.c3{width:70px;height:22px;top:9%;left:62%;animation:drift 46s linear infinite;}
.cloud.c3::before{width:34px;height:34px;top:-16px;left:10px;}
.cloud.c3::after{width:26px;height:26px;top:-10px;left:38px;}
@keyframes drift{from{transform:translateX(-30px);}to{transform:translateX(30px);}}
.hill{position:absolute;left:-5%;width:110%;border-radius:50% 50% 0 0;}
.hill.h1{bottom:0;height:24vh;background:var(--hill-dark);}
.hill.h2{bottom:0;height:16vh;background:var(--hill);left:-15%;width:130%;}

/* ===== BỐ CỤC TỔNG: list trái | cân | list phải ===== */
.stage{
  position:relative;z-index:1;
  min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  gap:clamp(10px,2.4vw,30px);
  padding:18px 14px 26px;
  flex-wrap:wrap;
}
.title{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:2;
  font-weight:700;font-size:clamp(1.1rem,3.4vw,1.5rem);color:var(--ink);
  text-shadow:0 2px 0 #fff;letter-spacing:.5px;
}

/* ===== THẺ DANH SÁCH SỰ VIỆC (2 bên) ===== */
.panel{
  background:rgba(255,255,255,.82);
  border-radius:24px;
  padding:14px 13px 13px;
  width:min(40vw,238px);
  box-shadow:0 12px 30px rgba(120,140,160,.22);
  backdrop-filter:blur(2px);
  border:2px solid #fff;
}
.panel h2{
  font-size:1.02rem;font-weight:700;text-align:center;margin-bottom:10px;
  padding:6px 8px;border-radius:14px;color:#fff;line-height:1.15;
}
.panel.left  h2{background:var(--good);}
.panel.right h2{background:var(--bad);}

.event-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.event-row{
  position:relative;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:8px 10px;border-radius:16px;cursor:pointer;
  background:#fff;border:2px solid #f0e6d4;
  transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
  user-select:none;
}
.event-row:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(120,140,160,.2);}
.event-row:active{transform:scale(.97);}
.event-row.left:hover{border-color:var(--good);}
.event-row.right:hover{border-color:var(--bad);}
.event-row .ev{font-size:1.5rem;line-height:1;}
.event-row .eq{font-size:1.05rem;color:var(--muted);font-weight:600;}
.row-del{
  position:absolute;top:-7px;right:-7px;display:none;
  width:19px;height:19px;border-radius:50%;border:2px solid #fff;cursor:pointer;
  background:var(--bad);color:#fff;font:700 12px/1 'Baloo 2',sans-serif;
  align-items:center;justify-content:center;padding:0;
}
.event-row:hover .row-del{display:flex;}

/* ô preview nhỏ trong danh sách */
.mini-box{display:inline-flex;align-items:center;justify-content:center;gap:1px;
  border-radius:8px;padding:3px 5px;border:2px solid;}
.mini-box.left{background:var(--smile-box);border-color:var(--smile-edge);}
.mini-box.right{background:var(--frown-box);border-color:var(--frown-edge);}
.mini-box .face{font-size:1.1rem;line-height:1;}

/* hàng nhập sự việc tùy ý */
.custom-row{
  margin-top:11px;padding-top:11px;border-top:2px dashed #ead9bf;
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center;
}
.emoji-input{
  width:50px;height:42px;border-radius:13px;border:2px dashed #d9c7a8;
  background:#fff;text-align:center;font-size:1.3rem;line-height:1;
  font-family:'Baloo 2',sans-serif;color:var(--ink);
}
.emoji-input:focus{outline:none;border-style:solid;}
.panel.left .emoji-input:focus{border-color:var(--good);}
.panel.right .emoji-input:focus{border-color:var(--bad);}
.shape-toggle{display:flex;gap:4px;}
.shape-toggle button{
  width:38px;height:42px;border-radius:12px;cursor:pointer;
  border:2px solid #ead9bf;background:#fff;color:var(--muted);
  display:flex;align-items:center;justify-content:center;padding:0;
}
.shape-toggle button .glyph{border-radius:4px;background:currentColor;}
.shape-toggle button.sq .glyph{width:15px;height:15px;}
.shape-toggle button.rt .glyph{width:26px;height:14px;}
.shape-toggle button.sel{background:#fff7e8;}
.panel.left .shape-toggle button.sel{border-color:var(--good);color:var(--good);}
.panel.right .shape-toggle button.sel{border-color:var(--bad);color:var(--bad);}
.add-custom{
  width:42px;height:42px;border-radius:13px;border:none;cursor:pointer;color:#fff;
  font-size:1.5rem;line-height:1;display:flex;align-items:center;justify-content:center;
}
.panel.left .add-custom{background:var(--good);}
.panel.right .add-custom{background:var(--bad);}
.add-custom:disabled{background:var(--muted);opacity:.55;cursor:not-allowed;}

/* ===== KHU CÂN ===== */
.scale{
  position:relative;flex:0 0 auto;
  width:380px;height:560px;
}
/* emoji sự việc gần nhất — góc trên bên phải */
.last-event{
  position:absolute;top:6px;right:4px;z-index:6;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  opacity:0;transition:opacity .3s ease;
}
.last-event.show{opacity:1;}
.last-event .bubble{
  width:46px;height:46px;border-radius:50%;
  background:#fff;border:3px solid var(--brass);
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;line-height:1;
  box-shadow:0 6px 14px rgba(120,140,160,.25);
}
.last-event.pop .bubble{animation:pop .5s cubic-bezier(.34,1.6,.5,1);}
@keyframes pop{0%{transform:scale(.3);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
.last-event .cap{font-size:.62rem;color:var(--muted);font-weight:600;}

/* ----- cung số + kim (đồng hồ chỉ thị) ----- */
.gauge-arc{position:absolute;left:50%;top:var(--pivot-top);overflow:visible;pointer-events:none;z-index:2;}
.gauge{position:absolute;left:50%;top:var(--pivot-top);width:0;height:0;z-index:3;}
.tickn{
  position:absolute;font-size:.82rem;font-weight:600;color:var(--ink);
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  line-height:1;font-variant-numeric:tabular-nums;
}
.tickn.zero{color:var(--brass);font-size:1rem;font-weight:700;}
.needle{
  position:absolute;left:50%;top:var(--pivot-top);
  width:16px;height:var(--needle-len);margin-left:-8px;margin-top:calc(-1 * var(--needle-len));
  transform-origin:50% 100%;z-index:4;
  background:linear-gradient(180deg,#ff6b8a,#e23d68);
  clip-path:polygon(50% 0,100% 86%,50% 100%,0 86%);
  transition:transform .85s cubic-bezier(.32,1.45,.55,1);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.15));
}
.hub{
  position:absolute;left:50%;top:var(--pivot-top);
  width:26px;height:26px;margin-left:-13px;margin-top:-13px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%,var(--wood-light),var(--brass) 60%,var(--wood-dark));
  border:2px solid #fff;z-index:7;box-shadow:0 3px 6px rgba(0,0,0,.2);
}

/* ----- trụ + đế ----- */
.post{
  position:absolute;left:50%;top:var(--pivot-top);
  width:24px;margin-left:-12px;
  height:calc(var(--base-top) - var(--pivot-top));
  background:linear-gradient(90deg,var(--wood-dark),var(--wood) 45%,var(--wood-light) 55%,var(--wood-dark));
  border-radius:8px;z-index:1;
}
.base{
  position:absolute;left:50%;top:var(--base-top);transform:translateX(-50%);
  width:200px;height:30px;border-radius:50%/60%;z-index:1;
  background:radial-gradient(ellipse at 50% 32%,var(--wood-light),var(--wood) 50%,var(--wood-dark));
  box-shadow:0 10px 20px rgba(120,100,80,.3);
}
.base::after{content:"";position:absolute;left:50%;top:-12px;transform:translateX(-50%);
  width:60px;height:22px;border-radius:50%/60%;
  background:linear-gradient(180deg,var(--wood),var(--wood-dark));}

/* ----- đòn cân (xoay quanh trục) ----- */
.beam{
  position:absolute;left:50%;top:var(--pivot-top);
  width:calc(2 * var(--arm));height:14px;
  margin-left:calc(-1 * var(--arm));margin-top:-7px;
  border-radius:8px;z-index:5;transform-origin:50% 50%;
  background:linear-gradient(180deg,var(--wood-light),var(--wood) 55%,var(--wood-dark));
  box-shadow:0 2px 4px rgba(0,0,0,.18);
  transition:transform .85s cubic-bezier(.32,1.45,.55,1);
}
.beam .knob{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;
  margin-top:-7px;background:var(--brass);border:2px solid #fff;}
.beam .knob.l{left:-7px;}
.beam .knob.r{right:-7px;}

/* ----- bộ treo (điểm tại đầu đòn) -> phản xoay để dây luôn thẳng đứng ----- */
.hanger{position:absolute;top:50%;width:0;height:0;transform-origin:0 0;
  transition:transform .85s cubic-bezier(.32,1.45,.55,1);}
.hanger.l{left:0;}
.hanger.r{left:100%;}
.string{position:absolute;top:0;height:calc(var(--string-len) + 6px);width:2.5px;
  background:var(--rope);transform-origin:top center;border-radius:2px;}
/* dây chữ V: góc & dài tính sẵn theo --plate-rad & --string-len (xem JS layout) */

/* ----- đĩa cân ----- */
.pan{position:absolute;left:50%;top:var(--string-len);transform:translateX(-50%);
  width:calc(4 * var(--unit));height:1px;}
.plate{position:absolute;left:50%;top:0;transform:translate(-50%,-2px);
  width:calc(2 * var(--plate-rad) + 36px);height:26px;border-radius:50%/70%;z-index:1;
  background:linear-gradient(180deg,var(--wood-light),var(--wood) 60%,var(--wood-dark));
  box-shadow:0 8px 14px rgba(120,100,80,.28);}
.plate::before{content:"";position:absolute;left:50%;top:1px;transform:translateX(-50%);
  width:86%;height:11px;border-radius:50%;background:rgba(255,255,255,.25);}

/* ----- ô emoji trên đĩa ----- */
.box-slot{position:absolute;transition:left .45s cubic-bezier(.34,1.4,.6,1),
  bottom .45s cubic-bezier(.34,1.4,.6,1);z-index:3;}
.box{
  display:flex;align-items:center;justify-content:center;gap:2px;
  height:var(--box-h);border-radius:9px;border:2px solid;
  box-shadow:0 3px 5px rgba(0,0,0,.12);
  transition:transform .6s cubic-bezier(.3,1.5,.5,1),opacity .3s ease;
}
.box.left{background:var(--smile-box);border-color:var(--smile-edge);}
.box.right{background:var(--frown-box);border-color:var(--frown-edge);}
.box .face{font-size:1.18rem;line-height:1;}
.box.dropping{transform:translateY(-300px);opacity:0;}

/* nút làm lại (dọn sạch đĩa) */
.reset{
  position:absolute;left:50%;bottom:2px;transform:translateX(-50%);z-index:6;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  padding:7px 16px;border-radius:20px;border:2px solid #fff;
  background:rgba(255,255,255,.85);color:var(--muted);font-weight:600;font-size:.9rem;
  box-shadow:0 4px 10px rgba(120,140,160,.2);font-family:'Baloo 2',sans-serif;
}
.reset:hover{color:var(--ink);}

/* ===== POPUP XÁC NHẬN ===== */
.modal{position:fixed;inset:0;z-index:60;display:none;
  align-items:center;justify-content:center;padding:18px;background:rgba(74,67,100,.32);}
.modal.open{display:flex;}
.modal-card{
  background:#fff;border-radius:26px;padding:22px 22px 18px;
  width:min(90vw,330px);text-align:center;
  box-shadow:0 24px 50px rgba(60,50,80,.3);
  animation:cardIn .28s cubic-bezier(.34,1.5,.5,1);
}
@keyframes cardIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-card .q{font-size:1.12rem;font-weight:600;margin-bottom:16px;}
.modal-preview{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px;}
.modal-preview .ev{font-size:2.4rem;line-height:1;}
.modal-preview .arrow{font-size:1.6rem;color:var(--muted);}
.modal-preview .box{height:46px;}
.modal-preview .box .face{font-size:1.7rem;}
.modal-btns{display:flex;gap:12px;justify-content:center;}
.modal-btns button{
  width:64px;height:54px;border-radius:18px;border:none;cursor:pointer;
  font-size:1.6rem;line-height:1;display:flex;align-items:center;justify-content:center;
  font-family:'Baloo 2',sans-serif;
}
.btn-ok{background:var(--good);color:#fff;}
.btn-no{background:#f0e6d4;color:var(--muted);}

/* ===== RESPONSIVE: màn hẹp -> cân ở trên, 2 list xuống dưới ===== */
@media (max-width:900px){
  .stage{flex-direction:column;padding-top:52px;}
  .scale{order:-1;}
  .panel{width:min(92vw,340px);}
}
</style>
</head>
<body>
  <div class="scene">
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="hill h1"></div>
    <div class="hill h2"></div>
  </div>

  <div class="title">⚖️ Cân Đĩa Thưởng Phạt</div>

  <div class="stage">
    <!-- ===== DANH SÁCH VIỆC TỐT (TRÁI = 🙂) ===== -->
    <aside class="panel left">
      <h2>🙂 Việc tốt</h2>
      <ul class="event-list" id="leftList"></ul>
      <div class="custom-row">
        <input class="emoji-input" id="leftEmoji" maxlength="4" placeholder="✏️" inputmode="text" aria-label="Emoji sự việc">
        <div class="shape-toggle" id="leftShape">
          <button class="sq sel" data-type="square" aria-label="Ô vuông (1)"><span class="glyph"></span></button>
          <button class="rt" data-type="rect" aria-label="Ô chữ nhật (2)"><span class="glyph"></span></button>
        </div>
        <button class="add-custom" id="leftAdd" aria-label="Thêm">＋</button>
      </div>
    </aside>

    <!-- ===== CÂN ===== -->
    <div class="scale" id="scale">
      <div class="last-event" id="lastEvent">
        <div class="bubble" id="lastBubble"></div>
        <div class="cap">vừa rồi</div>
      </div>

      <svg class="gauge-arc" id="gaugeArc"></svg>
      <div class="gauge" id="gauge"></div>
      <div class="needle" id="needle"></div>

      <div class="post"></div>

      <div class="beam" id="beam">
        <span class="knob l"></span>
        <span class="knob r"></span>
        <div class="hanger l" id="hangerL">
          <div class="string sl"></div>
          <div class="string sr"></div>
          <div class="pan" id="panL"><div class="plate"></div></div>
        </div>
        <div class="hanger r" id="hangerR">
          <div class="string sl"></div>
          <div class="string sr"></div>
          <div class="pan" id="panR"><div class="plate"></div></div>
        </div>
      </div>

      <div class="hub"></div>
      <div class="base"></div>

      <button class="reset" id="reset">↺ Làm lại</button>
    </div>

    <!-- ===== DANH SÁCH VIỆC CHƯA NGOAN (PHẢI = 🙁) ===== -->
    <aside class="panel right">
      <h2>🙁 Việc chưa ngoan</h2>
      <ul class="event-list" id="rightList"></ul>
      <div class="custom-row">
        <button class="add-custom" id="rightAdd" aria-label="Thêm">＋</button>
        <div class="shape-toggle" id="rightShape">
          <button class="sq sel" data-type="square" aria-label="Ô vuông (1)"><span class="glyph"></span></button>
          <button class="rt" data-type="rect" aria-label="Ô chữ nhật (2)"><span class="glyph"></span></button>
        </div>
        <input class="emoji-input" id="rightEmoji" maxlength="4" placeholder="✏️" inputmode="text" aria-label="Emoji sự việc">
      </div>
    </aside>
  </div>

  <!-- ===== POPUP XÁC NHẬN ===== -->
  <div class="modal" id="confirmModal">
    <div class="modal-card">
      <div class="q">Cho lên đĩa cân?</div>
      <div class="modal-preview" id="modalPreview"></div>
      <div class="modal-btns">
        <button class="btn-no" id="btnNo">✕</button>
        <button class="btn-ok" id="btnOk">✓</button>
      </div>
    </div>
  </div>

<!-- Firebase compat — đồng bộ trạng thái cân qua Realtime Database (giống dong-ho.html).
     Không tải được SDK (offline/chặn) -> tự rớt về localStorage một máy. -->
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-database-compat.js"></script>
<script>
/* ============================================================
   Script chia 7 phần:
     1. Tiện ích & hằng số          5. Cân bằng (kim/đòn/đĩa)
     2. Firebase / state            6. Popup xác nhận + thao tác
     3. Danh sách sự việc           7. Khởi động
     4. Ô trên đĩa (xếp + rơi)
   ============================================================ */

/* ===== 1. TIỆN ÍCH & HẰNG SỐ ===== */
const $ = id => document.getElementById(id);
const css = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
const pxVar = name => parseFloat(css(name));

const ARM       = pxVar('--arm');
const PIVOT_TOP = pxVar('--pivot-top');
const GAUGE_R   = pxVar('--gauge-r');
const STRING_LEN= pxVar('--string-len');
const PLATE_RAD = pxVar('--plate-rad');
const UNIT      = pxVar('--unit');
const ROW_H     = pxVar('--row-h');
const BOX_H     = pxVar('--box-h');
const MAX_BEAM  = pxVar('--max-beam');
const MAX_DEG   = pxVar('--max-deg');
const CAP_UNITS = 4;                       // 1 đĩa rộng = 4 đơn vị (4 vuông / 2 chữ nhật)

const FACE = {left:'🙂', right:'🙁'};
const weightOf = type => type === 'rect' ? 2 : 1;

// TỌA ĐỘ CỰC quanh tâm trục — deg đo TỪ 12 giờ, theo chiều kim (giống dong-ho.html)
function polar(r, deg){ const a=(deg-90)*Math.PI/180; return [r*Math.cos(a), r*Math.sin(a)]; }

/* ===== 2. FIREBASE / STATE =====
   Nguồn CHUẨN = 3 nhánh trên RTDB:
     candia/boxes/<id> = {side,type,event,at}   ô đang nằm trên đĩa
     candia/items/<id> = {side,type,event,at}   dòng sự việc user tự thêm
     candia/last       = {event,side,at}        emoji sự việc gần nhất
   Mọi thiết bị nghe on('value'); localStorage chỉ là CACHE offline. */
let boxes = [];        // [{id,side,type,event,at}]
let userItems = [];    // [{id,side,type,event,at}]
let lastEvent = null;  // {event,side,at}
let boxesRef=null, itemsRef=null, lastRef=null;

const LS_BOXES='candiaBoxes', LS_ITEMS='candiaItems', LS_LAST='candiaLast';

/* ⚠️ ĐỒNG BỘ ĐA THIẾT BỊ cần thêm RULE cho nhánh /candia trên Firebase Console
   (Realtime Database -> Rules), GỘP cùng rule /labels sẵn có:
       "candia": { ".read": true, ".write": true }
   Chưa thêm -> ghi bị permission_denied, app vẫn chạy LOCAL một máy (localStorage). */
try{
  if(typeof firebase !== 'undefined'){
    firebase.initializeApp({
      apiKey: "AIzaSyCQnlQxrXyceuYHCNnyGIEAyU_KyBQUAXs",
      authDomain: "a2-1011-thoi-gian.firebaseapp.com",
      databaseURL: "https://a2-1011-thoi-gian-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "a2-1011-thoi-gian",
      storageBucket: "a2-1011-thoi-gian.firebasestorage.app",
      messagingSenderId: "1017684060626",
      appId: "1:1017684060626:web:636c64f4f049521074800b"
    });
    // Namespace RIÊNG /candia (KHÔNG đụng /labels của dong-ho). Cần thêm rule cho
    // nhánh này trên Firebase Console (xem chú thích cuối file). Chưa có rule -> ghi
    // bị permission_denied, app tự chạy LOCAL (localStorage) một máy, không lỗi đỏ.
    boxesRef = firebase.database().ref('candia/boxes');
    itemsRef = firebase.database().ref('candia/items');
    lastRef  = firebase.database().ref('candia/last');
  }
}catch(e){ boxesRef=itemsRef=lastRef=null; }

const genId = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const sortByAt = a => a.sort((x,y)=>(x.at-y.at)||(x.id<y.id?-1:1));

function loadCache(){
  try{ boxes     = JSON.parse(localStorage.getItem(LS_BOXES)) || []; }catch(e){ boxes=[]; }
  try{ userItems = JSON.parse(localStorage.getItem(LS_ITEMS)) || []; }catch(e){ userItems=[]; }
  try{ lastEvent = JSON.parse(localStorage.getItem(LS_LAST)) || null; }catch(e){ lastEvent=null; }
  sortByAt(boxes); sortByAt(userItems);
}
const saveBoxes = ()=>{ try{ localStorage.setItem(LS_BOXES, JSON.stringify(boxes)); }catch(e){} };
const saveItems = ()=>{ try{ localStorage.setItem(LS_ITEMS, JSON.stringify(userItems)); }catch(e){} };
const saveLast  = ()=>{ try{ localStorage.setItem(LS_LAST, JSON.stringify(lastEvent)); }catch(e){} };

// Nghe server: dựng lại mảng từ snapshot, so JSON -> không đổi thì khỏi vẽ lại (chống echo giật)
function startSync(){
  // errCb: read-denied (chưa thêm rule /candia) -> giữ nguyên cache local, không spam
  const onErr = ()=>{};
  if(boxesRef) boxesRef.on('value', snap=>{
    const v=snap.val()||{};
    const arr=sortByAt(Object.keys(v).map(id=>({id,side:v[id].side,type:v[id].type,event:String(v[id].event||''),at:+v[id].at}))
      .filter(b=>(b.side==='left'||b.side==='right') && b.event && isFinite(b.at)));
    if(JSON.stringify(arr)===JSON.stringify(boxes)) return;
    boxes=arr; saveBoxes(); renderBoxes();
  }, onErr);
  if(itemsRef) itemsRef.on('value', snap=>{
    const v=snap.val()||{};
    const arr=sortByAt(Object.keys(v).map(id=>({id,side:v[id].side,type:v[id].type,event:String(v[id].event||''),at:+v[id].at}))
      .filter(b=>(b.side==='left'||b.side==='right') && b.event && isFinite(b.at)));
    if(JSON.stringify(arr)===JSON.stringify(userItems)) return;
    userItems=arr; saveItems(); renderLists();
  }, onErr);
  if(lastRef) lastRef.on('value', snap=>{
    const v=snap.val();
    const next = (v && v.event) ? {event:String(v.event), side:v.side, at:+v.at} : null;
    if(JSON.stringify(next)===JSON.stringify(lastEvent)) return;
    lastEvent=next; saveLast(); renderLast(true);
  }, onErr);
}

/* ===== 3. DANH SÁCH SỰ VIỆC ===== */
// 2 dòng có sẵn (không xóa được). User thêm -> userItems (đồng bộ).
const BASE_ITEMS = [
  {id:'base-brush', side:'left',  type:'square', event:'🪥'},   // 🪥 = 🙂
  {id:'base-yell',  side:'right', type:'rect',   event:'🗣️'},   // 🙁🙁 = 🗣️
];
const itemsFor = side => [
  ...BASE_ITEMS.filter(i=>i.side===side),
  ...userItems.filter(i=>i.side===side),
];

function buildBoxNode(side, type, cls){
  const box=document.createElement('div');
  box.className='box '+side+(cls?(' '+cls):'');
  const n=weightOf(type);
  box.style.width = (n*UNIT - 4) + 'px';
  for(let i=0;i<n;i++){ const f=document.createElement('span'); f.className='face'; f.textContent=FACE[side]; box.appendChild(f); }
  return box;
}
function miniBox(side, type){
  const m=document.createElement('span'); m.className='mini-box '+side;
  const n=weightOf(type);
  for(let i=0;i<n;i++){ const f=document.createElement('span'); f.className='face'; f.textContent=FACE[side]; m.appendChild(f); }
  return m;
}
function makeRow(it){
  const li=document.createElement('li'); li.className='event-row '+it.side;
  const ev=document.createElement('span'); ev.className='ev'; ev.textContent=it.event;
  const eq=document.createElement('span'); eq.className='eq'; eq.textContent='=';
  const box=miniBox(it.side, it.type);
  // trái: 🪥 = 🙂 ; phải (gương): 🙁🙁 = 🗣️
  if(it.side==='left') li.append(ev, eq, box);
  else                 li.append(box, eq, ev);
  if(!it.id.startsWith('base-')){
    const del=document.createElement('button'); del.className='row-del'; del.textContent='×';
    del.setAttribute('aria-label','Xóa');
    del.addEventListener('click', e=>{ e.stopPropagation(); removeItem(it.id); });
    li.appendChild(del);
  }
  li.addEventListener('click', ()=>askConfirm(it));
  return li;
}
function renderLists(){
  for(const side of ['left','right']){
    const ul = side==='left' ? $('leftList') : $('rightList');
    ul.innerHTML='';
    for(const it of itemsFor(side)) ul.appendChild(makeRow(it));
  }
}
function addItem(side, type, event){
  const it={id:genId('i'), side, type, event, at:Date.now()};
  if(itemsRef) itemsRef.child(it.id).set({side, type, event, at:it.at}).catch(()=>{});
  userItems.push(it); sortByAt(userItems); saveItems(); renderLists();
  return it;
}
function removeItem(id){
  if(itemsRef) itemsRef.child(id).remove().catch(()=>{});
  userItems=userItems.filter(i=>i.id!==id); saveItems(); renderLists();
}

/* ===== 4. Ô TRÊN ĐĨA — xếp chồng & rơi ===== */
const boxEls = new Map();   // id -> .box-slot (để diff thêm/xóa, không vẽ lại từ đầu)

function renderBoxes(){
  const present=new Set(boxes.map(b=>b.id));
  for(const [id,el] of boxEls){ if(!present.has(id)){ el.remove(); boxEls.delete(id); } }
  for(const b of boxes){
    if(boxEls.has(b.id)) continue;
    const slot=document.createElement('div'); slot.className='box-slot';
    const box=buildBoxNode(b.side, b.type, 'dropping');
    slot.appendChild(box);
    ($(b.side==='left'?'panL':'panR')).appendChild(slot);
    boxEls.set(b.id, slot);
    requestAnimationFrame(()=>requestAnimationFrame(()=>box.classList.remove('dropping')));  // rơi xuống
  }
  layoutBoxes('left'); layoutBoxes('right');
  updateBalance();
}

// Xếp ô bottom-up: mỗi tầng tối đa 4 đơn vị; tầng đầy thì lên tầng trên. Căn giữa từng tầng.
function layoutBoxes(side){
  const list = boxes.filter(b=>b.side===side);
  // gom thành các tầng
  const rows=[]; let cur=[], used=0;
  for(const b of list){
    const w=weightOf(b.type);
    if(used+w>CAP_UNITS){ rows.push(cur); cur=[]; used=0; }
    cur.push(b); used+=w;
  }
  if(cur.length) rows.push(cur);
  const contentW = CAP_UNITS*UNIT;
  rows.forEach((row, r)=>{
    const rowW = row.reduce((s,b)=>s+weightOf(b.type),0)*UNIT;
    let x=(contentW-rowW)/2;
    for(const b of row){
      const w=weightOf(b.type)*UNIT;
      const slot=boxEls.get(b.id);
      if(slot){ slot.style.left=x+'px'; slot.style.bottom=(r*ROW_H)+'px'; }
      x+=w;
    }
  });
}

/* ===== 5. CÂN BẰNG — kim, đòn, đĩa ===== */
const needle=$('needle'), beam=$('beam'), hangerL=$('hangerL'), hangerR=$('hangerR');
function updateBalance(){
  let lw=0, rw=0;
  for(const b of boxes){ (b.side==='left'?lw+=weightOf(b.type):rw+=weightOf(b.type)); }
  const diff = lw - rw;                              // >0: trái nặng (nhiều 🙂)
  const n = Math.max(-10, Math.min(10, diff)) / 10;  // -1..1
  const beamDeg = -n * MAX_BEAM;                      // trái nặng -> CCW -> đầu trái hạ xuống
  const needleDeg = -n * MAX_DEG;                     // trái nặng -> kim lệch TRÁI
  beam.style.transform = `rotate(${beamDeg}deg)`;
  needle.style.transform = `rotate(${needleDeg}deg)`;
  hangerL.style.transform = `rotate(${-beamDeg}deg)`; // phản xoay -> dây luôn thẳng đứng
  hangerR.style.transform = `rotate(${-beamDeg}deg)`;
}

// Đặt SỐ trên cung (10..1 trái, 0 giữa, 1..10 phải) + vẽ cung & vạch
function buildGauge(){
  const gauge=$('gauge'); gauge.innerHTML='';
  for(let v=-10; v<=10; v++){
    const el=document.createElement('div');
    el.className='tickn'+(v===0?' zero':'');
    el.textContent=Math.abs(v);
    const [x,y]=polar(GAUGE_R, v/10*MAX_DEG);
    el.style.transform=`translate(-50%,-50%) translate(${x}px,${y}px)`;
    gauge.appendChild(el);
  }
  // cung nền + vạch chia
  const svg=$('gaugeArc');
  const RA=GAUGE_R-16;
  const [ax,ay]=polar(RA, -MAX_DEG), [bx,by]=polar(RA, MAX_DEG);
  let d=`M ${ax} ${ay} A ${RA} ${RA} 0 0 1 ${bx} ${by}`;
  let ticks='';
  for(let v=-10; v<=10; v++){
    const [x1,y1]=polar(RA-4, v/10*MAX_DEG), [x2,y2]=polar(RA+4, v/10*MAX_DEG);
    ticks+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${v===0?'#e9b85c':'#cdbfae'}" stroke-width="${v===0?3:2}" stroke-linecap="round"/>`;
  }
  svg.innerHTML=`<path d="${d}" fill="none" stroke="#e7d8bf" stroke-width="6" stroke-linecap="round"/>${ticks}`;
}

// Dây chữ V: tính góc + độ dài 1 lần theo PLATE_RAD & STRING_LEN
function layoutStrings(){
  const len=Math.hypot(PLATE_RAD, STRING_LEN);
  const ang=Math.atan2(PLATE_RAD, STRING_LEN)*180/Math.PI;
  document.querySelectorAll('.hanger').forEach(h=>{
    const sl=h.querySelector('.sl'), sr=h.querySelector('.sr');
    sl.style.height=len+'px'; sl.style.transform=`rotate(${ang}deg)`;   sl.style.left='-1px';
    sr.style.height=len+'px'; sr.style.transform=`rotate(${-ang}deg)`;  sr.style.left='-1px';
  });
}

function renderLast(animate){
  const wrap=$('lastEvent');
  if(!lastEvent){ wrap.classList.remove('show'); return; }
  $('lastBubble').textContent=lastEvent.event;
  wrap.classList.add('show');
  if(animate){ wrap.classList.remove('pop'); void wrap.offsetWidth; wrap.classList.add('pop'); }
}

/* ===== 6. POPUP XÁC NHẬN + THAO TÁC ===== */
let pending=null;   // item đang chờ xác nhận
function askConfirm(it){
  pending=it;
  const prev=$('modalPreview'); prev.innerHTML='';
  const ev=document.createElement('span'); ev.className='ev'; ev.textContent=it.event;
  const ar=document.createElement('span'); ar.className='arrow'; ar.textContent='→';
  const box=buildBoxNode(it.side, it.type);
  box.style.width='auto';
  prev.append(ev, ar, box);
  $('confirmModal').classList.add('open');
}
function closeModal(){ $('confirmModal').classList.remove('open'); pending=null; }
function confirmDrop(){
  if(!pending) return;
  dropBox(pending.side, pending.type, pending.event);
  closeModal();
}
// Thêm ô lên đĩa + cập nhật sự việc gần nhất (ghi server + tại chỗ ngay)
function dropBox(side, type, event){
  const b={id:genId('b'), side, type, event, at:Date.now()};
  if(boxesRef) boxesRef.child(b.id).set({side, type, event, at:b.at}).catch(()=>{});
  boxes.push(b); sortByAt(boxes); saveBoxes(); renderBoxes();

  lastEvent={event, side, at:Date.now()};
  if(lastRef) lastRef.set(lastEvent).catch(()=>{});
  saveLast(); renderLast(true);
}
function resetScale(){
  if(boxesRef) boxesRef.remove().catch(()=>{});
  boxes=[]; saveBoxes(); renderBoxes();
}

// Hàng nhập tùy ý: gắn toggle hình + nút thêm cho 1 phe
function wireCustom(side){
  const cap = side[0].toUpperCase()+side.slice(1);   // 'Left'/'Right'
  const input=$(side+'Emoji'), shape=$(side+'Shape'), add=$(side+'Add');
  let type='square';
  shape.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      type=btn.dataset.type;
      shape.querySelectorAll('button').forEach(b=>b.classList.toggle('sel', b===btn));
    });
  });
  const refresh=()=>{ add.disabled = !input.value.trim(); };
  input.addEventListener('input', refresh); refresh();
  add.addEventListener('click', ()=>{
    const ev=input.value.trim(); if(!ev) return;
    const it=addItem(side, type, ev);   // thêm vào danh sách (đồng bộ) ...
    input.value=''; refresh();
    askConfirm(it);                     // ... rồi mở xác nhận để thả luôn
  });
}

/* ===== 7. KHỞI ĐỘNG ===== */
function init(){
  buildGauge();
  layoutStrings();
  loadCache();
  renderLists();
  renderBoxes();
  renderLast(false);
  wireCustom('left'); wireCustom('right');

  $('btnOk').addEventListener('click', confirmDrop);
  $('btnNo').addEventListener('click', closeModal);
  $('confirmModal').addEventListener('click', e=>{ if(e.target===$('confirmModal')) closeModal(); });
  $('reset').addEventListener('click', resetScale);
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  startSync();
}
init();
</script>
