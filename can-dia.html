<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cân Đĩa</title>
<style>
/* ============================================================
   CÂN ĐĨA THƯỞNG PHẠT — không chữ, cho trẻ nhỏ
   • Đĩa TRÁI 🙂 (việc tốt) / PHẢI 🙁 (việc chưa ngoan)
   • Ô đơn = 1 emoji (nặng 1), ô đôi = 2 emoji (nặng 2), các ô CHẠM nhau
   • Kim chỉ |hiệu trọng lượng| 0..10 hai bên; đòn nghiêng về đĩa nặng
   • Vòng số là MỘT PHẦN của cân (mặt số bán nguyệt gắn ở trục)
   • Realtime Database Firebase /candia (giống dong-ho.html), fallback localStorage
   ------------------------------------------------------------
   BẢNG MÀU — đúng 5 màu (emoji là nội dung, không tính):
     --bg #f1e7d3 · --wood #c2854b · --dark #5a3d23 · --good #84b063 · --bad #db7d4f
   ============================================================ */
:root{
  --bg:#f1e7d3;
  --wood:#c2854b;
  --dark:#5a3d23;
  --good:#84b063;
  --bad:#db7d4f;

  /* hình học cân (px) — JS đọc lại qua getComputedStyle */
  --cx:200px;
  --pivot:186px;          /* tâm trục tính từ đỉnh khu .scale */
  --arm:120px;            /* nửa đòn cân */
  --dial-r:134px;         /* bán kính đặt SỐ */
  --needle-len:112px;     /* dài kim — < bán kính số -> kim KHÔNG đè số */
  --string-len:70px;      /* dài dây treo */
  --plate-rad:66px;       /* nửa miệng đĩa (dây bám rìa) */
  --base-top:408px;
  --unit:34px;            /* 1 ô đơn rộng = 1 đơn vị; đĩa chứa 4 đơn vị */
  --box-h:34px;
  --max-beam:10;          /* nghiêng đòn tối đa (deg) */
  --max-deg:70;           /* góc kim tối đa (deg) */
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  min-height:100dvh;background:var(--bg);color:var(--dark);
  font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}

/* ===== BỐ CỤC: list TRÁI sát mép | cân | list PHẢI sát mép ===== */
.stage{
  min-height:100dvh;display:flex;align-items:center;justify-content:space-between;
  gap:6px;padding:0 8px;
}

/* ===== LIST SỰ VIỆC 2 BÊN ===== */
.panel{
  width:clamp(132px,17vw,210px);flex:0 0 auto;
  display:flex;flex-direction:column;gap:9px;
}
.panel .head{
  align-self:center;width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;line-height:1;
  border:3px solid;
}
.panel.left  .head{border-color:var(--good);}
.panel.right .head{border-color:var(--bad);}
.event-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.event-row,.opt{
  display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;
  padding:7px 9px;border-radius:15px;border:2.5px solid var(--wood);background:var(--bg);
  transition:transform .12s ease,border-color .12s ease;user-select:none;min-height:44px;
}
.event-row:hover,.opt:hover{transform:translateY(-2px);}
.event-row:active,.opt:active{transform:scale(.96);}
.panel.left  .event-row:hover,.panel.left  .opt:hover{border-color:var(--good);}
.panel.right .event-row:hover,.panel.right .opt:hover{border-color:var(--bad);}
.event-row{position:relative;}
.ev{font-size:1.5rem;line-height:1;}
/* Ô = KHUNG vuông/chữ nhật (không nền màu), chứa 1 / 2 emoji. Dùng chung mọi nơi:
   - mặc định = ô trên đĩa (rộng = slot)
   - .mini = preview trong list & option · .big = trong popup */
.box{display:inline-flex;align-items:center;justify-content:center;box-sizing:border-box;
  border:2px solid var(--dark);border-radius:7px;background:transparent;}
.box .f{line-height:1;}
.box.mini{height:32px;}
.box.mini.square{width:32px;} .box.mini.rect{width:60px;}
.box.mini .f{font-size:1.24rem;}
.row-del{
  position:absolute;top:-8px;right:-8px;display:none;
  width:20px;height:20px;border-radius:50%;border:2px solid var(--bg);cursor:pointer;
  background:var(--bad);color:var(--bg);font:700 13px/1 system-ui;align-items:center;justify-content:center;padding:0;
}
.event-row:hover .row-del{display:flex;}

/* hàng nhập custom: [ô nhập emoji] + 2 option (ô đơn / ô đôi) */
.custom{margin-top:4px;padding-top:10px;border-top:2px dashed var(--wood);
  display:flex;flex-direction:column;gap:8px;}
.emoji-input{
  align-self:center;width:52px;height:44px;border-radius:14px;border:2.5px dashed var(--wood);
  background:var(--bg);text-align:center;font-size:1.5rem;line-height:1;color:var(--dark);
}
.emoji-input:focus{outline:none;}
.panel.left  .emoji-input:focus{border-color:var(--good);border-style:solid;}
.panel.right .emoji-input:focus{border-color:var(--bad);border-style:solid;}

/* ===== KHU CÂN ===== */
.scale{position:relative;flex:0 0 auto;width:400px;height:476px;}

/* emoji sự việc gần nhất — góc trên bên phải (KHÔNG chữ) */
.last{
  position:absolute;top:2px;right:6px;z-index:9;
  width:46px;height:46px;border-radius:50%;background:var(--bg);
  border:3px solid var(--wood);display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;line-height:1;opacity:0;transition:opacity .3s ease;
}
.last.show{opacity:1;}
.last.pop{animation:pop .5s cubic-bezier(.34,1.6,.5,1);}
@keyframes pop{0%{transform:scale(.3);}60%{transform:scale(1.18);}100%{transform:scale(1);}}

/* ----- mặt số bán nguyệt = một phần của cân ----- */
.dial{position:absolute;left:0;top:0;width:400px;height:476px;overflow:visible;z-index:2;pointer-events:none;}
.nums{position:absolute;left:var(--cx);top:var(--pivot);width:0;height:0;z-index:4;pointer-events:none;}
.tickn{position:absolute;font:600 .82rem/1 system-ui;color:var(--dark);
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  font-variant-numeric:tabular-nums;transform:translate(-50%,-50%);}
.tickn.zero{font-size:1rem;font-weight:700;}

/* ----- kim ----- */
.needle{
  position:absolute;left:var(--cx);top:var(--pivot);
  width:13px;height:var(--needle-len);margin-left:-6.5px;margin-top:calc(-1 * var(--needle-len));
  transform-origin:50% 100%;z-index:6;background:var(--dark);
  clip-path:polygon(50% 0,100% 88%,50% 100%,0 88%);
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);
}
.hub{position:absolute;left:var(--cx);top:var(--pivot);width:26px;height:26px;
  margin-left:-13px;margin-top:-13px;border-radius:50%;z-index:7;
  background:var(--wood);border:3px solid var(--dark);}

/* ----- trụ + đế ----- */
.post{position:absolute;left:var(--cx);top:var(--pivot);width:22px;margin-left:-11px;
  height:calc(var(--base-top) - var(--pivot));z-index:1;border-radius:7px 7px 0 0;
  background:var(--wood);border:2.5px solid var(--dark);border-bottom:none;}
.base{position:absolute;left:var(--cx);top:var(--base-top);transform:translateX(-50%);
  width:180px;height:30px;border-radius:50%/55%;z-index:1;
  background:var(--wood);border:2.5px solid var(--dark);}

/* ----- đòn cân (xoay quanh trục) ----- */
.beam{position:absolute;left:var(--cx);top:var(--pivot);width:calc(2 * var(--arm));height:13px;
  margin-left:calc(-1 * var(--arm));margin-top:-6.5px;border-radius:7px;z-index:5;
  transform-origin:50% 50%;background:var(--wood);border:2.5px solid var(--dark);
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);}

/* ----- bộ treo: điểm tại đầu đòn, phản xoay để dây luôn thẳng ----- */
.hanger{position:absolute;top:50%;width:0;height:0;transform-origin:0 0;
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);}
.hanger.l{left:0;}
.hanger.r{left:100%;}
/* dây treo chữ V — vẽ TRÊN ô (z cao) nên ô không che dây */
.chain{position:absolute;top:0;height:2px;background:var(--dark);transform-origin:left center;z-index:4;border-radius:2px;}
/* đĩa = dĩa nông */
.plate{position:absolute;left:50%;top:var(--string-len);transform:translateX(-50%);
  width:calc(2 * var(--plate-rad) + 18px);height:16px;border-radius:50%/60%;z-index:1;
  background:var(--wood);border:2.5px solid var(--dark);}
/* vùng xếp ô (CHẠM nhau, không nền/viền) */
.pan{position:absolute;left:50%;top:var(--string-len);transform:translateX(-50%);
  width:calc(4 * var(--unit));height:1px;z-index:2;}
.box-slot{position:absolute;transition:left .4s cubic-bezier(.34,1.35,.6,1),bottom .4s cubic-bezier(.34,1.35,.6,1);}
.pan .box{position:relative;width:100%;height:var(--box-h);   /* ô trên đĩa CHẠM nhau (slot kề sát) */
  transition:transform .32s cubic-bezier(.3,1.4,.5,1),opacity .25s ease;}
.pan .box .f{font-size:1.34rem;}
.pan .box.dropping{transform:translateY(-40px);opacity:.3;}   /* rơi NGẮN xuống đĩa */
.box-x{position:absolute;top:-7px;right:-7px;display:none;z-index:5;
  width:17px;height:17px;border-radius:50%;border:2px solid var(--bg);cursor:pointer;
  background:var(--bad);color:var(--bg);font:700 11px/1 system-ui;align-items:center;justify-content:center;padding:0;}
.box:hover .box-x,.box.show-x .box-x{display:flex;}

/* nút làm lại — icon, KHÔNG chữ */
.reset{position:absolute;left:50%;bottom:0;transform:translateX(-50%);z-index:8;
  width:42px;height:42px;border-radius:50%;border:2.5px solid var(--dark);cursor:pointer;
  background:var(--bg);display:flex;align-items:center;justify-content:center;padding:0;}
.reset svg{width:22px;height:22px;stroke:var(--dark);fill:none;stroke-width:2.4;stroke-linecap:round;}

/* ===== POPUP XÁC NHẬN (KHÔNG chữ) ===== */
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  padding:18px;background:rgba(90,61,35,.34);}
.modal.open{display:flex;}
.modal-card{background:var(--bg);border:3px solid var(--dark);border-radius:26px;padding:22px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  animation:cardIn .26s cubic-bezier(.34,1.5,.5,1);}
@keyframes cardIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.preview{display:flex;align-items:center;justify-content:center;gap:10px;min-height:54px;}
.preview .ev{font-size:2.4rem;}
.box.big{height:52px;}
.box.big.square{width:52px;} .box.big.rect{width:96px;}
.box.big .f{font-size:1.8rem;}
.preview .arrow{width:26px;height:18px;stroke:var(--dark);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
.preview .del-mark{position:relative;}
.preview .del-mark .x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font:700 2.4rem/1 system-ui;color:var(--bad);}
.preview .reset-ic{width:40px;height:40px;stroke:var(--dark);fill:none;stroke-width:2.6;stroke-linecap:round;}
.modal-btns{display:flex;gap:14px;}
.modal-btns button{width:66px;height:54px;border-radius:18px;border:2.5px solid var(--dark);cursor:pointer;
  font:700 1.6rem/1 system-ui;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.btn-ok{color:var(--good);}
.btn-no{color:var(--bad);}

/* ===== MOBILE: cân trên, 2 list xuống dưới ===== */
@media (max-width:860px){
  .stage{flex-direction:column;justify-content:flex-start;padding:10px 8px 24px;gap:14px;}
  .scale{order:-1;}
  .panel{width:min(94vw,360px);}
  .event-list{flex-direction:row;flex-wrap:wrap;justify-content:center;}
  .custom{flex-direction:row;justify-content:center;align-items:center;border-top:none;
    padding-top:0;border-left:2px dashed var(--wood);padding-left:10px;}
}
</style>
</head>
<body>
  <div class="stage">
    <!-- ===== LIST VIỆC TỐT (TRÁI 🙂) ===== -->
    <aside class="panel left">
      <div class="head">🙂</div>
      <ul class="event-list" id="leftList"></ul>
      <div class="custom">
        <input class="emoji-input" id="leftEmoji" maxlength="4" inputmode="text" aria-label="emoji">
        <div class="opt" id="leftOpt1" data-type="square"></div>
        <div class="opt" id="leftOpt2" data-type="rect"></div>
      </div>
    </aside>

    <!-- ===== CÂN ===== -->
    <div class="scale" id="scale">
      <div class="last" id="last"></div>
      <svg class="dial" id="dial"></svg>
      <div class="nums" id="nums"></div>
      <div class="needle" id="needle"></div>
      <div class="post"></div>
      <div class="base"></div>
      <div class="beam" id="beam">
        <div class="hanger l" id="hangerL">
          <div class="plate"></div>
          <div class="pan" id="panL"></div>
          <div class="chain ca"></div><div class="chain cb"></div>
        </div>
        <div class="hanger r" id="hangerR">
          <div class="plate"></div>
          <div class="pan" id="panR"></div>
          <div class="chain ca"></div><div class="chain cb"></div>
        </div>
      </div>
      <div class="hub"></div>
      <button class="reset" id="reset" aria-label="reset">
        <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 6"/><path d="M20 4v7h-7"/></svg>
      </button>
    </div>

    <!-- ===== LIST VIỆC CHƯA NGOAN (PHẢI 🙁) ===== -->
    <aside class="panel right">
      <div class="head">🙁</div>
      <ul class="event-list" id="rightList"></ul>
      <div class="custom">
        <input class="emoji-input" id="rightEmoji" maxlength="4" inputmode="text" aria-label="emoji">
        <div class="opt" id="rightOpt1" data-type="square"></div>
        <div class="opt" id="rightOpt2" data-type="rect"></div>
      </div>
    </aside>
  </div>

  <!-- ===== POPUP XÁC NHẬN ===== -->
  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="preview" id="preview"></div>
      <div class="modal-btns">
        <button class="btn-no" id="btnNo">✕</button>
        <button class="btn-ok" id="btnOk">✓</button>
      </div>
    </div>
  </div>

<!-- Firebase compat — đồng bộ trạng thái cân qua Realtime Database (giống dong-ho.html).
     Không tải được SDK -> tự rớt về localStorage một máy. -->
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-database-compat.js"></script>
<script>
/* ===== 1. TIỆN ÍCH & HẰNG SỐ ===== */
const $ = id => document.getElementById(id);
const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const pxVar = n => parseFloat(css(n));

const ARM=pxVar('--arm'), DIAL_R=pxVar('--dial-r'), STRING_LEN=pxVar('--string-len'),
      PLATE_RAD=pxVar('--plate-rad'), UNIT=pxVar('--unit'), BOX_H=pxVar('--box-h'),
      MAX_BEAM=pxVar('--max-beam'), MAX_DEG=pxVar('--max-deg'),
      CX=pxVar('--cx'), PIVOT=pxVar('--pivot');   // tâm trục (px) cho SVG mặt số
const CAP_UNITS=4;
const FACE={left:'🙂', right:'🙁'};
const weightOf = t => t==='rect' ? 2 : 1;
// deg đo từ 12 giờ, theo chiều kim -> [dx,dy] so với tâm
function polar(r,deg){ const a=(deg-90)*Math.PI/180; return [r*Math.cos(a), r*Math.sin(a)]; }

/* ===== 2. FIREBASE / STATE ===== */
let boxes=[], userItems=[], lastEvent=null;
let boxesRef=null, itemsRef=null, lastRef=null;
const LS_BOXES='candiaBoxes', LS_ITEMS='candiaItems', LS_LAST='candiaLast';

/* ⚠️ ĐỒNG BỘ ĐA THIẾT BỊ cần thêm RULE cho nhánh /candia trên Firebase Console
   (Realtime Database -> Rules), GỘP cùng rule /labels sẵn có:
       "candia": { ".read": true, ".write": true }
   Chưa thêm -> ghi bị permission_denied, app vẫn chạy LOCAL (localStorage). */
try{
  if(typeof firebase !== 'undefined'){
    firebase.initializeApp({
      apiKey: "AIzaSyCQnlQxrXyceuYHCNnyGIEAyU_KyBQUAXs",
      authDomain: "a2-1011-thoi-gian.firebaseapp.com",
      databaseURL: "https://a2-1011-thoi-gian-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "a2-1011-thoi-gian",
      storageBucket: "a2-1011-thoi-gian.firebasestorage.app",
      messagingSenderId: "1017684060626",
      appId: "1:1017684060626:web:636c64f4f049521074800b"
    });
    boxesRef = firebase.database().ref('candia/boxes');
    itemsRef = firebase.database().ref('candia/items');
    lastRef  = firebase.database().ref('candia/last');
  }
}catch(e){ boxesRef=itemsRef=lastRef=null; }

const genId = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const sortByAt = a => a.sort((x,y)=>(x.at-y.at)||(x.id<y.id?-1:1));
const parseArr = v => sortByAt(Object.keys(v).map(id=>({id,side:v[id].side,type:v[id].type,
    event:String(v[id].event||''),at:+v[id].at}))
  .filter(b=>(b.side==='left'||b.side==='right') && b.event && isFinite(b.at)));

function loadCache(){
  try{ boxes=JSON.parse(localStorage.getItem(LS_BOXES))||[]; }catch(e){ boxes=[]; }
  try{ userItems=JSON.parse(localStorage.getItem(LS_ITEMS))||[]; }catch(e){ userItems=[]; }
  try{ lastEvent=JSON.parse(localStorage.getItem(LS_LAST))||null; }catch(e){ lastEvent=null; }
  sortByAt(boxes); sortByAt(userItems);
}
const saveBoxes=()=>{ try{ localStorage.setItem(LS_BOXES,JSON.stringify(boxes)); }catch(e){} };
const saveItems=()=>{ try{ localStorage.setItem(LS_ITEMS,JSON.stringify(userItems)); }catch(e){} };
const saveLast =()=>{ try{ localStorage.setItem(LS_LAST,JSON.stringify(lastEvent)); }catch(e){} };

function startSync(){
  const onErr=()=>{};   // read-denied (chưa thêm rule) -> giữ cache local
  if(boxesRef) boxesRef.on('value', s=>{ const a=parseArr(s.val()||{});
    if(JSON.stringify(a)===JSON.stringify(boxes)) return; boxes=a; saveBoxes(); renderBoxes(); }, onErr);
  if(itemsRef) itemsRef.on('value', s=>{ const a=parseArr(s.val()||{});
    if(JSON.stringify(a)===JSON.stringify(userItems)) return; userItems=a; saveItems(); renderLists(); }, onErr);
  if(lastRef) lastRef.on('value', s=>{ const v=s.val();
    const n=(v&&v.event)?{event:String(v.event),side:v.side,at:+v.at}:null;
    if(JSON.stringify(n)===JSON.stringify(lastEvent)) return; lastEvent=n; saveLast(); renderLast(true); }, onErr);
}

/* ===== 3. DANH SÁCH SỰ VIỆC ===== */
const BASE_ITEMS=[
  {id:'base-brush', side:'left',  type:'square', event:'🪥'},   // 🪥 = 🙂
  {id:'base-yell',  side:'right', type:'rect',   event:'🗣️'},   // 🙁🙁 = 🗣️
];
const itemsFor = side => [...BASE_ITEMS.filter(i=>i.side===side), ...userItems.filter(i=>i.side===side)];

// Ô = khung vuông (1 emoji) / chữ nhật (2 emoji). cls: 'mini' | 'big' | '' (đĩa)
function boxHTML(side, type, cls){
  return `<span class="box ${cls} ${type==='rect'?'rect':'square'}">`+
    `<span class="f">${FACE[side]}</span>`.repeat(weightOf(type))+`</span>`;
}
function boxNode(side, type, cls){ const t=document.createElement('template'); t.innerHTML=boxHTML(side,type,cls); return t.content.firstChild; }
function makeRow(it){
  const li=document.createElement('li'); li.className='event-row';
  const ev=document.createElement('span'); ev.className='ev'; ev.textContent=it.event;
  const fc=boxNode(it.side, it.type, 'mini');
  if(it.side==='left') li.append(ev, fc); else li.append(fc, ev);   // phải = gương
  if(!it.id.startsWith('base-')){
    const del=document.createElement('button'); del.className='row-del'; del.textContent='×';
    del.addEventListener('click', e=>{ e.stopPropagation(); removeItem(it.id); });
    li.appendChild(del);
  }
  li.addEventListener('click', ()=>askAdd(it.side, it.type, it.event, false));
  return li;
}
function renderLists(){
  for(const side of ['left','right']){
    const ul = side==='left'?$('leftList'):$('rightList');
    ul.innerHTML='';
    for(const it of itemsFor(side)) ul.appendChild(makeRow(it));
  }
  // 2 option custom = preview ô đơn / ô đôi (giống row trong list)
  for(const side of ['left','right']){
    const o1=$(side+'Opt1'), o2=$(side+'Opt2');
    o1.innerHTML=''; o1.appendChild(boxNode(side,'square','mini'));
    o2.innerHTML=''; o2.appendChild(boxNode(side,'rect','mini'));
  }
}
function addItem(side, type, event){
  // bỏ qua nếu đã có hệt trong list (tránh trùng)
  if(itemsFor(side).some(i=>i.event===event && i.type===type)) return;
  const it={id:genId('i'), side, type, event, at:Date.now()};
  if(itemsRef) itemsRef.child(it.id).set({side,type,event,at:it.at}).catch(()=>{});
  userItems.push(it); sortByAt(userItems); saveItems(); renderLists();
}
function removeItem(id){
  if(itemsRef) itemsRef.child(id).remove().catch(()=>{});
  userItems=userItems.filter(i=>i.id!==id); saveItems(); renderLists();
}

/* ===== 4. Ô TRÊN ĐĨA — xếp CHẠM nhau & rơi NGẮN ===== */
const boxEls=new Map();   // id -> .box-slot
function buildBox(b){
  const slot=document.createElement('div'); slot.className='box-slot';
  const box=document.createElement('div'); box.className='box dropping '+(b.type==='rect'?'rect':'square');
  for(let i=0;i<weightOf(b.type);i++){ const f=document.createElement('span'); f.className='f'; f.textContent=FACE[b.side]; box.appendChild(f); }
  const x=document.createElement('button'); x.className='box-x'; x.textContent='×';
  x.addEventListener('click', e=>{ e.stopPropagation(); askDelete(b.id); });
  box.appendChild(x);
  box.addEventListener('click', ()=>box.classList.toggle('show-x'));   // chạm để hiện × (mobile)
  slot.appendChild(box);
  return slot;
}
function renderBoxes(){
  const present=new Set(boxes.map(b=>b.id));
  for(const [id,el] of boxEls){ if(!present.has(id)){ el.remove(); boxEls.delete(id); } }
  for(const b of boxes){
    if(boxEls.has(b.id)) continue;
    const slot=buildBox(b);
    $(b.side==='left'?'panL':'panR').appendChild(slot); boxEls.set(b.id, slot);
    const box=slot.firstChild;
    requestAnimationFrame(()=>requestAnimationFrame(()=>box.classList.remove('dropping')));
  }
  layoutBoxes('left'); layoutBoxes('right'); updateBalance();
}
// xếp bottom-up, mỗi tầng tối đa 4 đơn vị, các ô CHẠM nhau (không hở), căn giữa tầng
function layoutBoxes(side){
  const list=boxes.filter(b=>b.side===side);
  const rows=[]; let cur=[], used=0;
  for(const b of list){ const w=weightOf(b.type);
    if(used+w>CAP_UNITS){ rows.push(cur); cur=[]; used=0; } cur.push(b); used+=w; }
  if(cur.length) rows.push(cur);
  const contentW=CAP_UNITS*UNIT;
  rows.forEach((row,r)=>{
    const rowW=row.reduce((s,b)=>s+weightOf(b.type),0)*UNIT;
    let x=(contentW-rowW)/2;
    for(const b of row){ const w=weightOf(b.type)*UNIT; const slot=boxEls.get(b.id);
      if(slot){ slot.style.left=x+'px'; slot.style.bottom=(r*BOX_H)+'px'; slot.style.width=w+'px'; }
      x+=w; }
  });
}

/* ===== 5. CÂN BẰNG — kim / đòn / đĩa ===== */
function updateBalance(){
  let lw=0, rw=0;
  for(const b of boxes){ (b.side==='left'?lw+=weightOf(b.type):rw+=weightOf(b.type)); }
  const diff=lw-rw;
  const n=Math.max(-10,Math.min(10,diff))/10;   // -1..1
  const beamDeg=-n*MAX_BEAM, needleDeg=-n*MAX_DEG;   // trái nặng -> đầu trái hạ, kim lệch trái
  $('beam').style.transform=`rotate(${beamDeg}deg)`;
  $('needle').style.transform=`rotate(${needleDeg}deg)`;
  $('hangerL').style.transform=`rotate(${-beamDeg}deg)`;
  $('hangerR').style.transform=`rotate(${-beamDeg}deg)`;
}
// mặt số + vạch + số (vòng số gắn trên trục = một phần cân)
function buildDial(){
  const nums=$('nums'); nums.innerHTML='';
  for(let v=-10; v<=10; v++){
    const el=document.createElement('div'); el.className='tickn'+(v===0?' zero':''); el.textContent=Math.abs(v);
    const [x,y]=polar(DIAL_R, v/10*MAX_DEG); el.style.left=x+'px'; el.style.top=y+'px';
    nums.appendChild(el);
  }
  // tọa độ TUYỆT ĐỐI trong SVG (gốc 0,0 = góc khu cân) -> cộng tâm trục
  const P=(r,deg)=>{ const [dx,dy]=polar(r,deg); return [CX+dx, PIVOT+dy]; };
  const RB=DIAL_R+14, RBi=DIAL_R-16;     // dải mặt số (gỗ) bao quanh số
  const dialArc=(r)=>{ const [ax,ay]=P(r,-MAX_DEG), [bx,by]=P(r,MAX_DEG);
    return `M ${ax} ${ay} A ${r} ${r} 0 0 1 ${bx} ${by}`; };
  let ticks='';
  for(let v=-10; v<=10; v++){ const [x1,y1]=P(RBi+3, v/10*MAX_DEG), [x2,y2]=P(RBi+11, v/10*MAX_DEG);
    ticks+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--dark)" stroke-width="${v===0?2.6:1.6}" stroke-linecap="round"/>`; }
  $('dial').innerHTML =
    `<path d="${dialArc((RB+RBi)/2)}" fill="none" stroke="var(--wood)" stroke-width="${RB-RBi}" stroke-linecap="round"/>`+
    `<path d="${dialArc(RB)}" fill="none" stroke="var(--dark)" stroke-width="2.5"/>`+
    `<path d="${dialArc(RBi)}" fill="none" stroke="var(--dark)" stroke-width="2.5"/>`+ticks;
}
// dây treo chữ V — dài/góc tính 1 lần; vẽ TRÊN ô nên ô không che dây
function layoutChains(){
  const len=Math.hypot(PLATE_RAD, STRING_LEN);
  const ang=Math.atan2(STRING_LEN, PLATE_RAD)*180/Math.PI;   // từ trục NGANG
  document.querySelectorAll('.hanger').forEach(h=>{
    const a=h.querySelector('.ca'), b=h.querySelector('.cb');
    a.style.width=len+'px'; a.style.transform=`rotate(${ang}deg)`;     // xuống-phải tới rìa phải
    b.style.width=len+'px'; b.style.transform=`rotate(${180-ang}deg)`; // xuống-trái tới rìa trái
  });
}
function renderLast(animate){
  const el=$('last');
  if(!lastEvent){ el.classList.remove('show'); return; }
  el.textContent=lastEvent.event; el.classList.add('show');
  if(animate){ el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
}

/* ===== 6. POPUP XÁC NHẬN + THAO TÁC ===== */
let pending=null;   // {kind:'add'|'delete'|'reset', ...}
const ARROW='<svg class="arrow" viewBox="0 0 24 18"><path d="M3 9h16M14 4l5 5-5 5"/></svg>';
function openModal(html){ $('preview').innerHTML=html; $('modal').classList.add('open'); }
function closeModal(){ $('modal').classList.remove('open'); pending=null; }

function askAdd(side, type, event, persist){
  pending={kind:'add', side, type, event, persist};
  openModal(`<span class="ev">${event}</span>${ARROW}${boxHTML(side,type,'big')}`);
}
function askDelete(id){
  const b=boxes.find(x=>x.id===id); if(!b) return;
  pending={kind:'delete', id};
  openModal(`<span class="del-mark">${boxHTML(b.side,b.type,'big')}<span class="x">✕</span></span>`);
}
function askReset(){
  if(!boxes.length) return;
  pending={kind:'reset'};
  openModal('<svg class="reset-ic" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 6"/><path d="M20 4v7h-7"/></svg>');
}
function confirmPending(){
  if(!pending) return;
  if(pending.kind==='add'){
    if(pending.persist) addItem(pending.side, pending.type, pending.event);
    dropBox(pending.side, pending.type, pending.event);
  }else if(pending.kind==='delete'){ removeBox(pending.id); }
  else if(pending.kind==='reset'){ resetScale(); }
  closeModal();
}
function dropBox(side, type, event){
  const b={id:genId('b'), side, type, event, at:Date.now()};
  if(boxesRef) boxesRef.child(b.id).set({side,type,event,at:b.at}).catch(()=>{});
  boxes.push(b); sortByAt(boxes); saveBoxes(); renderBoxes();
  lastEvent={event, side, at:Date.now()};
  if(lastRef) lastRef.set(lastEvent).catch(()=>{}); saveLast(); renderLast(true);
}
function removeBox(id){
  if(boxesRef) boxesRef.child(id).remove().catch(()=>{});
  boxes=boxes.filter(b=>b.id!==id); saveBoxes(); renderBoxes();
}
function resetScale(){
  if(boxesRef) boxesRef.remove().catch(()=>{});
  boxes=[]; saveBoxes(); renderBoxes();
}

// hàng custom: nhập emoji rồi click 1 trong 2 option -> popup (persist=true)
function wireCustom(side){
  const input=$(side+'Emoji');
  [['Opt1','square'],['Opt2','rect']].forEach(([sfx,type])=>{
    $(side+sfx).addEventListener('click', ()=>{
      const ev=input.value.trim();
      if(!ev){ input.focus(); return; }
      askAdd(side, type, ev, true);
      input.value='';
    });
  });
}

/* ===== 7. KHỞI ĐỘNG ===== */
function init(){
  buildDial(); layoutChains(); loadCache();
  renderLists(); renderBoxes(); renderLast(false);
  wireCustom('left'); wireCustom('right');
  $('btnOk').addEventListener('click', confirmPending);
  $('btnNo').addEventListener('click', closeModal);
  $('modal').addEventListener('click', e=>{ if(e.target===$('modal')) closeModal(); });
  $('reset').addEventListener('click', askReset);
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
  startSync();
}
init();
</script>
