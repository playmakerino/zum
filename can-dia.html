<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cân Đĩa</title>
<style>
/* ============================================================
   CÂN ĐĨA THƯỞNG PHẠT — giao diện KHÔNG chữ, cho trẻ nhỏ
   ------------------------------------------------------------
   • Đĩa PHẢI 🙂 (việc tốt) / TRÁI 🙁 (việc chưa ngoan)
   • Ô vuông = 1 emoji (nặng 1) · ô chữ nhật = 2 emoji (nặng 2); ô CHẠM nhau
   • Kim chỉ |hiệu trọng lượng| 0..20 mỗi bên; đòn nghiêng về đĩa nặng
   • Mặt số bán nguyệt + kim + đòn CHUNG 1 TÂM (gắn ở trục cân)
   • Sync Realtime Database Firebase /candia, fallback localStorage 1 máy
   • Desktop KHÔNG cuộn (fit chiều cao) · Mobile cân trên + 2 list dưới, CÓ cuộn
   ------------------------------------------------------------
   BẢNG MÀU Color Hunt d35d6e-efb08c-f8d49d-5aa469 — solid, KHÔNG
   gradient / shadow / border / ::before / ::after:
     --bg  #FBF6EC nền trắng-ấm   --wood/--accent #EFB08C peach (khung)
     --disc #F8D49D vàng-kem (mặt số/trục)
     --good #5AA469 xanh lá = PHẢI   --bad #D35D6E đỏ rose = TRÁI
   ============================================================ */

/* ===== 1. DESIGN TOKENS ===== */
:root{
  /* màu */
  --bg:#FBF6EC;           /* nền trắng-ấm (dẫn xuất để 4 màu palette nổi) */
  --wood:#EFB08C;         /* khung sơn peach: đòn / đế */
  --disc:#F8D49D;         /* mặt số bán nguyệt + trục + hub (vàng-kem) */
  --good:#5AA469;         /* phe PHẢI — việc tốt (xanh lá) */
  --bad:#D35D6E;          /* phe TRÁI — chưa ngoan (đỏ rose) */
  --accent:#EFB08C;       /* icon trên núm reset (cùng tông gỗ) */
  --radius:8px;           /* bo góc DUY NHẤT cho mọi hcn (50% chỉ cho nút tròn) */

  /* hình học khu cân (px) — JS đọc lại qua getComputedStyle */
  --cx:207px;             /* trục X chung (= nửa bề ngang .scale) */
  --pivot:130px;          /* tâm CHUNG đòn/kim/mặt số (disc-cy == pivot) */
  --disc-cy:130px;
  --disc-r:74px;          /* bán kính mặt số bán nguyệt */
  --arm:145px;            /* nửa đòn cân */
  --dial-r:72px;          /* bán kính đặt vạch khắc */
  --needle-len:52px;      /* dài kim (< vạch trong -> không đè vạch) */
  --string-len:100px;     /* dài dây treo */
  --plate-rad:44px;       /* nửa miệng đĩa cân (vừa 4 ô = 4*26) */
  --base-top:280px;       /* đỉnh đế (đáy trục) */
  --unit:26px;            /* bề rộng 1 đơn vị ô trên đĩa */
  --box-h:26px;           /* cao 1 ô trên đĩa */
  --max-beam:9;           /* nghiêng đòn tối đa (deg) */
  --max-deg:70;           /* góc kim tối đa (deg) */
  --s:1.4;                /* hệ số phóng to khu cân (JS ghi đè theo màn hình) */
}

/* ===== 2. RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;border:0;}   /* border:0 -> sạch viền mọi nơi (cả control native) */
button,input{outline:none;background:none;font:inherit;color:inherit;}
html,body{height:100%;}
body{
  min-height:100dvh;background:var(--bg);color:var(--wood);
  font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;                 /* chặn tràn ngang; cuộn DỌC để mobile dùng được */
}
.preload *{transition:none!important;animation:none!important;}   /* tắt animation lúc F5 (JS gỡ sau khung hình đầu) */

/* ===== 3. KHUNG TRANG: list TRÁI | cân | list PHẢI ===== */
.stage{
  min-height:100dvh;display:flex;align-items:center;justify-content:space-between;
  gap:6px;padding:0 8px;
}

/* ===== 4. LIST SỰ VIỆC 2 BÊN ===== */
.panel{width:clamp(132px,17vw,210px);flex:0 0 auto;display:flex;flex-direction:column;gap:9px;}
.event-list{list-style:none;display:flex;flex-direction:column;gap:11px;}

/* 1 row = [emoji] = [ô-button] trên 1 DÒNG (nowrap, không viền) */
.event-row{position:relative;display:flex;align-items:center;justify-content:center;
  gap:8px;flex-wrap:nowrap;white-space:nowrap;min-height:38px;}
.ev{position:relative;width:36px;flex:0 0 auto;text-align:center;font-size:1.5rem;line-height:1;}  /* width cố định = ô -> thẳng cột */
.eq{width:16px;flex:0 0 auto;text-align:center;font-size:1.2rem;font-weight:700;}
.panel.left  .eq{color:var(--bad);}    /* dấu = theo phe */
.panel.right .eq{color:var(--good);}
.panel.left  .event-row,.panel.left  .custom{justify-content:flex-start;}   /* TRÁI căn trái */
.panel.right .event-row,.panel.right .custom{justify-content:flex-end;}     /* PHẢI căn phải */

/* nút × xóa-ITEM — gắn vào EMOJI. Desktop: hover emoji. Mobile: chạm emoji (.show-del).
   KHÔNG hiện theo hover/chạm Ô -> chạm ô 1 lần là ra popup ngay (không bị double-tap). */
.row-del{position:absolute;top:-8px;display:none;z-index:3;width:18px;height:18px;
  border-radius:50%;cursor:pointer;background:var(--bad);color:var(--bg);
  font:700 12px/1 system-ui;align-items:center;justify-content:center;}
.panel.left  .row-del{left:0;}      /* sát góc emoji, KHÔNG tràn mép list */
.panel.right .row-del{right:0;}     /* (list cuộn dọc -> tràn ngang sẽ sinh scrollbar) */
.event-row.show-del .row-del{display:flex;}                 /* mobile: chạm emoji */
@media (hover:hover){ .ev:hover .row-del{display:flex;} }   /* desktop: hover emoji */

/* hàng custom = [ô nhập emoji] = [ô đơn][ô đôi] */
.custom{margin-top:6px;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;flex-wrap:nowrap;}
.emoji-input{width:36px;height:36px;flex:0 0 auto;border-radius:var(--radius);
  background:rgba(248,212,157,.55);text-align:center;font-size:1.3rem;line-height:1;color:var(--wood);}
.panel.left  .emoji-input{caret-color:var(--bad);}    /* dấu nháy theo phe */
.panel.right .emoji-input{caret-color:var(--good);}

/* ===== 5. Ô (.box) — dùng chung: list (.mini) · popup (.big) · đĩa (mặc định) ===== */
.box{display:inline-flex;align-items:center;justify-content:center;
  border-radius:var(--radius);background:var(--disc);}   /* tile phẳng nền solid */
.box.left{background:var(--bad);}      /* TRÁI = rose */
.box.right{background:var(--good);}    /* PHẢI = mint */
.box .f{line-height:1;}
/* .mini = nút bấm trong list & hàng custom */
.box.mini{position:relative;height:36px;cursor:pointer;user-select:none;transition:transform .12s ease;}
.box.mini.square{width:36px;}
.box.mini.rect{width:64px;}
.box.mini .f{font-size:1.32rem;}
@media (hover:hover){ .box.mini:hover{transform:translateY(-3px) scale(1.04);} }  /* chỉ thiết bị có hover -> mobile không bị double-tap/sticky hover */
.box.mini:active{transform:scale(.93);}

/* ===== 6. KHU CÂN ===== */
.scale-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;}   /* cân + reset xếp DỌC */
.scale{position:relative;width:414px;height:312px;
  transform:scale(var(--s));transform-origin:center;
  margin:calc(156px*(var(--s) - 1)) calc(207px*(var(--s) - 1));}   /* margin bù để layout-box = visual (414*s × 312*s) */

/* mặt số = ĐĨA bán nguyệt phẳng (SVG path) — không số, chỉ vạch khắc; kim/hub vẽ đè */
.dial{position:absolute;left:0;top:0;width:414px;height:312px;z-index:2;overflow:visible;pointer-events:none;}

/* kim — xoay tại tâm đĩa; KHÔNG đổi màu (luôn --wood) */
.needle{position:absolute;left:var(--cx);top:var(--disc-cy);z-index:6;
  width:11px;height:var(--needle-len);margin-left:-5.5px;margin-top:calc(-1*var(--needle-len));
  transform-origin:50% 100%;background:var(--wood);
  clip-path:polygon(50% 0,100% 86%,50% 100%,0 86%);
  will-change:transform;                                 /* lên layer riêng -> mobile chốt đúng khung cuối, không kẹt lệch */
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);}
/* hub = chấm tròn ở tâm chung */
.hub{position:absolute;left:var(--cx);top:var(--pivot);z-index:8;
  width:10px;height:10px;margin-left:-5px;margin-top:-5px;border-radius:50%;background:var(--disc);}
/* trục cân (cùng màu mặt số) */
.post{position:absolute;left:var(--cx);top:var(--disc-cy);z-index:1;
  width:26px;margin-left:-13px;height:calc(var(--base-top) - var(--disc-cy));background:var(--disc);}
/* đế = tấm chữ nhật phẳng (dài = đường kính bán nguyệt) */
.base{position:absolute;left:var(--cx);top:var(--base-top);z-index:2;transform:translateX(-50%);
  width:calc(2*var(--disc-r));height:28px;border-radius:var(--radius);background:var(--wood);}
/* đòn cân = tấm gỗ phẳng */
.beam{position:absolute;left:var(--cx);top:var(--pivot);z-index:5;
  width:calc(2*var(--arm));height:15px;margin-left:calc(-1*var(--arm));margin-top:-7.5px;
  border-radius:var(--radius);transform-origin:50% 50%;background:var(--wood);
  will-change:transform;
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);}

/* bộ treo: neo ở đầu đòn, phản-xoay để dây/đĩa luôn thẳng đứng */
.hanger{position:absolute;top:50%;width:0;height:0;transform-origin:0 0;
  will-change:transform;
  transition:transform .8s cubic-bezier(.32,1.4,.55,1);}
.hanger.l{left:0;}
.hanger.r{left:100%;}
/* dây treo chữ V (vẽ TRÊN ô; màu mờ theo phe) */
.chain{position:absolute;top:0;height:2.5px;z-index:4;transform-origin:left center;border-radius:var(--radius);}
.hanger.l .chain{background:rgba(211,93,110,.6);}
.hanger.r .chain{background:rgba(90,164,105,.6);}
/* đĩa cân = 1 ĐOẠN THẲNG solid theo phe; ô đặt LÊN TRÊN */
.plate{position:absolute;left:50%;top:var(--string-len);z-index:1;transform:translateX(-50%);
  width:calc(2*var(--plate-rad) + 26px);height:5px;border-radius:var(--radius);}
.hanger.l .plate{background:var(--bad);}
.hanger.r .plate{background:var(--good);}
/* vùng xếp ô (4 ô/hàng) */
.pan{position:absolute;left:50%;top:var(--string-len);z-index:2;transform:translateX(-50%);
  width:calc(4*var(--unit));height:1px;}
.box-slot{position:absolute;
  transition:left .4s cubic-bezier(.34,1.35,.6,1),bottom .4s cubic-bezier(.34,1.35,.6,1);}
.pan .box{position:relative;width:100%;height:var(--box-h);   /* ô trên đĩa CHẠM nhau */
  transition:transform .32s cubic-bezier(.3,1.4,.5,1),opacity .25s ease;}
.pan .box .f{font-size:.94rem;}
.pan .box.dropping{transform:translateY(-40px);opacity:.3;}   /* rơi NGẮN xuống đĩa */
/* badge emoji sự việc (góc trên-phải) + nút × xóa-ô (góc trên-trái) */
.box-badge{position:absolute;top:-8px;right:-7px;z-index:6;font-size:.82rem;line-height:1;}
.box-x{position:absolute;top:-9px;left:-9px;display:none;z-index:7;width:18px;height:18px;
  border-radius:50%;cursor:pointer;background:var(--bad);color:var(--bg);
  font:700 11px/1 system-ui;align-items:center;justify-content:center;}
.pan .box.show-x .box-x{display:flex;}                          /* mobile: chạm khối */
@media (hover:hover){ .pan .box:hover .box-x{display:flex;} }   /* desktop: hover khối */

/* ===== 7. NÚM RESET (tròn, ngay dưới cân) ===== */
.reset{z-index:50;width:48px;height:48px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;background:var(--disc);}
.reset:active{transform:scale(.94);}
.reset svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:2.6;stroke-linecap:round;}

/* ===== 8. POPUP XÁC NHẬN (KHÔNG chữ) ===== */
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:18px;}
.modal.open{display:flex;}
.modal-card{background:var(--bg);border-radius:var(--radius);padding:22px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  animation:cardIn .26s cubic-bezier(.34,1.5,.5,1);}
@keyframes cardIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.preview{display:flex;align-items:center;justify-content:center;gap:10px;min-height:54px;}
.box.big{position:relative;height:52px;}     /* relative -> badge neo vào ô */
.box.big.square{width:52px;}
.box.big.rect{width:96px;}
.box.big .f{font-size:1.8rem;}
.box.big .box-badge{font-size:1.5rem;top:-12px;right:-10px;}
.preview .del-mark{position:relative;}
.preview .del-mark .x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font:700 2.4rem/1 system-ui;color:var(--bad);}
.preview .del-mark.left .x{color:var(--good);}   /* xóa ô rose -> ✕ xanh cho tương phản */
.preview .reset-ic{width:40px;height:40px;stroke:var(--bad);fill:none;stroke-width:2.6;stroke-linecap:round;}
.modal-btns{display:flex;gap:14px;}
.modal-btns button{width:52px;height:52px;border-radius:var(--radius);cursor:pointer;color:var(--bg);
  font:700 1.6rem/1 system-ui;display:flex;align-items:center;justify-content:center;}
.btn-ok{background:var(--good);}
.btn-no{background:var(--bad);}

/* ===== 9. RESPONSIVE =====
   Desktop ≥861px: KHÓA cuộn trang; cân fit chiều cao (fitScale, cap 1.4);
                   list dài thì cuộn TRONG cột.
   Mobile  ≤860px: cân full hàng trên (fitScale theo bề ngang) + 2 list 2 cột
                   hàng dưới; TRANG ĐƯỢC cuộn dọc. */
@media (min-width:861px){
  html,body{height:100%;overflow:hidden;}     /* desktop KHÔNG cuộn */
  .stage{height:100dvh;}
  .panel{max-height:100dvh;}
  .event-list{flex:0 1 auto;min-height:0;overflow-y:auto;padding-top:10px;}  /* chừa chỗ cho × (top:-8px) của row đầu khỏi bị cắt */
  .custom{flex:0 0 auto;}
}
@media (max-width:860px){
  .stage{flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:flex-start;
    align-content:flex-start;padding:10px 6px 24px;gap:8px 10px;}
  .scale-wrap{order:-1;width:100%;}            /* cân + reset chiếm trọn hàng trên */
  .panel{flex:1 1 0;min-width:0;}              /* 2 list chia đôi đều hàng dưới */
}
</style>
</head>

<!-- Firebase compat — sync trạng thái qua Realtime Database; không tải được SDK -> localStorage 1 máy -->
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-database-compat.js"></script>
<script>
"use strict";

/* ===== 1. TIỆN ÍCH & HẰNG SỐ ===== */
const $ = id => document.getElementById(id);
const cssVar = n => parseFloat(getComputedStyle(document.documentElement).getPropertyValue(n));

// hình học cân — đọc 1 lần từ CSS token (xem :root)
const ARM=cssVar('--arm'), DIAL_R=cssVar('--dial-r'), STRING_LEN=cssVar('--string-len'),
      PLATE_RAD=cssVar('--plate-rad'), UNIT=cssVar('--unit'), BOX_H=cssVar('--box-h'),
      MAX_BEAM=cssVar('--max-beam'), MAX_DEG=cssVar('--max-deg'),
      CX=cssVar('--cx'), PIVOT=cssVar('--pivot'), DISC_CY=cssVar('--disc-cy'), DISC_R=cssVar('--disc-r');

const SCALE_W=414, SCALE_H=312;   // kích thước gốc .scale (px) — dùng cho fitScale
const CAP_UNITS=4;                // 4 đơn vị / hàng trên đĩa
const MAX_DIFF=20;                // |hiệu| tối đa kim đo được (mỗi bên)
const FACE={left:'🙁', right:'🙂'};
const SIDES=['left','right'];

const weightOf = type => type==='rect' ? 2 : 1;
const isSide   = s => s==='left' || s==='right';
const genId    = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const sortByAt = a => a.sort((x,y)=>(x.at-y.at) || (x.id<y.id?-1:1));
// deg đo từ 12 giờ theo chiều kim -> [dx,dy] lệch so với tâm
const polar = (r,deg)=>{ const a=(deg-90)*Math.PI/180; return [r*Math.cos(a), r*Math.sin(a)]; };
// snapshot Firebase {id:{...}} -> mảng record đã lọc & sort
const parseSnap = v => sortByAt(Object.keys(v||{})
  .map(id=>({id, side:v[id].side, type:v[id].type, event:String(v[id].event||''), at:+v[id].at}))
  .filter(r=>isSide(r.side) && r.event && isFinite(r.at)));

/* ===== 2. FIREBASE + STORE (boxes = ô trên đĩa · items = mẫu trong list) =====
   ⚠️ Sync đa thiết bị cần thêm rule nhánh /candia trên Firebase Console
   (Realtime Database -> Rules), gộp cùng /labels:  "candia":{".read":true,".write":true}
   Chưa thêm -> ghi permission_denied, app vẫn chạy LOCAL (localStorage). */
let boxesRef=null, itemsRef=null;
try{
  if(typeof firebase !== 'undefined'){
    firebase.initializeApp({
      apiKey: "AIzaSyCQnlQxrXyceuYHCNnyGIEAyU_KyBQUAXs",
      authDomain: "a2-1011-thoi-gian.firebaseapp.com",
      databaseURL: "https://a2-1011-thoi-gian-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "a2-1011-thoi-gian",
      storageBucket: "a2-1011-thoi-gian.firebasestorage.app",
      messagingSenderId: "1017684060626",
      appId: "1:1017684060626:web:636c64f4f049521074800b"
    });
    boxesRef = firebase.database().ref('candia/boxes');
    itemsRef = firebase.database().ref('candia/items');
  }
}catch(e){ boxesRef=itemsRef=null; }

// Store thống nhất cho 1 nhánh: giữ mảng `data` ổn định (mutate tại chỗ),
// đồng bộ Firebase + localStorage, gọi render() sau mỗi thay đổi.
function makeStore(data, ref, lsKey, render){
  const persist  = ()=>{ try{ localStorage.setItem(lsKey, JSON.stringify(data)); }catch(e){} };
  const replace  = next=>{ const seen=new Set(); data.length=0;          // khử trùng id (chữa lành cache cũ đã lỡ nhân đôi)
                           for(const r of next){ if(seen.has(r.id)) continue; seen.add(r.id); data.push(r); }
                           sortByAt(data); };
  const toRecord = r => ({side:r.side, type:r.type, event:r.event, at:r.at});
  return {
    load(){ let v=[]; try{ v=JSON.parse(localStorage.getItem(lsKey))||[]; }catch(e){} replace(v); },
    add(rec){ if(ref) ref.child(rec.id).set(toRecord(rec)).catch(()=>{});
              // RTDB bắn 'value' (latency compensation) NGAY trong .set() -> sync() đã replace() chèn rec;
              // chỉ push khi chưa có -> không nhân đôi (kim/đòn đếm dư 1 đơn vị tới khi F5).
              if(!data.some(x=>x.id===rec.id)) data.push(rec);
              sortByAt(data); persist(); render(); },
    remove(id){ const i=data.findIndex(x=>x.id===id); if(i>=0) data.splice(i,1); persist(); render();
              if(ref) ref.child(id).remove().catch(()=>{}); },   // sửa local TRƯỚC -> echo rỗng không bị re-seed hồi sinh
    clear(){ data.length=0; persist(); render();                 // xóa local TRƯỚC -> Reset không bị re-seed hồi sinh
             if(ref) ref.remove().catch(()=>{}); },
    sync(){ if(!ref) return;
            ref.on('value', s=>{ const next=parseSnap(s.val());
              if(JSON.stringify(next)===JSON.stringify(data)) return;   // bỏ qua echo của chính mình
              // CHỐNG MẤT DATA: remote rỗng mà local còn data -> KHÔNG xóa local. (Reset trên MÁY NÀY đã xóa
              // local trước nên data=[] -> không rơi vào đây.) Đẩy ngược local lên Firebase để TỰ LÀNH khi node
              // bị xóa từ ngoài / chưa kịp đồng bộ. Đánh đổi: Reset từ MÁY KHÁC sẽ bị máy này dựng lại.
              if(!next.length && data.length){            // dựng object rồi set 1 LẦN (atomic): tránh echo giữa vòng làm co data
                const obj={}; for(const r of data) obj[r.id]=toRecord(r); ref.set(obj).catch(()=>{}); return; }
              replace(next); persist(); render(); }, ()=>{}); }   // onErr: read-denied -> giữ cache local
  };
}
const boxes=[], items=[];   // mảng ổn định, các hàm render đọc trực tiếp
const boxStore  = makeStore(boxes, boxesRef, 'candiaBoxes', renderBoxes);
const itemStore = makeStore(items, itemsRef, 'candiaItems', renderLists);

/* ===== 3. LIST SỰ VIỆC (mẫu tái dùng — KHÔNG có mặc định) ===== */
// id mẫu = HÀM của nội dung -> mỗi (phe+loại+emoji) chỉ 1 bản ghi, add lại = ghi đè
// (tránh nhân đôi row khi đồng bộ Firebase / nhiều thiết bị).
const itemId = (side, type, event) => `i_${side}_${type}_${encodeURIComponent(event).replace(/\./g,'%2E')}`;
// Lọc theo phe + KHỬ TRÙNG nội dung (chữa lành dữ liệu cũ có bản ghi trùng).
const itemsFor = side => { const seen=new Set();
  return items.filter(i=>{ if(i.side!==side) return false;
    const k=i.type+'\n'+i.event; if(seen.has(k)) return false; seen.add(k); return true; }); };

// Ô (vuông/chữ nhật) màu theo phe. cls: 'mini' (list) | 'big' (popup) | '' (đĩa)
function boxHTML(side, type, cls){
  const faces = `<span class="f">${FACE[side]}</span>`.repeat(weightOf(type));
  return `<span class="box ${cls} ${side} ${type==='rect'?'rect':'square'}">${faces}</span>`;
}
function boxNode(side, type, cls){
  const t=document.createElement('template'); t.innerHTML=boxHTML(side,type,cls); return t.content.firstChild;
}
// ẩn MỌI nút × đang hiện (× list .show-del + × ô đĩa .show-x) — chạm chỗ khác thì gọi
const clearRowX = ()=>{
  for(const el of document.querySelectorAll('.event-row.show-del')) el.classList.remove('show-del');
  for(const el of document.querySelectorAll('.box.show-x'))         el.classList.remove('show-x');
};
// 1 row = [emoji] = [ô-button]; CHỈ ô là button. Nút × xóa-item gắn vào emoji.
function makeRow(it){
  const li=document.createElement('li'); li.className='event-row';
  const ev=document.createElement('span'); ev.className='ev'; ev.textContent=it.event;
  const eq=document.createElement('span'); eq.className='eq'; eq.textContent='=';
  const box=boxNode(it.side, it.type, 'mini');
  box.addEventListener('click', ()=>askAdd(it.side, it.type, it.event, false));   // chạm Ô -> popup
  const del=document.createElement('button'); del.className='row-del'; del.textContent='×';
  del.addEventListener('click', e=>{ e.stopPropagation(); removeItem(it); });
  ev.addEventListener('click', e=>{ e.stopPropagation(); const on=li.classList.contains('show-del'); clearRowX(); if(!on) li.classList.add('show-del'); });   // chạm EMOJI -> hiện/ẩn × (chỉ 1 × 1 lúc)
  ev.appendChild(del);
  it.side==='left' ? li.append(ev,eq,box) : li.append(box,eq,ev);   // PHẢI = gương
  return li;
}
function renderLists(){
  for(const side of SIDES){
    const ul=$(side+'List'); ul.innerHTML='';
    for(const it of itemsFor(side)) ul.appendChild(makeRow(it));
    // 2 ô-option custom: nhập emoji trước -> click ô -> popup. Ô VUÔNG sát dấu =, ô ĐÔI ra ngoài.
    const mk = type => { const b=boxNode(side,type,'mini'); b.addEventListener('click', ()=>{
      const ev=$(side+'Emoji').value.trim(); if(!ev){ $(side+'Emoji').focus(); return; }
      askAdd(side, type, ev, true); $(side+'Emoji').value='';
    }); return b; };
    const inner=$(side+(side==='left'?'Opt1':'Opt2')), outer=$(side+(side==='left'?'Opt2':'Opt1'));
    inner.replaceChildren(mk('square'));
    outer.replaceChildren(mk('rect'));
  }
}
function addItem(side, type, event){
  if(itemsFor(side).some(i=>i.event===event && i.type===type)) return;   // tránh trùng
  itemStore.add({id:itemId(side,type,event), side, type, event, at:Date.now()});
}
// Xóa mẫu: bỏ MỌI bản ghi cùng nội dung (gồm bản trùng cũ) -> row không "mọc lại".
function removeItem(it){
  for(const r of items.filter(x=>x.side===it.side && x.type===it.type && x.event===it.event))
    itemStore.remove(r.id);
}

/* ===== 4. Ô TRÊN ĐĨA — xếp CHẠM nhau, rơi NGẮN ===== */
const boxEls=new Map();   // id -> .box-slot
let animateDrops=false;   // lúc TẢI: false (ô hiện luôn, không rơi); sau init: true
function buildBox(b){
  const slot=document.createElement('div'); slot.className='box-slot';
  const box=document.createElement('div');
  box.className=`box ${animateDrops?'dropping ':''}${b.side} ${b.type==='rect'?'rect':'square'}`;
  for(let i=0;i<weightOf(b.type);i++){ const f=document.createElement('span'); f.className='f'; f.textContent=FACE[b.side]; box.appendChild(f); }
  const badge=document.createElement('span'); badge.className='box-badge'; badge.textContent=b.event;
  box.appendChild(badge);
  const x=document.createElement('button'); x.className='box-x'; x.textContent='×';
  x.addEventListener('click', e=>{ e.stopPropagation(); askDelete(b.id); });
  box.appendChild(x);
  box.addEventListener('click', e=>{ e.stopPropagation(); const on=box.classList.contains('show-x'); clearRowX(); if(!on) box.classList.add('show-x'); });   // chạm khối -> hiện/ẩn × (chỉ 1 × 1 lúc)
  slot.appendChild(box);
  return slot;
}
function renderBoxes(){
  const present=new Set(boxes.map(b=>b.id));
  for(const [id,el] of boxEls){ if(!present.has(id)){ el.remove(); boxEls.delete(id); } }
  for(const b of boxes){
    if(boxEls.has(b.id)) continue;
    const slot=buildBox(b);
    $(b.side==='left'?'panL':'panR').appendChild(slot); boxEls.set(b.id, slot);
    const box=slot.firstChild;
    requestAnimationFrame(()=>requestAnimationFrame(()=>box.classList.remove('dropping')));
  }
  for(const side of SIDES) layoutBoxes(side);
  updateBalance();
}
// xếp bottom-up, mỗi tầng tối đa CAP_UNITS, ô CHẠM nhau, căn giữa tầng
function layoutBoxes(side){
  const rows=[]; let cur=[], used=0;
  for(const b of boxes){ if(b.side!==side) continue;
    const w=weightOf(b.type);
    if(used+w>CAP_UNITS){ rows.push(cur); cur=[]; used=0; }
    cur.push(b); used+=w;
  }
  if(cur.length) rows.push(cur);
  const contentW=CAP_UNITS*UNIT;
  rows.forEach((row,r)=>{
    const rowW=row.reduce((s,b)=>s+weightOf(b.type),0)*UNIT;
    let x=(contentW-rowW)/2;
    for(const b of row){ const w=weightOf(b.type)*UNIT, slot=boxEls.get(b.id);
      if(slot){ slot.style.left=x+'px'; slot.style.bottom=(r*BOX_H)+'px'; slot.style.width=w+'px'; }
      x+=w;
    }
  });
}

/* ===== 5. CÂN BẰNG — kim / đòn / đĩa ===== */
function updateBalance(){
  let lw=0, rw=0;
  for(const b of boxes){ if(b.side==='left') lw+=weightOf(b.type); else rw+=weightOf(b.type); }
  const n=Math.max(-MAX_DIFF,Math.min(MAX_DIFF, lw-rw))/MAX_DIFF;   // -1..1
  const beamDeg=-n*MAX_BEAM, needleDeg=-n*MAX_DEG;                  // trái nặng -> đầu trái hạ, kim lệch trái
  $('beam').style.transform=`rotate(${beamDeg}deg)`;
  $('needle').style.transform=`rotate(${needleDeg}deg)`;
  $('hangerL').style.transform=`rotate(${-beamDeg}deg)`;           // phản-xoay -> đĩa/dây thẳng đứng
  $('hangerR').style.transform=`rotate(${-beamDeg}deg)`;
}
// mặt số bán nguyệt (path) + 41 vạch khắc; KHÔNG số, kim/hub vẽ bằng HTML
function buildDial(){
  const P=(r,deg)=>{ const [dx,dy]=polar(r,deg); return [CX+dx, DISC_CY+dy]; };
  let ticks='';
  for(let v=-MAX_DIFF; v<=MAX_DIFF; v++){
    const [x1,y1]=P(DIAL_R-13, v/MAX_DIFF*MAX_DEG), [x2,y2]=P(DIAL_R-6, v/MAX_DIFF*MAX_DEG);
    const col = v===0 ? 'var(--wood)' : (v<0 ? 'var(--bad)' : 'var(--good)');
    const sw  = v%10===0 ? 1.6 : (v%5===0 ? 1.1 : 0.8);   // nhấn 0/±10/±20, vừa ±5/±15, mảnh còn lại
    ticks+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`;
  }
  $('dial').innerHTML =
    `<path d="M ${CX-DISC_R} ${DISC_CY} A ${DISC_R} ${DISC_R} 0 0 1 ${CX+DISC_R} ${DISC_CY} Z" fill="var(--disc)"/>` + ticks;
}
// dây treo chữ V — chạm rìa ngoài 2 đầu đoạn thẳng (đĩa)
function layoutChains(){
  const RIM_X=PLATE_RAD+13, RIM_Y=STRING_LEN+2;            // nửa bề ngang đĩa · chạm mặt thanh
  const len=Math.hypot(RIM_X,RIM_Y), ang=Math.atan2(RIM_Y,RIM_X)*180/Math.PI;
  for(const h of document.querySelectorAll('.hanger')){
    const a=h.querySelector('.ca'), b=h.querySelector('.cb');
    a.style.width=len+'px'; a.style.transform=`rotate(${ang}deg)`;
    b.style.width=len+'px'; b.style.transform=`rotate(${180-ang}deg)`;
  }
}

/* ===== 6. POPUP XÁC NHẬN + THAO TÁC ===== */
let pending=null;   // {kind:'add'|'delete'|'reset', ...}
const openModal  = html => { $('preview').innerHTML=html; $('modal').classList.add('open'); };
const closeModal = ()   => { $('modal').classList.remove('open'); pending=null; };

function askAdd(side, type, event, persist){
  pending={kind:'add', side, type, event, persist};
  // ô y như trên đĩa: ô big + badge emoji sự việc ở góc (sibling của .f, trong .box)
  const faces=`<span class="f">${FACE[side]}</span>`.repeat(weightOf(type));
  openModal(`<span class="box big ${side} ${type==='rect'?'rect':'square'}">${faces}<span class="box-badge">${event}</span></span>`);
}
function askDelete(id){
  const b=boxes.find(x=>x.id===id); if(!b) return;
  pending={kind:'delete', id};
  openModal(`<span class="del-mark ${b.side}">${boxHTML(b.side,b.type,'big')}<span class="x">✕</span></span>`);
}
function askReset(){
  if(!boxes.length) return;
  pending={kind:'reset'};
  openModal('<svg class="reset-ic" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 6"/><path d="M20 4v7h-7"/></svg>');
}
function confirmPending(){
  if(!pending) return;
  if(pending.kind==='add'){
    if(pending.persist) addItem(pending.side, pending.type, pending.event);
    boxStore.add({id:genId('b'), side:pending.side, type:pending.type, event:pending.event, at:Date.now()});
  }else if(pending.kind==='delete'){ boxStore.remove(pending.id); }
  else if(pending.kind==='reset'){ boxStore.clear(); }
  closeModal();
}

/* ===== 7. RESPONSIVE SCALE + KHỞI ĐỘNG ===== */
// Mobile: thu cân vừa BỀ NGANG (footprint = SCALE_W*s), cho cuộn dọc.
// Desktop: thu cân vừa CHIỀU CAO (cân + reset) để KHÔNG cuộn; cap 1.4 = look gốc.
function fitScale(){
  const s = window.matchMedia('(max-width:860px)').matches
    ? Math.min(1,   Math.max(0.5, (window.innerWidth  - 24) / SCALE_W))
    : Math.min(1.4, Math.max(0.7, (window.innerHeight - 80) / SCALE_H));
  $('scale').style.setProperty('--s', s.toFixed(3));
}
function init(){
  buildDial(); layoutChains();
  boxStore.load(); itemStore.load();
  renderLists(); renderBoxes();
  $('btnOk').addEventListener('click', confirmPending);
  $('btnNo').addEventListener('click', closeModal);
  $('modal').addEventListener('click', e=>{ if(e.target===$('modal')) closeModal(); });
  $('reset').addEventListener('click', askReset);
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
  // chạm/click chỗ khác -> ẩn mọi nút × (emoji/khối có stopPropagation nên không tự ẩn)
  document.addEventListener('click', clearRowX);
  fitScale(); window.addEventListener('resize', fitScale);
  boxStore.sync(); itemStore.sync();
  // sau khung hình đầu: bật lại animation cho thao tác về sau
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ document.body.classList.remove('preload'); animateDrops=true; }));
}
init();
</script>
</body>
