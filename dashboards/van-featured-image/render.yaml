services:
  - type: web
    name: meta-ads-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 3000
