<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <header class="topbar">
    <div class="topbar-actions">
      <span class="cache-time" id="cachedAt"></span>
      <select class="period-select" id="periodSelect" onchange="onPeriodChange()">
        <option value="7">Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30">Last 30 days</option>
      </select>
      <div class="tooltip-wrap">
        <button class="btn btn-primary" onclick="fetchAll()">Load Data</button>
        <div class="tooltip-box">Fetches fresh data from Meta API. Frequent use may trigger rate limits — wait a few minutes between loads.</div>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="page-creatives" class="page active">
      <div class="table-wrap">
        <div class="table-scroll">
          <table id="creativesTable"><thead><tr>
            <th>Thumb</th>
            <th><div class="th-content"><input data-table="creatives" data-col="ad_name" data-type="text" class="th-filter-input" placeholder="Ad Name" oninput="filterTable('creatives')" onclick="event.stopPropagation()"></div></th>
            <th data-sort="spend" onclick="sortTable('creatives','spend')"><div class="th-content">Spend <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="spend" onclick="event.stopPropagation();openFilterPopup('creatives','spend',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="roas" onclick="sortTable('creatives','roas')"><div class="th-content">ROAS <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="roas" onclick="event.stopPropagation();openFilterPopup('creatives','roas',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="cpr" onclick="sortTable('creatives','cpr')"><div class="th-content">CPR <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="cpr" onclick="event.stopPropagation();openFilterPopup('creatives','cpr',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="aov" onclick="sortTable('creatives','aov')"><div class="th-content">AOV <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="aov" onclick="event.stopPropagation();openFilterPopup('creatives','aov',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="cpm" onclick="sortTable('creatives','cpm')"><div class="th-content">CPM <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="cpm" onclick="event.stopPropagation();openFilterPopup('creatives','cpm',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="ctr" onclick="sortTable('creatives','ctr')"><div class="th-content">CTR <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="ctr" onclick="event.stopPropagation();openFilterPopup('creatives','ctr',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="cpc" onclick="sortTable('creatives','cpc')"><div class="th-content">CPC <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="cpc" onclick="event.stopPropagation();openFilterPopup('creatives','cpc',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="video_3sec_rate" onclick="sortTable('creatives','video_3sec_rate')"><div class="th-content" title="3-second video plays / impressions">3s/Impr <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="video_3sec_rate" onclick="event.stopPropagation();openFilterPopup('creatives','video_3sec_rate',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="thruplay_rate" onclick="sortTable('creatives','thruplay_rate')"><div class="th-content" title="ThruPlays / Video plays">ThruPlay% <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="thruplay_rate" onclick="event.stopPropagation();openFilterPopup('creatives','thruplay_rate',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
            <th data-sort="video_avg_time" onclick="sortTable('creatives','video_avg_time')"><div class="th-content" title="Video average play time">Avg Time <span class="sort-icon">&#x25B4;&#x25BE;</span><button class="col-filter-btn" data-table="creatives" data-col="video_avg_time" onclick="event.stopPropagation();openFilterPopup('creatives','video_avg_time',this)"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.5h13L9 8v5l-2 1.5V8z"/></svg></button></div></th>
          </tr></thead><tbody id="creativesBody">
            <tr><td colspan="12"><div class="state-box">Click "Load Data" to start</div></td></tr>
          </tbody></table>
        </div>
      </div>
      <div id="debugLine" class="debug-line"></div>
    </div>

  </main>
</div>
<div id="toast"></div>
<div id="filterPopup" class="filter-popup">
  <div class="filter-popup-title" id="filterPopupTitle"></div>
  <div class="filter-popup-body">
    <select id="filterOp" onchange="onFilterOpChange()">
      <option value="gt">is greater than</option>
      <option value="lt">is less than</option>
      <option value="between">is between</option>
      <option value="notBetween">isn't between</option>
    </select>
    <div class="filter-inputs">
      <input type="number" id="filterVal1" step="any" placeholder="Value">
      <span id="filterAnd" style="display:none;font-size:11px;color:var(--t3)">and</span>
      <input type="number" id="filterVal2" step="any" placeholder="Value" style="display:none">
    </div>
  </div>
  <div class="filter-popup-actions">
    <button onclick="clearCurrentFilter()">Clear</button>
    <button onclick="cancelFilter()">Cancel</button>
    <button class="btn btn-primary" onclick="applyFilter()">Apply</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
