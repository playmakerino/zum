<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đồng Hồ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  :root{
    --bg:#fdf6f0;
    --ink:#3f3a5c;
    --muted:#a99fb8;
    --line:#e9cdb6;
    --neutral:#2b2b2b;       /* đen trung tính: mép đồng hồ + ngày chưa đến + tháng/năm */
    --accent:#ff5d97;
    --c-hour:#5a63d8;
    --c-min:#f5921b;
    --c-sec:#ff5d97;
    --c-buoi:#1fab95;
    /* Vòng tiến trình & nhãn mốc — dùng chung nhiều nơi */
    --ring-thin:1px;                       /* nét MẢNH: ô quá khứ / tương lai + nhãn mốc */
    --ring-bold:3.2px;                      /* nét ĐẬM: ô hiện tại (giờ/phút này) */
    --faint:.25;                           /* độ MỜ dùng chung (track vòng, ô chưa trôi) */
    --c-hour-faint:rgba(90,99,216,.25);    /* = c-hour ở độ mờ --faint (cho nét/viền nhãn chưa đến) */
    --c-buoi-faint:rgba(31,171,149,.25);   /* = c-buoi ở độ mờ --faint (track ô "hôm nay") */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{overflow:hidden;}            /* chặn cuộn ngang/dọc cấp tài liệu (iOS) */
  body{
    height:100vh;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior:none;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
    padding:.5rem;
    font-family:'Space Grotesk',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* Khối "đồng hồ" = analog + digital(+cát). Mặc định (MOBILE DỌC) xếp dọc: analog trên, digital dưới. */
  .clock{ display:flex; flex-direction:column; align-items:center; }

  /* NGANG (rộng >= 768px): toàn bộ ĐỒNG HỒ bên TRÁI, LỊCH bên PHẢI. */
  @media (min-width:768px){
    body{ flex-direction:row; gap:24px; }
    .calendar{ margin-top:0; }   /* căn giữa theo chiều dọc, không cần lề trên */
  }

  /* ANALOG */
  .analog{
    width:300px;height:300px;border-radius:50%;
    background:#fff;
    border:1px solid var(--neutral);  /* mép đồng hồ: đen trung tính */
    position:relative;
    margin:58px;
  }
  .tick{position:absolute;left:50%;top:50%;transform-origin:0 0;}
  .tick span{
    position:absolute;
    width:1px;height:6px;
    background:var(--c-min);
    left:-0.5px;top:-118px;
  }
  .tick.major span{height:12px;width:1.5px;left:-0.75px;background:var(--c-hour);}
  .numeral{
    position:absolute;
    font-size:.95rem;font-weight:400;line-height:1;
    color:var(--c-hour);
    display:flex;align-items:center;justify-content:center;
    transform:translate(-50%,-50%);
  }
  .numeral.active{font-weight:700;}
  .hand{
    position:absolute;left:50%;top:50%;
    transform-origin:50% 100%;
    border-radius:99px;
    background:var(--ink);
  }
  .hour{width:5px;height:72px;margin-left:-2.5px;margin-top:-72px;background:var(--c-hour);}
  .minute{width:3px;height:104px;margin-left:-1.5px;margin-top:-104px;background:var(--c-min);}
  .second{width:1.5px;height:118px;margin-left:-.75px;margin-top:-118px;
    background:var(--c-sec);}
  .center{
    position:absolute;left:50%;top:50%;
    width:9px;height:9px;border-radius:50%;
    background:var(--accent);transform:translate(-50%,-50%);
    z-index:10;
    box-shadow:0 0 0 4px #fff;
  }
  .orbit{
    position:absolute;left:50%;top:50%;
    width:0;height:0;
    z-index:11;
  }
  .connector{
    position:absolute;left:50%;
    width:1.5px;margin-left:-.75px;
    background:var(--ink);
    transform-origin:center;
  }
  #connH{background:var(--c-hour);}
  #connM{background:var(--c-min);}
  .badge{
    position:absolute;left:50%;top:0;
    transform:translate(-50%,-50%);
    /* HÌNH TRÒN đều (Ø = --badge-dia): offsetHeight/2 = bán kính ở MỌI hướng -> nét nối
       chạm đúng viền ở mọi góc, không đâm xuyên (pill cũ sai khi nhãn ở góc xiên). */
    --badge-dia:26px;
    width:var(--badge-dia);height:var(--badge-dia);
    min-width:0;padding:0;
    border-radius:50%;
    font-size:.72rem;font-weight:500;
    font-variant-numeric:tabular-nums;
    line-height:1;
    /* Căn giữa số bằng flex (không dựa baseline/line-box) */
    display:flex;align-items:center;justify-content:center;
    background:var(--badge-bg);color:#fff;
  }
  #badgeH{--badge-bg:var(--c-hour);}
  #badgeM{--badge-bg:var(--c-min);}
  /* Nhãn EMOJI mốc trong ngày (tập 8h / ăn sáng 8h15 / ăn tối 19h30 / đi ngủ 22h):
     màu xanh giờ; nét nối + viền MẢNH (--ring-thin) khớp vòng tròn; NẰM DƯỚI nhãn giờ khi trùng. */
  .emoji-orbit{z-index:10;}                /* < .orbit (11) -> nhãn giờ đè lên khi trùng */
  .emoji-orbit.off{display:none;}          /* nhãn không thuộc thứ hôm nay -> ẩn hẳn */
  .emoji-orbit .connector{width:var(--ring-thin);margin-left:calc(var(--ring-thin)/-2);background:var(--c-hour);}
  /* HÌNH TRÒN đều (bỏ min-width pill kế thừa): offsetHeight/2 = bán kính ở MỌI hướng
     -> nét nối chạm đúng viền, không đâm xuyên khi nhãn ở góc xiên. */
  .badge-emoji{width:var(--badge-dia);height:var(--badge-dia);border:var(--ring-thin) solid var(--c-hour);}
  /* CHƯA đến giờ -> nét nối + viền MỜ (khớp vòng track), nhãn chỉ có viền (nền trong suốt) */
  .emoji-orbit.upcoming .connector{background:var(--c-hour-faint);}
  .emoji-orbit.upcoming .badge-emoji{background:transparent;border-color:var(--c-hour-faint);}
  /* ĐÃ đến/qua giờ -> nét nối + viền ĐẶC (khớp vòng arc đã-qua), nhãn KHÔNG nền (trong suốt) */
  .emoji-orbit.reached .badge-emoji{background:transparent;}
  /* 2 class -> đè .badge span{display:block}; flex để emoji vào ĐÚNG TÂM (không theo baseline) */
  .badge-emoji .ic-emoji{display:flex;align-items:center;justify-content:center;
    width:100%;height:100%;font-size:15px;line-height:1;
    transform:translateY(.06em);}   /* glyph emoji nằm cao trong line-box -> bù xuống ~0.9px */
  .badge span{display:block;}
  /* Nhãn PHÚT deadline: chấm TRÒN cam nhỏ ở mép trên-TRÁI nhãn hoạt động, chỉ hiện trong 59'
     trước giờ hoạt động (vd "30" trên nhãn bơi từ 16h31 -> ẩn lúc 17h30). Mặc định ẩn;
     .show mới hiện (đè .badge span{display:block} bằng specificity 2 class). */
  .badge-emoji .deadline-min{
    display:none;
    position:absolute; top:-7px; left:-7px;
    width:16px; height:16px; padding:0; box-sizing:border-box;
    border-radius:50%;
    background:var(--c-min); color:#fff;
    font-size:.48rem; font-weight:700; line-height:16px; text-align:center;
    font-variant-numeric:tabular-nums;
    box-shadow:0 0 0 1.5px var(--bg);   /* tách khỏi emoji bằng vòng nền */
  }
  .badge-emoji .deadline-min.show{ display:block; }

  /* VÒNG TIẾN TRÌNH — 4 trạng thái = (đậm/mảnh) × (đặc/mờ). Màu đặt ở thuộc tính stroke mỗi path. */
  .r-track,.r-arc,.r-act,.r-live{fill:none;stroke-linecap:butt;}
  .r-track{stroke-width:var(--ring-thin);opacity:var(--faint);}  /* MẢNH MỜ  — ô tương lai */
  .r-arc  {stroke-width:var(--ring-thin);}                        /* MẢNH ĐẶC — ô quá khứ */
  .r-act  {stroke-width:var(--ring-bold);opacity:var(--faint);}  /* ĐẬM MỜ   — ô hiện tại (chưa trôi) */
  .r-live {stroke-width:var(--ring-bold);}                        /* ĐẬM ĐẶC  — ô hiện tại (đã trôi) */

  /* Nhịp đếm ngược (giây 55-59): mỗi giây một cú nảy gọn, nền nhấp một nhịp.
     NỀN nhấp bằng CSS animation (chỉ đổi background/box-shadow -> không xê dịch).
     SCALE "nảy" do JS gộp thẳng vào transform của badge (cùng translate+rotate,
     transform-origin tâm) -> luôn scale quanh đúng tâm, không lệch vị trí. */
  .badge.beat{animation:beatBg .45s ease-out;}
  .badge.beat-final{animation:beatBgFinal .45s ease-out;}
  @keyframes beatBg{
    0%  {background:var(--badge-bg);}
    25% {background:var(--accent);}
    100%{background:var(--badge-bg);}
  }
  @keyframes beatBgFinal{
    0%  {background:var(--badge-bg);}
    20% {background:#ff3d83;box-shadow:0 0 0 8px rgba(255,93,151,.32);}
    100%{background:var(--badge-bg);box-shadow:0 0 0 0 rgba(255,93,151,0);}
  }

  /* DIGITAL */
  .digital{
    display:flex;
    align-items:flex-start;
    gap:clamp(.6rem,3vw,1.1rem);
  }
  .unit{display:flex;flex-direction:column;align-items:center;gap:.45rem;}
  /* Ô chứa icon: chiều cao cố định -> mọi số (và dấu :) bắt đầu cùng một mốc => thẳng hàng */
  .hg-slot{
    height:clamp(30px,8vw,42px);
    display:flex;align-items:center;justify-content:center;
  }
  .hourglass{
    width:clamp(27px,7vw,40px);
    height:100%;
    display:block;
    overflow:visible;
    transform-origin:50% 50%;
  }
  .hourglass.flip{animation:hgFlip .7s ease-in-out;}
  @keyframes hgFlip{
    0%  {transform:rotate(0deg);}
    100%{transform:rotate(180deg);}
  }
  .hg-glass{fill:none;stroke:var(--line);stroke-width:1.2;}
  .hg-cap{stroke-width:1.6;stroke-linecap:round;}
  .u-hour .hg-cap{stroke:var(--c-hour);}
  .u-min  .hg-cap{stroke:var(--c-min);}
  .u-hour .hg-sand,.u-hour .hg-stream{fill:var(--c-hour);}
  .u-min  .hg-sand,.u-min  .hg-stream{fill:var(--c-min);}
  .num{
    font-size:clamp(1.1rem,4.6vw,1.6rem);font-weight:300;line-height:1;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.02em;
  }
  #h{color:var(--c-hour);}
  #m{color:var(--c-min);}
  #s{color:var(--c-sec);}
  .sep{
    display:flex;flex-direction:column;align-items:center;gap:.45rem;
  }
  .sep-mark{
    font-size:clamp(1.1rem,4.6vw,1.6rem);font-weight:300;line-height:1;color:var(--line);
  }

  /* Cột digital: bọc đồng hồ số + dòng "văn nói" ngay dưới nó.
     Dòng văn nói nằm trong luồng, chiều cao cố định luôn được dành sẵn
     (chỉ đổi opacity khi hiện/ẩn -> không giật), và layout() đo cả cột này
     nên analog co vừa đủ để luôn còn chỗ cho dòng văn nói. */
  .digital-col{
    display:flex;flex-direction:column;align-items:center;
    position:relative;
    padding-bottom:2.1rem;   /* chừa chỗ cho dòng văn nói (đặt TUYỆT ĐỐI -> không nới rộng cột) */
  }
  .spoken{
    /* Tuyệt đối + translateX(-50%): căn giữa CHẮC CHẮN theo bề ngang cột, và KHÔNG
       làm cột digital rộng ra (tránh dòng dài làm analog co nhỏ ở landscape). */
    position:absolute;
    left:50%; bottom:0;
    transform:translateX(-50%);
    height:1.4em;
    white-space:nowrap;
    font-size:clamp(.85rem,3.6vw,1.05rem);
    font-weight:400;
    color:var(--muted);
    text-align:center;
    opacity:0;
    transition:opacity .4s ease;
    pointer-events:none;
  }
  .spoken.show{opacity:1;}
  /* Viết hoa chữ cái đầu câu (câu bắt đầu bằng số thì giữ nguyên; văn nói VN luôn bắt đầu bằng số) */
  .spoken::first-letter{text-transform:uppercase;}
  /* Giờ -> màu giờ; phần phút (đúng/rưỡi/kém/Y phút) -> màu phút; buổi -> xanh ngọc */
  .spoken .sp-h{color:var(--c-hour);}
  .spoken .sp-m{color:var(--c-min);}
  .spoken .sp-b{color:var(--c-buoi);}

  /* LỊCH THÁNG */
  .calendar{
    display:flex;flex-direction:column;align-items:center;
    gap:clamp(.5rem,2vw,.8rem);
    margin-top:.8rem;                 /* mobile: cách digital phía trên; desktop reset =0 */
    font-variant-numeric:tabular-nums;
  }
  .cal-head{                          /* tháng/năm (VN ở trên, EN ở dưới — cùng style) */
    font-size:clamp(.95rem,4vw,1.2rem);
    font-weight:500;
    letter-spacing:.02em;
    color:var(--neutral);             /* tháng/năm: đen trung tính */
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:clamp(.15rem,1vw,.4rem);
  }
  .cal-cell{
    width:clamp(1.7rem,6.5vw,2.3rem);
    height:clamp(1.7rem,6.5vw,2.3rem);
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(.78rem,3.2vw,1rem);
    line-height:1;
    border-radius:50%;
  }
  .cal-dow{                           /* tiêu đề thứ trong tuần */
    color:var(--muted);
    font-size:clamp(.6rem,2.6vw,.78rem);
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .cal-day{ color:var(--neutral); position:relative; }   /* ngày chưa đến: đen trung tính */
  /* Nhãn hoạt động ở GÓC TRÊN BÊN PHẢI ô lịch (bóng rổ/múa/vẽ theo thứ). Tuyệt đối -> không
     phá việc căn giữa số (số là text node duy nhất trong flow). */
  .cal-mark{
    position:absolute; top:0; right:0;     /* nằm BĂNG TRÊN, phía trên số ở giữa ô -> không chạm số */
    display:flex; line-height:1; letter-spacing:-.12em;
    font-size:.42rem; pointer-events:none;
  }
  .cal-mark--multi{ right:-2px; }            /* ngày 2 emoji (T7): dịch sang PHẢI chút cho thoáng số */
  /* Desktop: ô lịch to hơn -> phóng to emoji + nhích LÊN để KHÔNG chạm số */
  @media (min-width:768px){
    .cal-mark{ font-size:.8rem; top:-2px; right:-1px; }
    .cal-mark--multi{ right:-5px; }          /* 2 emoji to hơn -> dịch phải nhiều hơn cho khỏi đè số */
  }
  .cal-day.past{                      /* ngày đã qua: xanh ngọc đậm */
    color:var(--c-buoi);
  }
  .cal-day.today{                     /* hôm nay: ô tròn nền teal đặc (đã bỏ thanh tiến trình ngày) */
    background:var(--c-buoi);
    color:#fff;
    font-weight:700;
  }

  /* ===== Nút + (thêm nhãn) + popup ===== */
  #fab{
    position:fixed; right:18px; bottom:18px; z-index:50;
    width:52px; height:52px; border-radius:50%; border:none; cursor:pointer;
    background:var(--accent); color:#fff; font-size:30px; line-height:1; font-weight:300;
    display:flex; align-items:center; justify-content:center;
  }
  .modal{
    position:fixed; inset:0; z-index:60; display:none;
    align-items:center; justify-content:center; padding:16px;
    background:rgba(63,58,92,.28);    /* nền mờ (ink) */
  }
  .modal.open{ display:flex; }
  .modal-card{
    background:#fff; border-radius:22px; padding:16px;
    width:min(92vw,340px); display:flex; flex-direction:column; gap:14px;
    font-family:'Space Grotesk',sans-serif;
  }
  .emoji-pick{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .emoji-pick button{
    width:38px; height:38px; border-radius:11px; padding:0; cursor:pointer;
    border:2px solid transparent; background:var(--bg); font-size:20px; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .emoji-pick button.sel{ border-color:var(--accent); background:#fff; }
  .num-strip{ display:flex; gap:5px; overflow-x:auto; padding:4px 2px; }
  .num-strip button{
    flex:0 0 auto; min-width:32px; height:32px; border-radius:9px; padding:0 7px; cursor:pointer;
    border:2px solid var(--pick); color:var(--pick); background:transparent;
    font:600 .9rem/1 'Space Grotesk',sans-serif; font-variant-numeric:tabular-nums;
  }
  .num-strip button.sel{ background:var(--pick); color:#fff; }
  .hour-strip{ --pick:var(--c-hour); }   /* số GIỜ -> màu giờ (xanh) */
  .min-strip{  --pick:var(--c-min); }    /* số PHÚT -> màu phút (cam) */
  .modal-add{
    align-self:center; width:46px; height:46px; border-radius:50%; border:none; cursor:pointer;
    background:var(--c-buoi); color:#fff; font-size:22px; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  /* Nút × xóa nhãn (chỉ nhãn người dùng tự thêm) — hiện khi rê chuột / chạm vào nhãn */
  .label-del{
    position:absolute; top:-7px; right:-7px; z-index:20; display:none;
    width:15px; height:15px; border-radius:50%; padding:0; cursor:pointer;
    border:1.5px solid #fff; background:var(--accent); color:#fff;
    font:700 11px/1 sans-serif; align-items:center; justify-content:center;
  }
  .emoji-orbit:hover .label-del,
  .emoji-orbit.reveal-del .label-del{ display:flex; }
</style>
</head>
<body>
  <div class="clock">
  <div class="analog" id="analog">
    <svg style="position:absolute;left:50%;top:50%;overflow:visible;pointer-events:none;z-index:9;">
      <!-- LUẬT MỚI — mỗi vòng MỘT màu, 4 TRẠNG THÁI = (đậm/mảnh) × (đặc/mờ):
             track = CẢ vòng:        MẢNH + MỜ  (op .25) -> ô TƯƠNG LAI (chưa đến)
             arc   = đã qua:         MẢNH + ĐẶC (op 1)   -> ô QUÁ KHỨ
             act   = ô hiện tại:     ĐẬM  + MỜ  (op .25) -> phần CHƯA trôi trong ô này
             live  = đã trôi trong ô:ĐẬM  + ĐẶC (op 1)   -> phần ĐÃ trôi của ô hiện tại
           Màu: 2 vòng NGÀY/GIỜ = c-hour (xanh giờ); vòng PHÚT = c-min (cam).
           Thứ tự vẽ (dưới->trên): track, arc, act, live. Vòng 1 = sáng (0-12h), vòng 2 = chiều/tối. -->
      <path id="dayTrack1" class="r-track" stroke="var(--c-hour)"></path>
      <path id="dayTrack2" class="r-track" stroke="var(--c-hour)"></path>
      <path id="dayArc1" class="r-arc" stroke="var(--c-hour)"></path>
      <path id="dayArc2" class="r-arc" stroke="var(--c-hour)"></path>
      <path id="dayAct1" class="r-act" stroke="var(--c-hour)"></path>
      <path id="dayAct2" class="r-act" stroke="var(--c-hour)"></path>
      <path id="dayLive1" class="r-live" stroke="var(--c-hour)"></path>
      <path id="dayLive2" class="r-live" stroke="var(--c-hour)"></path>
      <path id="minTrack" class="r-track" stroke="var(--c-min)"></path>
      <path id="minArc" class="r-arc" stroke="var(--c-min)"></path>
      <path id="minAct" class="r-act" stroke="var(--c-min)"></path>
      <path id="minLive" class="r-live" stroke="var(--c-min)"></path>
    </svg>
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
    <div class="orbit emoji-orbit upcoming" id="orbitSleep">
      <div class="connector" id="connSleep"></div>

<script>
  const $ = id => document.getElementById(id);
  const analog = $('analog');

  // Phần tử cập nhật MỖI FRAME -> cache sẵn, khỏi tra DOM lặp lại
  const elHour=$('hour'), elMin=$('minute'), elSec=$('second');
  const elOrbitH=$('orbitH'), elOrbitM=$('orbitM');
  const elBadgeH=$('badgeH'), elBadgeM=$('badgeM');
  const elConnH=$('connH'), elConnM=$('connM');
  const elOrbitSleep=$('orbitSleep'), elBadgeSleep=$('badgeSleep'), elConnSleep=$('connSleep');
  const elOrbitDinner=$('orbitDinner'), elBadgeDinner=$('badgeDinner'), elConnDinner=$('connDinner');
  const elOrbitExercise=$('orbitExercise'), elBadgeExercise=$('badgeExercise'), elConnExercise=$('connExercise');
  const elOrbitBreakfast=$('orbitBreakfast'), elBadgeBreakfast=$('badgeBreakfast'), elConnBreakfast=$('connBreakfast');
  const elOrbitBasketball=$('orbitBasketball'), elBadgeBasketball=$('badgeBasketball'), elConnBasketball=$('connBasketball');
  const elOrbitBallet=$('orbitBallet'), elBadgeBallet=$('badgeBallet'), elConnBallet=$('connBallet');
  const elOrbitBasketSat=$('orbitBasketSat'), elBadgeBasketSat=$('badgeBasketSat'), elConnBasketSat=$('connBasketSat');
  const elOrbitArt=$('orbitArt'), elBadgeArt=$('badgeArt'), elConnArt=$('connArt');
  const elOrbitSwim=$('orbitSwim'), elBadgeSwim=$('badgeSwim'), elConnSwim=$('connSwim');
  const elOrbitSun=$('orbitSun'),       elBadgeSun=$('badgeSun'),       elConnSun=$('connSun');
  const elOrbitCherry=$('orbitCherry'), elBadgeCherry=$('badgeCherry'), elConnCherry=$('connCherry');
  const elOrbitCandy=$('orbitCandy'),   elBadgeCandy=$('badgeCandy'),   elConnCandy=$('connCandy');
  // Mốc nhãn emoji trong ngày -> đổi trạng thái theo giờ hiện tại:
  //   chưa đến giờ = 'upcoming' (viền + nét mảnh); đã đến/qua = 'reached' (nền + nét đậm).
  //   days: chỉ HIỆN vào các thứ này (getDay 0=CN..6=T7); bỏ trống = mọi ngày.
  const fixedLabels = [
    {orbit:elOrbitExercise,   hour:8,     days:[1,2,3,4,5]},  // thể dục: T2-T6
    {orbit:elOrbitBasketSat,  hour:8.25,  days:[6]},          // bóng rổ: thứ Bảy 8h15
    {orbit:elOrbitBreakfast,  hour:8.25,  days:[1,2,3,4,5]},  // ăn sáng: T2-T6
    {orbit:elOrbitArt,        hour:10,    days:[6]},          // vẽ: thứ Bảy 10h
    {orbit:elOrbitSwim,       hour:17.5},                     // bơi: mọi ngày 17h30
    {orbit:elOrbitBasketball, hour:18,    days:[2]},          // bóng rổ: thứ Ba 18h
    {orbit:elOrbitBallet,     hour:18,    days:[5]},          // múa: thứ Sáu 18h
    {orbit:elOrbitDinner,     hour:19.5},                     // ăn tối: mọi ngày
    {orbit:elOrbitSleep,      hour:22},                       // đi ngủ: mọi ngày
  ];
  // ====== NHÃN CÓ SẴN — BẬT KHI CẦN (☀️ mặt trời · 🍒 cherry · 🍬 kẹo) ======
  // Mỗi dòng = 1 lần hiện nhãn. Các trường:
  //   orbit : elOrbitSun | elOrbitCherry | elOrbitCandy
  //   hour  : giờ thập phân — 20.25 = 20h15, 15.5 = 15h30, 9 = 9h00
  //   date  : 'YYYY-MM-DD' -> chỉ hiện ĐÚNG ngày đó      (bỏ trống = mọi ngày)
  //   days  : [0..6] -> chỉ các thứ này, 0=CN..6=T7       (bỏ trống = mọi ngày)
  // Vẫn theo cửa sổ ±6 tiếng như nhãn khác. THÊM = thêm 1 dòng; TẮT = xóa dòng đó.
  const customLabels = [
    {orbit:elOrbitSun, hour:20.25, date:'2026-06-10'},    // HÔM NAY 10/06: ☀️ lúc 20h15
    // {orbit:elOrbitCherry, hour:15.5, days:[1,3,5]},     // ví dụ: 🍒 lúc 15h30 các thứ 2/4/6
    // {orbit:elOrbitCandy,  hour:9},                       // ví dụ: 🍬 lúc 9h00 mọi ngày
  ];
  // Mỗi nhãn có 1 "nhãn phút deadline" (pill cam ở mép) -> điền sẵn SỐ PHÚT của giờ hoạt động
  // (vd 17.5 -> "30", 8.25 -> "15", 8 -> "00"). Nguồn duy nhất là L.hour nên không lệch.
  for(const L of [...fixedLabels, ...customLabels]){
    L.dline = L.orbit.querySelector('.deadline-min');
    if(L.dline) L.dline.textContent = String(Math.round((L.hour % 1) * 60)).padStart(2,'0');
  }
  // Nhãn do NGƯỜI DÙNG tự thêm (nạp từ localStorage, dựng DOM động). userLabelObjs giống cấu
  // trúc {orbit,hour,dline} của fixedLabels -> dùng chung applyLabel/placeFixed/within6.
  let userLabels = [];      // [{id, emoji, hour}] — nguồn lưu
  let userLabelObjs = [];   // [{orbit, conn, badge, hour, dline}] — DOM đang hiển thị
  // Bật/tắt 1 nhãn + cập nhật trạng thái upcoming/reached + nhãn phút deadline.
  function applyLabel(L, show, nowH){
    L.orbit.classList.toggle('off', !show);   // ẩn nhãn khi không thỏa điều kiện
    if(!show){ if(L.dline) L.dline.classList.remove('show'); return; }
    const reached = nowH >= L.hour;
    L.orbit.classList.toggle('reached', reached);
    L.orbit.classList.toggle('upcoming', !reached);
    // Nhãn phút deadline: chỉ hiện trong 59 phút TRƯỚC giờ hoạt động (ẩn đúng lúc tới giờ)
    if(L.dline){
      const deltaMin = (L.hour - nowH) * 60;
      L.dline.classList.toggle('show', deltaMin > 0 && deltaMin <= 59);
    }
  }
  function updateLabelStates(nowH, dow, today){
    // CHỈ hiện nhãn khi cách giờ hiện tại KHÔNG QUÁ 6 TIẾNG (trước hoặc sau).
    const within6 = hour => Math.abs(hour - nowH) <= 6;
    // Nhãn lịch tuần cố định: lọc theo THỨ + cửa sổ ±6 tiếng.
    for(const L of fixedLabels){
      applyLabel(L, (!L.days || L.days.includes(dow)) && within6(L.hour), nowH);
    }
    // Nhãn bật-khi-cần (☀️🍒🍬): lọc theo NGÀY/THỨ + cửa sổ ±6 tiếng.
    for(const L of customLabels){
      const dayOk  = !L.days || L.days.includes(dow);
      const dateOk = !L.date || L.date === today;
      applyLabel(L, dayOk && dateOk && within6(L.hour), nowH);
    }
    // Nhãn người dùng tự thêm: hiện theo cửa sổ ±6 tiếng (mọi ngày).
    for(const o of userLabelObjs){ applyLabel(o, within6(o.hour), nowH); }
  }
  const elTextH=$('textH'), elTextM=$('textM');
  const elH=$('h'), elM=$('m'), elS=$('s'), elSpoken=$('spoken');

  // Các path cung gom 4 lớp = 4 trạng thái: track(mảnh mờ)/arc(mảnh đặc)/act(đậm mờ)/live(đậm đặc)
  const ring = {
    min:  {track:$('minTrack'),  arc:$('minArc'),  act:$('minAct'),  live:$('minLive')},
    day1: {track:$('dayTrack1'), arc:$('dayArc1'), act:$('dayAct1'), live:$('dayLive1')},
    day2: {track:$('dayTrack2'), arc:$('dayArc2'), act:$('dayAct2'), live:$('dayLive2')},
  };
  // Đồng hồ cát: root + 2 clip-rect (cát trên / cát dưới)
  const hg = {
    H: {root:$('hgH'), top:$('hgH-top-r'), bot:$('hgH-bot-r')},
    M: {root:$('hgM'), top:$('hgM-top-r'), bot:$('hgM-bot-r')},
  };
  const setD=(el,d)=>el.setAttribute('d', d||'');

  const tickSpans=[];
  for(let i=0;i<60;i++){
    const t=document.createElement('div');
    t.className='tick'+(i%5===0?' major':'');
    t.style.transform=`rotate(${i*6}deg)`;
    const sp=document.createElement('span');
    t.appendChild(sp);
    tickSpans.push(sp);
    analog.appendChild(t);
  }
  const numerals=[];
  for(let n=1;n<=12;n++){
    const el=document.createElement('div');
    el.className='numeral';
    el.dataset.n=n;
    el.textContent=n;
    numerals.push(el);
    analog.appendChild(el);
  }

  const pad=n=>String(n).padStart(2,'0');

  // Số giờ kiểu 12h (1..12)
  function gio12(h){ const x=((h%12)+12)%12; return x===0?12:x; }

  // Phân buổi theo giờ 24h — MỘT nguồn ranh giới cho cả VN & EN (luôn đồng bộ)
  function buoiIdx(h){
    if(h>=4  && h<=10) return 0;   // sáng  / morning
    if(h>=11 && h<=12) return 1;   // trưa  / noon
    if(h>=13 && h<=17) return 2;   // chiều / afternoon
    if(h>=18 && h<=21) return 3;   // tối   / evening
    return 4;                      // đêm   / night (22,23,0–3)
  }
  const BUOI_VN = ['sáng','trưa','chiều','tối','đêm'];
  const BUOI_EN = ['in the morning','at noon','in the afternoon','in the evening','at night'];
  const buoi     = h => BUOI_VN[buoiIdx(h)];   // buổi tiếng Việt
  const periodEn = h => BUOI_EN[buoiIdx(h)];   // buổi tiếng Anh (cùng ranh giới)
  // Bọc span màu cho văn nói: 'h'=giờ, 'm'=phút/kém, 'b'=buổi
  const spk = (cls,x)=>`<span class="sp-${cls}">${x}</span>`;

  // Văn nói TIẾNG VIỆT — "giờ hơn": luôn đọc xuôi theo giờ HIỆN TẠI (mọi phút).
  //   0 -> "X giờ đúng"  ·  còn lại -> "X giờ m phút"
  //   (:30 -> "X giờ 30 phút", KHÔNG dùng "rưỡi" — rưỡi để cho cửa sổ kém, tránh trùng)
  function noiGioHon(h,m){
    const b=spk('b',buoi(h)), hr=spk('h',gio12(h)+' giờ');
    if(m===0) return hr+' '+spk('m','đúng')+' '+b;
    return hr+' '+spk('m',m+' phút')+' '+b;
  }
  // Văn nói TIẾNG VIỆT — "giờ kém": CHỈ có ở nửa sau giờ (rưỡi ở :30, kém ở 31–59).
  //   <30 -> null (ẩn — nửa đầu giờ không có cách đọc kém)
  //   30  -> "X giờ rưỡi"  ·  31–59 -> "(X+1) giờ kém (60-m) phút"
  //   (vd 16:30 -> "4 giờ rưỡi chiều"; 16:45 -> "5 giờ kém 15 phút chiều")
  function noiGioKem(h,m){
    if(m<30) return null;
    const b=spk('b',buoi(h));
    if(m===30) return spk('h',gio12(h)+' giờ')+' '+spk('m','rưỡi')+' '+b;
    return spk('h',gio12(h+1)+' giờ')+' '+spk('m','kém '+(60-m)+' phút')+' '+b;
  }

  // Số đếm tiếng Anh bằng CHỮ (0..59): giờ 1-12 và phút 0-59.
  const ONES=['zero','one','two','three','four','five','six','seven','eight','nine','ten',
              'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen',
              'eighteen','nineteen'];
  const TENS=['','','twenty','thirty','forty','fifty'];
  function numEn(n){
    if(n<20) return ONES[n];
    const o=n%10; return o ? TENS[(n/10)|0]+'-'+ONES[o] : TENS[(n/10)|0];
  }
  // Văn nói TIẾNG ANH — "giờ hơn": đọc giờ rồi phút (số viết bằng CHỮ).
  // Viết hoa chữ cái đầu câu lo bằng CSS (.spoken::first-letter).
  //   12:00 -> "twelve noon"; 0:00 -> "twelve midnight"
  //   :00 -> "four o'clock"   :01-:09 -> "four oh five"   >=:10 -> "four forty-five"
  function noiGioEnHon(h,m){
    if(m===0 && h===12) return spk('h','twelve')+' '+spk('b','noon');
    if(m===0 && h===0)  return spk('h','twelve')+' '+spk('b','midnight');
    const hr=spk('h',numEn(gio12(h))), b=spk('b',periodEn(h));
    if(m===0) return hr+' '+spk('m',"o'clock")+' '+b;     // four o'clock
    if(m<10)  return hr+' '+spk('m','oh '+numEn(m))+' '+b; // four oh five
    return hr+' '+spk('m',numEn(m))+' '+b;                 // four forty-five
  }
  // Văn nói TIẾNG ANH — "giờ kém": CHỈ có ở nửa sau giờ ("half past" :30, "... to ..." 31–59).
  //   <30 -> null (ẩn)  ·  30 -> "half past X"  ·  31–59 -> "(60-m) to (X+1)"
  //   (vd 16:30 -> "half past four..."; 16:45 -> "fifteen to five...")
  function noiGioEnKem(h,m){
    if(m<30) return null;
    if(m===30) return spk('m','half past')+' '+spk('h',numEn(gio12(h)))+' '+spk('b',periodEn(h));
    return spk('m',numEn(60-m)+' to')+' '+spk('h',numEn(gio12(h+1)))+' '+spk('b',periodEn(h));
  }

  /* ===== Bố cục nhãn — tự co theo màn hình =====
     px tính từ tâm. Nhãn nằm NGOÀI cả cụm vòng (phút + 2 vòng ngày); bán kính nhãn
     tính trong layout() theo mép ngoài cụm vòng + nửa bề rộng nhãn (lúc nhãn ở 3/9 giờ).
     Hai tâm nhãn cách nhau >= chiều cao nhãn => không đè khi hai kim trùng. */
  // Nhãn nay là HÌNH TRÒN đều Ø=26px (khớp --badge-dia ở CSS) -> nửa bề ngang = nửa bề cao = bán kính.
  const BADGE_H    = 26;   // ĐƯỜNG KÍNH nhãn (cũng = khoảng hở dọc tối thiểu giữa 2 vòng nhãn)
  const BADGE_HALF = 13;   // BÁN KÍNH nhãn (điểm gần tâm nhất khi nhãn ở 3/9 giờ = tâm - bán kính)
  const SAFE       = 10;   // dư để hai nhãn chắc chắn không chạm
  const EDGE       = 12;   // lề tối thiểu tới cạnh màn hình

  let FACE;
  let ARC_R_M = 0, ARC_R_D1 = 0, ARC_R_D2 = 0;
  let HOUR_BADGE_R = 0, HOUR_HALF = 0, lastPm = null;   // nét nối nhãn GIỜ bám vòng ngày đang chạy

  // Chiều cao vùng nhìn thấy THẬT (đã trừ thanh công cụ Safari): visualViewport chính
  // xác nhất; 100dvh/clientHeight trên vài bản Safari trả vùng LỚN -> căn giữa bị lệch.
  const viewportH = () => (window.visualViewport && window.visualViewport.height)
        || document.documentElement.clientHeight || window.innerHeight;

  // MediaQuery dùng chung cho layout()/relayout(). 2 bố cục theo BỀ RỘNG:
  //   >=768px: đồng hồ trái + lịch phải | <768px: xếp dọc.
  const MQ = {
    desktop: window.matchMedia('(min-width:768px)'),
  };

  function layout(){
    const ARC_GAP = 8;

    // ===== Bán kính VÒNG & NHÃN (đều là độ lệch so với FACE, KHÔNG phụ thuộc FACE) =====
    const R_D1_OFF = 18;                       // vòng nửa ngày 1
    const R_D2_OFF = 23;                       // vòng nửa ngày 2 (NGOÀI cùng)
    const STREAK_HALF = 2;                     // nửa bề rộng nét ĐẬM nhất (--ring-bold 3.2 -> ~1.6, làm tròn lên 2 cho dư)
    const RING_OUT = R_D2_OFF + STREAK_HALF;   // mép NGOÀI của cả cụm vòng

    // Nhãn quay quanh mặt: khi ở 3/9 giờ, điểm GẦN TÂM NHẤT của nhãn = tâm_nhãn - BADGE_HALF.
    // Phải tính cả 2 vòng ngày mới: điểm đó cách mép cụm vòng (RING_OUT) ít nhất CLEAR
    //   => tâm nhãn phút = RING_OUT + CLEAR + BADGE_HALF (xa hơn công thức cũ dựa vòng phút).
    const CLEAR = 3;
    const badgeM_off = RING_OUT + CLEAR + BADGE_HALF;   // khoảng cách tâm -> nhãn PHÚT
    const badgeH_off = badgeM_off + BADGE_H + SAFE;     // khoảng cách tâm -> nhãn GIỜ (xa hơn, không đè)

    // Lề quanh mặt = mép NGOÀI nhãn giờ lúc nằm ngang (tâm + nửa bề rộng) + 1 ARC_GAP dư.
    const maxReach = badgeH_off + BADGE_HALF + ARC_GAP;

    const vh = viewportH();

    // 2 bố cục theo CHIỀU RỘNG (khớp media query CSS): desktop (≥768) | dọc (<768)
    const desktop = MQ.desktop.matches;

    // Ghim chiều cao body = vùng nhìn thấy để căn giữa khỏi lọt dưới thanh công cụ Safari.
    document.body.style.height = vh + 'px';
    // Đo CẢ cột digital (gồm dòng văn nói đã dành chỗ) -> luôn còn chỗ hiển thị.
    const digitalCol = document.querySelector('.digital-col');
    const digitalH = digitalCol?.offsetHeight || 140;
    // Lịch là khối riêng: desktop nằm bên PHẢI (chừa bề rộng), mobile nằm DƯỚI (chừa chiều cao)
    const calendar = document.querySelector('.calendar');
    const calW = calendar?.offsetWidth  || 0;
    const calH = calendar?.offsetHeight || 0;
    const bodyPad = 16;                       // padding .5rem hai đầu

    // ===== Lề dọc analog: đẩy analog LÊN, cách digital/cát xa hơn — KHÔNG co FACE =====
    // marginTop=maxReach (tính theo bề NGANG nhãn) dư hơn tầm với THẲNG ĐỨNG (topNeed) ~12px
    // -> dời phần dư xuống dưới: analog nhích LÊN. GAP_EXTRA lấy thêm từ ĐỆM ĐÁY (bù trong
    // faceByH) -> khe hở tới digital rõ hơn mà FACE giữ nguyên.
    const topNeed   = badgeH_off + BADGE_H/2;
    const RAISE     = Math.max(0, maxReach - topNeed);   // dời analog lên (~12px)
    const GAP_EXTRA = desktop ? 24 : 8;                  // khe thêm lấy từ đệm đáy
    const marginTop = maxReach - RAISE;
    const marginBottom = Math.max(8, topNeed) + RAISE + GAP_EXTRA;
    const GAP = 24;  // khe giữa các khối (khớp gap của body & .clock)
    const availW = Math.min(window.innerWidth, 1600) - EDGE*2;
    let faceByW, faceByH;
    if(desktop){
      // [analog/digital] | LỊCH. Chừa thêm ~40px chiều cao (clock căn giữa -> ~28px lề
      // trên & dưới) để DÒNG VĂN NÓI ở đáy cột digital không sát mép dưới màn hình.
      faceByH = (vh - bodyPad - marginTop - marginBottom - digitalH - 40 + GAP_EXTRA) / 2;
      faceByW = (availW - 2*maxReach - calW - GAP) / 2;
    } else {
      // Mobile DỌC: chiều cao phải chứa analog + digital + LỊCH (xếp dọc).
      const halfW = (Math.min(window.innerWidth, 900) / 2) - EDGE;
      faceByW = halfW - maxReach;
      faceByH = (vh - bodyPad - marginTop - marginBottom - digitalH - calH - 16 + GAP_EXTRA) / 2;
    }

    FACE = Math.min(faceByW, faceByH);
    // Sàn tối thiểu 70 NHƯNG không bao giờ vượt quá giới hạn BỀ RỘNG (faceByW) ->
    // bề ngang khối analog luôn vừa viewport, không gây scroll ngang. (Màn quá thấp
    // thì chấp nhận co theo chiều cao thay vì tràn ngang.)
    FACE = Math.max(FACE, Math.min(70, faceByW));

    const D = FACE*2;
    analog.style.width  = D+'px';
    analog.style.height = D+'px';
    // Lề: trên = marginTop (đã nhích analog lên); dưới = marginBottom (khe hở tới digital);
    //     hai bên = maxReach (đủ chỗ nhãn lúc 3/9 giờ).
    analog.style.margin = `${marginTop}px ${maxReach}px ${marginBottom}px`;

    // Vòng đồng tâm. Hai vòng "ngày" gom SÁT nhau thành một nhóm và đặt CÁCH XA
    // vòng phút để tách bạch hai nhóm. (Vệt mờ rộng vẫn không đè nhau.)
    ARC_R_M  = FACE + ARC_GAP;        // vòng phút (60') — nhóm trong, sát mặt
    ARC_R_D1 = FACE + R_D1_OFF;       // vòng nửa ngày 1 (sáng 0-12h) — xa hẳn vòng phút
    ARC_R_D2 = FACE + R_D2_OFF;       // vòng nửa ngày 2 (chiều/tối 12-24h) — sát vòng 1

    // Tâm nhãn: nằm NGOÀI cả cụm vòng (đã tính ở trên), không đè vòng ngày khi quay tới 3/9 giờ
    const badgeM_r = FACE + badgeM_off;   // nhãn phút
    const badgeH_r = FACE + badgeH_off;   // nhãn giờ

    // Nét nối: nhãn PHÚT nối từ VÒNG PHÚT (ARC_R_M). Nhãn GIỜ nối từ vòng ngày ĐANG CHẠY
    //   (sáng -> vòng TRONG D1, chiều/tối -> vòng NGOÀI D2) nên LUÔN chạm vòng hiện hành.
    //   Dùng chiều cao thật của nhãn đo được để nét nối kết thúc đúng tại mép nhãn.
    const realHalfM = elBadgeM.offsetHeight/2 || BADGE_H/2;
    const realHalfH = elBadgeH.offsetHeight/2 || BADGE_H/2;
    const lenM = (badgeM_r - realHalfM) - ARC_R_M;
    place(elConnM, elBadgeM, ARC_R_M, lenM, badgeM_r);
    // Nhãn GIỜ: lưu bán kính nhãn + nửa chiều cao để placeHourConn() tính lại khi qua trưa/nửa đêm.
    HOUR_BADGE_R = badgeH_r; HOUR_HALF = realHalfH;
    elBadgeH.style.marginTop = (-badgeH_r) + 'px';
    placeHourConn(new Date().getHours() >= 12);

    // Nhãn EMOJI cố định: GIỐNG nhãn giờ (cùng bán kính badgeH_r, nét nối từ vòng ngày ngoài
    // ARC_R_D2) nhưng đặt tại 'hour' giờ thập phân. Trên mặt 12h: góc = hour*30 (vd 22h -> 660°≡300°).
    //   inner=true -> đặt nhãn ở VÒNG TRONG (bán kính nhãn phút) để KHÔNG đè nhãn cùng góc
    //   ở vòng ngoài (vd 10h sáng & 22h tối đều ở 300°): nhãn sáng nằm trong, tối nằm ngoài.
    const placeFixed = (orbit, conn, badge, hour, inner=false) => {
      const deg = hour * 30;
      const ringR = hour < 12 ? ARC_R_D1 : ARC_R_D2;   // SÁNG -> vòng TRONG (AM); CHIỀU/TỐI -> vòng NGOÀI (PM)
      const badgeR = inner ? badgeM_r : badgeH_r;       // tầng nhãn: trong (badgeM_r) / ngoài (badgeH_r)
      const realHalf = badge.offsetHeight/2 || BADGE_H/2;
      const len = (badgeR - realHalf) - ringR;
      place(conn, badge, ringR, len, badgeR);                            // nét nối CHẠM đúng vòng AM/PM
      orbit.style.transform = `rotate(${deg}deg)`;                       // hướng nhãn ra đúng giờ
      badge.style.transform = `translate(-50%,-50%) rotate(${-deg}deg)`; // giữ nhãn thẳng đứng
    };
    placeFixed(elOrbitExercise,   elConnExercise,   elBadgeExercise,   8);          // tập thể dục 8h (T2-T6)
    placeFixed(elOrbitBasketSat,  elConnBasketSat,  elBadgeBasketSat,  8.25);       // bóng rổ 8h15 (thứ Bảy)
    placeFixed(elOrbitBreakfast,  elConnBreakfast,  elBadgeBreakfast,  8.25);       // ăn sáng 8h15 (T2-T6)
    placeFixed(elOrbitArt,        elConnArt,        elBadgeArt,        10, true);   // vẽ 10h (thứ Bảy) — vòng TRONG, tránh đè 22h
    placeFixed(elOrbitSwim,       elConnSwim,       elBadgeSwim,       17.5);       // bơi 17h30 (mọi ngày)
    placeFixed(elOrbitBasketball, elConnBasketball, elBadgeBasketball, 18);         // bóng rổ 18h (thứ Ba)
    placeFixed(elOrbitBallet,     elConnBallet,     elBadgeBallet,     18);          // múa 18h (thứ Sáu)
    placeFixed(elOrbitDinner,     elConnDinner,     elBadgeDinner,     19.5);       // ăn tối 19h30
    placeFixed(elOrbitSleep,      elConnSleep,      elBadgeSleep,      22);         // đi ngủ 22h
    // Nhãn bật-khi-cần (☀️🍒🍬): đặt vị trí như nhãn giờ theo 'hour' (AM->vòng trong, PM->ngoài).
    for(const L of customLabels){
      placeFixed(L.orbit, L.orbit.querySelector('.connector'), L.orbit.querySelector('.badge'), L.hour, !!L.inner);
    }
    // Nhãn người dùng tự thêm: cùng cách đặt vị trí.
    for(const o of userLabelObjs){ placeFixed(o.orbit, o.conn, o.badge, o.hour, false); }

    layoutFace();
  }

  function polar(r, deg){
    const a=(deg-90)*Math.PI/180;
    return [r*Math.cos(a), r*Math.sin(a)];
  }
  function arcPath(r, startDeg, endDeg){
    const sweep=endDeg-startDeg;
    if(sweep<=0.001) return '';
    const [x1,y1]=polar(r, startDeg);
    const [x2,y2]=polar(r, endDeg);
    const largeArc = sweep>180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
  }
  // Vẽ MỘT vòng 4 trạng thái: track(MẢNH MỜ=tương lai) + arc(MẢNH ĐẶC=quá khứ)
  //   + act(ĐẬM MỜ=ô hiện tại) + live(ĐẬM ĐẶC=phần đã trôi trong ô hiện tại).
  //   doneDeg = hết các đơn vị đã qua; slot = bề rộng 1 đơn vị (6° phút / 30° giờ); liveDeg = tiến trình.
  //   slot=0 -> không có ô hiện tại (dùng cho nửa ngày KHÔNG diễn ra).
  function drawRing(g, r, doneDeg, slot, liveDeg){
    setD(g.track, arcPath(r, 0, 359.999));                         // cả vòng: MẢNH MỜ (chưa tới)
    setD(g.arc,   arcPath(r, 0, doneDeg));                         // đã qua: MẢNH ĐẶC
    setD(g.act,   slot ? arcPath(r, doneDeg, doneDeg+slot) : ''); // ô hiện tại: ĐẬM MỜ
    setD(g.live,  slot ? arcPath(r, doneDeg, liveDeg) : '');      // đã trôi trong ô: ĐẬM ĐẶC
  }
  // Vòng phút (60'): đơn vị 6°; đã qua = phút trọn, ô PHÚT hiện tại đậm, tiến trình theo giây.
  function updateMinArc(m, s){
    drawRing(ring.min, ARC_R_M, m*6, 6, (m + s/60)*6);
  }
  // Hai vòng nửa ngày (mỗi vòng 12h, đơn vị GIỜ = 30°): SÁNG -> vòng 1 chạy, CHIỀU/TỐI -> vòng 2.
  //   Vòng đang chạy: đủ 4 trạng thái. Vòng kia: nửa ĐÃ xong -> đầy đặc; chưa tới -> chỉ track mờ.
  function drawDayRings(g1, g2, r1, r2, h, m, s){
    const H = h % 12, doneDeg = H*30, liveDeg = (H + m/60 + s/3600)*30, pm = h >= 12;
    drawRing(pm ? g2 : g1, pm ? r2 : r1, doneDeg, 30, liveDeg);   // nửa đang chạy: đủ 4 trạng thái
    drawRing(pm ? g1 : g2, pm ? r1 : r2, pm ? 359.999 : 0, 0, 0); // nửa kia: đầy nếu đã qua / mờ nếu chưa tới
  }
  function updateDayArcs(h, m, s){
    drawDayRings(ring.day1, ring.day2, ARC_R_D1, ARC_R_D2, h, m, s);
  }

  function place(conn, badge, connStart, len, badgeR){
    conn.style.top    = (-(connStart+len))+'px';   // điểm xa tâm nhất của nét nối
    conn.style.height = len+'px';
    badge.style.marginTop = (-badgeR)+'px';
  }
  // Nét nối nhãn GIỜ: bám vòng ngày đang chạy (pm -> vòng NGOÀI D2, sáng -> vòng TRONG D1).
  //   Đầu xa (mép nhãn) cố định ở HOUR_BADGE_R - HOUR_HALF; chỉ đổi điểm đầu trong theo vòng.
  function placeHourConn(pm){
    const ring = pm ? ARC_R_D2 : ARC_R_D1;
    const len  = (HOUR_BADGE_R - HOUR_HALF) - ring;
    elConnH.style.top    = (-(ring + len)) + 'px';
    elConnH.style.height = len + 'px';
  }

  // Đặt lại vạch chia và số theo FACE hiện tại
  function layoutFace(){
    // Hai khoảng riêng:
    //   G_RIM: mép -> đầu vạch
    //   G_NUM: đuôi vạch -> chữ số  (để nhỏ cho số sát vạch)
    const G_RIM = 5;
    const G_NUM = 2;
    const majorLen = 8;
    const minorLen = 4;
    const tickOuter = FACE - G_RIM;
    const tickInner = tickOuter - majorLen;

    tickSpans.forEach((sp,i)=>{
      const major=(i%5===0);
      const len=major?majorLen:minorLen;
      sp.style.top=(-tickOuter)+'px';
      sp.style.height=len+'px';
    });

    // Đặt BÁN KÍNH RIÊNG cho từng số: mép ngoài mỗi số cách đuôi vạch đúng G_NUM
    numerals.forEach(el=>{
      const n=+el.dataset.n;
      const ang=(n*30-90)*Math.PI/180;
      const rg=document.createRange(); rg.selectNodeContents(el);
      const r=rg.getBoundingClientRect();
      const halfReach=Math.abs(Math.cos(ang))*r.width/2 + Math.abs(Math.sin(ang))*r.height/2;
      const radius=(tickInner - G_NUM) - halfReach;
      el.style.left=`calc(50% + ${Math.cos(ang)*radius}px)`;
      el.style.top=`calc(50% + ${Math.sin(ang)*radius}px)`;
    });
    // Kim ngắn hơn vòng số để không đè lên số (dùng ref đã cache)
    const hh=FACE*0.34, mh=FACE*0.55, sh=FACE*0.62;
    elHour.style.height=hh+'px'; elHour.style.marginTop=(-hh)+'px';
    elMin.style.height=mh+'px';  elMin.style.marginTop=(-mh)+'px';
    elSec.style.height=sh+'px';  elSec.style.marginTop=(-sh)+'px';
  }

  function updateBadge(el, txt){
    if(el.textContent!==txt) el.textContent=txt;
  }

  // Trạng thái "nảy" của mỗi nhãn: thời điểm bắt đầu + đỉnh scale. Scale do JS lo (xem tick).
  const BEAT_MS = 450;
  const beat = { H:{start:-1e12, peak:1, badge:elBadgeH},
                 M:{start:-1e12, peak:1, badge:elBadgeM} };

  // Hệ số scale tại thời điểm now cho một nhãn (envelope: lên đỉnh ~22% rồi về 1).
  function beatScale(b, now){
    const t = (now - b.start) / BEAT_MS;
    if(t<=0 || t>=1) return 1;
    const up = 0.22;
    const e = t<up ? t/up : 1-(t-up)/(1-up);   // tam giác 0..1..0
    return 1 + (b.peak-1) * (e*(2-e));          // ease-out nhẹ
  }

  // Bắn một nhịp lên nhãn (key 'H'/'M'): NỀN nhấp bằng CSS; SCALE do JS gộp vào transform.
  // cls = 'beat' (thường) hoặc 'beat-final' (nhịp cuối, nảy mạnh hơn).
  function pulse(key, cls){
    const b = beat[key];
    b.badge.classList.remove('beat','beat-final');
    void b.badge.offsetWidth;          // restart CSS animation nền
    b.badge.classList.add(cls);
    b.start = performance.now();
    b.peak  = cls==='beat-final' ? 1.3 : 1.12;
  }

  // Lật đồng hồ cát (one-shot): gỡ class rồi thêm lại để animation chạy lại từ đầu
  function flipHourglass(el){
    el.classList.remove('flip');
    void el.offsetWidth;
    el.classList.add('flip');
    el.addEventListener('animationend', ()=>el.classList.remove('flip'), {once:true});
  }

  let lastSec=-1;
  let lastSecHg=-1;
  // Đồng hồ cát: p = tiến trình 0..1. Cát trên vơi (lùi xuống), cát dưới đầy (dâng lên).
  //   Hai buồng cát là TAM GIÁC (đỉnh ở cổ) nên THỂ TÍCH (~ diện tích) tỉ lệ với
  //   chiều cao BÌNH PHƯƠNG. Muốn cát chảy đều theo thời gian (thể tích tuyến tính
  //   theo p) thì chiều cao phải đi theo CĂN BẬC HAI, không tuyến tính.
  //   Cát trên còn lại = (1-p) thể tích  -> chiều cao còn lại ~ sqrt(1-p)
  //   Cát dưới phần TRỐNG phía trên = (1-p) thể tích -> chiều cao trống ~ sqrt(1-p)
  function updateHourglass(g, p){
    // Đang lật: giữ cát ở trạng thái CẠN cho khớp lúc xoay, chưa refill vội
    if(g.root.classList.contains('flip')) p=1;
    const TOP_Y=4,  TOP_NECK=15;     // tam giác trên: đáy y=4, đỉnh ở cổ y=15
    const BOT_Y=28, BOT_NECK=17;     // tam giác dưới: đáy y=28, đỉnh ở cổ y=17
    const rem=Math.sqrt(Math.max(0, 1-p));   // tỉ lệ CHIỀU CAO ứng với (1-p) thể tích
    const topStart=TOP_NECK - (TOP_NECK-TOP_Y)*rem;
    g.top.setAttribute('y', topStart);
    g.top.setAttribute('height', Math.max(0, TOP_NECK - topStart));
    const botStart=BOT_NECK + (BOT_Y-BOT_NECK)*rem;
    g.bot.setAttribute('y', botStart);
    g.bot.setAttribute('height', Math.max(0, BOT_Y - botStart));
    // Nét dọc cát rơi: chiều dài CỐ ĐỊNH (khai báo sẵn trong rect), luôn hiện -> không xử lý ở JS.
  }

  /* ===== LỊCH THÁNG =====
     Lưới 7 cột (T2..CN, bắt đầu từ Thứ Hai).
       - Hôm nay      : nền xanh ngọc, chữ trắng đậm (.today)
       - Ngày đã qua  : xanh ngọc đậm (.past)
       - Ngày sắp tới : màu chữ thường */
  const DOW = ['T2','T3','T4','T5','T6','T7','CN'];
  // Hàng "thứ" tiếng Anh: cùng thứ tự (bắt đầu Thứ Hai) để thẳng cột với hàng VN
  const DOW_EN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTH_EN = ['January','February','March','April','May','June','July','August',
                    'September','October','November','December'];
  let lastDay = -1;

  // Emoji hoạt động hiện ở góc ô lịch theo THỨ (getDay): T3=bóng rổ, T6=múa, T7=bóng rổ+vẽ
  const DAY_ACTIVITIES = { 2:'🏀', 5:'🩰', 6:'🏀🎨' };
  function buildCalendar(){
    const now = new Date();
    const y = now.getFullYear(), mo = now.getMonth(), today = now.getDate();
    $('calHead').textContent   = `Tháng ${mo+1}, ${y}`;   // tháng/năm VN — TRÊN ngày
    $('calHeadEn').textContent = `${MONTH_EN[mo]} ${y}`;   // tháng/năm EN — DƯỚI ngày (cùng style)
    const grid = $('calGrid');
    grid.innerHTML = '';
    const addCell=(cls,txt)=>{
      const c=document.createElement('div');
      c.className=cls;
      if(txt!=null) c.textContent=txt;
      grid.appendChild(c);
      return c;
    };
    // Hàng "thứ" tiếng Việt — TRÊN ngày
    DOW.forEach(d=>addCell('cal-cell cal-dow', d));
    // Ô trống đầu tháng: lùi theo thứ (Thứ Hai = 0)
    const startOffset = (new Date(y,mo,1).getDay()+6)%7;
    for(let i=0;i<startOffset;i++) addCell('cal-cell');
    const daysInMonth = new Date(y,mo+1,0).getDate();
    for(let d=1;d<=daysInMonth;d++){
      const cell = addCell('cal-cell cal-day'+(d<today?' past':d===today?' today':''), d);
      // Nhãn hoạt động góc trên-phải theo THỨ (getDay 0=CN..6=T7): bóng rổ T3+T7, múa T6, vẽ T7
      const acts = DAY_ACTIVITIES[new Date(y,mo,d).getDay()];
      if(acts){
        const mk = document.createElement('span');
        // 2 emoji (T7: 🏀🎨) -> class --multi để dịch sang phải, khỏi đè số
        mk.className = 'cal-mark' + ([...acts].length > 1 ? ' cal-mark--multi' : '');
        mk.textContent = acts;
        cell.appendChild(mk);
      }
    }
    // Ô trống cuối: lấp đầy hàng cuối để hàng "thứ" EN bên dưới thẳng cột
    const trailing = (7 - ((startOffset+daysInMonth)%7))%7;
    for(let i=0;i<trailing;i++) addCell('cal-cell');
    // Hàng "thứ" tiếng Anh — DƯỚI ngày (cùng thứ tự & style với hàng VN)
    DOW_EN.forEach(d=>addCell('cal-cell cal-dow', d));
    lastDay = today;
  }

  function tick(){
    const now=new Date();
    const tNow=performance.now();
    const h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();

    // Nhãn mốc: bật/tắt trạng thái 'reached'/'upcoming' theo giờ hiện tại + cửa sổ ±6 tiếng
    const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    updateLabelStates(h + m/60 + s/3600, now.getDay(), today);

    // Nét nối nhãn giờ đổi vòng khi qua trưa/nửa đêm (sáng: vòng trong, chiều/tối: vòng ngoài)
    const pm = h >= 12;
    if(pm !== lastPm){ placeHourConn(pm); lastPm = pm; }

    // Kim: góc tăng liên tục, cập nhật MỖI FRAME cho mượt
    const totalSec = now.getTime()/1000 - now.getTimezoneOffset()*60;
    const secDeg  = totalSec*6;
    const minDeg  = (totalSec/60)*6;
    const hourDeg = (totalSec/3600)*30;
    elSec.style.transform=`rotate(${secDeg}deg)`;
    elMin.style.transform=`rotate(${minDeg}deg)`;
    elHour.style.transform=`rotate(${hourDeg}deg)`;
    elOrbitH.style.transform=`rotate(${hourDeg}deg)`;
    elOrbitM.style.transform=`rotate(${minDeg}deg)`;
    elBadgeH.style.transform=`translate(-50%,-50%) rotate(${-hourDeg}deg) scale(${beatScale(beat.H, tNow)})`;
    elBadgeM.style.transform=`translate(-50%,-50%) rotate(${-minDeg}deg) scale(${beatScale(beat.M, tNow)})`;

    // Cung: cập nhật mỗi frame để chạy theo kim mượt
    updateDayArcs(h, m, s);
    updateMinArc(m, s);

    // Đồng hồ cát: giờ theo phút trôi trong giờ; phút theo giây trôi trong phút (mượt theo ms)
    const ms = now.getMilliseconds();
    // Lật NGAY khi sang chu kỳ mới (kiểm tra trước khi vẽ cát để cát không "đầy" lố 1 frame)
    if(s!==lastSecHg){
      if(lastSecHg===59 && s===0){
        flipHourglass(hg.M.root);
        if(m===0) flipHourglass(hg.H.root);
      }
      lastSecHg=s;
    }
    updateHourglass(hg.H, (m + (s + ms/1000)/60) / 60);
    updateHourglass(hg.M, (s + ms/1000) / 60);

    // Text + nhãn: chỉ cập nhật khi giây đổi (đỡ tải, không gây giật)
    if(s!==lastSec){
      const justSwitched = (lastSec===59 && s===0); // vừa qua mốc 59->00
      lastSec=s;

      // Sang ngày mới -> dựng lại lịch (di chuyển ô "hôm nay") rồi căn lại bố cục
      if(now.getDate()!==lastDay){ buildCalendar(); layout(); }
      updateBadge(elTextH, String(gio12(h)));
      updateBadge(elTextM, String(m));
      elH.textContent=pad(h);
      elM.textContent=pad(m);
      elS.textContent=pad(s);

      // Văn nói: 0–5s VN hơn · 5–10s EN hơn · 10–15s VN kém · 15–20s EN kém.
      // Nửa đầu giờ (<:30) không có cách đọc kém -> trả null. Khi hết câu: bỏ 'show' cho
      // mờ dần, giây sau XOÁ HẲN nội dung -> không để text ẩn nằm lại trong DOM.
      const phrase = s<5  ? noiGioHon(h,m)
                   : s<10 ? noiGioEnHon(h,m)
                   : s<15 ? noiGioKem(h,m)
                   : s<20 ? noiGioEnKem(h,m)
                   : null;
      if(phrase){
        if(elSpoken.innerHTML!==phrase) elSpoken.innerHTML=phrase;
        elSpoken.classList.add('show');
      }else if(elSpoken.classList.contains('show')){
        elSpoken.classList.remove('show');   // vừa hết câu -> mờ dần
      }else if(elSpoken.innerHTML){
        elSpoken.innerHTML='';               // đã mờ xong -> xoá hẳn, không render nữa
      }

      // Tô đậm số giờ hiện tại trên mặt (1-12; giờ 0/12 -> số 12)
      const hourNum = (h%12)===0 ? 12 : (h%12);
      numerals.forEach(el=>{
        el.classList.toggle('active', +el.dataset.n===hourNum);
      });

      // Đếm ngược 6 nhịp: giây 55,56,57,58,59 (nhịp thường) rồi 00 (nhịp CUỐI).
      // Nhãn phút đập mỗi phút; nhãn giờ chỉ khi đang chạm mốc sang giờ mới.
      if(s>=55){
        pulse('M','beat');             // phút: 55-59
        if(m===59) pulse('H','beat');  // giờ : 55-59 của phút 59
      }else if(justSwitched){
        pulse('M','beat-final');       // phút: nhịp cuối tại 00
        if(m===0) pulse('H','beat-final'); // giờ: nhịp cuối tại 00
      }
    }

    requestAnimationFrame(tick);
  }
  // Chỉ căn lại khi kích thước THẬT SỰ đổi -> tránh giật: relayout khi đổi BỀ RỘNG
  // HOẶC CHIỀU CAO đáng kể (>2px) — bỏ nhiễu do thanh công cụ Safari ẩn/hiện.
  let lastW=-1, lastVh=-1;
  function relayout(){
    // ĐANG PHÓNG TO BẰNG 2 NGÓN (pinch-zoom) -> GIỮ NGUYÊN bố cục & tỷ lệ:
    // vùng nhìn thấy lúc zoom thu nhỏ lại, nếu tính lại sẽ co/đẩy đồng hồ theo nó.
    // Bỏ qua relayout khi scale != 1 -> trang chỉ phóng to đồng đều, không xô lệch.
    const vv=window.visualViewport;
    if(vv && Math.abs(vv.scale-1)>0.01) return;
    const w=window.innerWidth;
    const vh=viewportH();
    if(w===lastW && Math.abs(vh-lastVh)<2) return;
    lastW=w; lastVh=vh; layout();
  }

  // ===== Nhãn người dùng + popup tạo nhãn =====
  const LS_USER_LABELS = 'zumUserLabels';
  function saveUserLabels(){ try{ localStorage.setItem(LS_USER_LABELS, JSON.stringify(userLabels)); }catch(e){} }
  // Dựng lại toàn bộ DOM nhãn người dùng từ mảng userLabels (gắn vào .analog như nhãn emoji khác).
  function buildUserLabels(){
    userLabelObjs.forEach(o => o.orbit.remove());
    userLabelObjs = [];
    for(const u of userLabels){
      const orbit = document.createElement('div');
      orbit.className = 'orbit emoji-orbit upcoming off user-label';
      const conn  = document.createElement('div'); conn.className = 'connector';
      const badge = document.createElement('div'); badge.className = 'badge badge-emoji';
      const ic    = document.createElement('span'); ic.className = 'ic-emoji'; ic.textContent = u.emoji;
      const dline = document.createElement('span'); dline.className = 'deadline-min';
      dline.textContent = String(Math.round((u.hour % 1) * 60)).padStart(2,'0');
      const del   = document.createElement('button'); del.className = 'label-del';
      del.textContent = '×'; del.setAttribute('aria-label','Xóa nhãn');
      del.addEventListener('click', e => { e.stopPropagation(); removeUserLabel(u.id); });
      badge.append(ic, dline, del);
      badge.addEventListener('click', () => orbit.classList.toggle('reveal-del'));  // chạm để hiện × (mobile)
      orbit.append(conn, badge);
      analog.appendChild(orbit);
      userLabelObjs.push({orbit, conn, badge, hour:u.hour, dline});
    }
  }
  function addUserLabel(emoji, hour){
    userLabels.push({id:'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,5), emoji, hour});
    saveUserLabels(); buildUserLabels(); layout();
  }
  function removeUserLabel(id){
    userLabels = userLabels.filter(u => u.id !== id);
    saveUserLabels(); buildUserLabels(); layout();
  }
  // Popup (không chữ): chọn emoji / giờ (màu giờ) / phút (màu phút) -> ✓ tạo nhãn.
  (function setupAddLabelUI(){
    try{ userLabels = JSON.parse(localStorage.getItem(LS_USER_LABELS)) || []; }catch(e){ userLabels = []; }
    const fab=$('fab'), modal=$('labelModal'), emojiPick=$('emojiPick'),
          hourStrip=$('hourStrip'), minStrip=$('minStrip'), modalAdd=$('modalAdd');
    const EMOJIS=['☀️','🍒','🍬','🏀','🩰','🎨','🏊','⚽','📚','🎹','🎮','🍎','🥗','🛌','🧘','🚴','🏃','💊','🦷','✏️'];
    let selEmoji=EMOJIS[0], selHour=new Date().getHours(), selMin=0;
    const setSel=(box,btn)=>{ box.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); };
    const mkBtn=(box,txt,on,sel)=>{ const b=document.createElement('button'); b.textContent=txt; if(sel)b.classList.add('sel'); b.addEventListener('click',()=>{on(); setSel(box,b);}); box.appendChild(b); };
    EMOJIS.forEach((em,i)=> mkBtn(emojiPick, em, ()=>selEmoji=em, i===0));
    for(let h=0;h<24;h++)  mkBtn(hourStrip, String(h).padStart(2,'0'),  ()=>selHour=h, h===selHour);
    for(let mm=0;mm<60;mm+=5) mkBtn(minStrip, String(mm).padStart(2,'0'), ()=>selMin=mm, mm===selMin);
    const centerSel = strip => { const s=strip.querySelector('.sel'); if(s) strip.scrollLeft = s.offsetLeft - strip.clientWidth/2 + s.clientWidth/2; };
    fab.addEventListener('click', ()=>{ modal.classList.add('open'); centerSel(hourStrip); centerSel(minStrip); });
    modal.addEventListener('click', e=>{ if(e.target===modal) modal.classList.remove('open'); });
    modalAdd.addEventListener('click', ()=>{ addUserLabel(selEmoji, selHour + selMin/60); modal.classList.remove('open'); });
    buildUserLabels();
  })();

  buildCalendar();   // dựng lịch TRƯỚC khi layout để đo đúng bề rộng/chiều cao lịch
  layout();
  window.addEventListener('resize', relayout);
  window.addEventListener('orientationchange', relayout);
  // Thanh công cụ Safari ẩn/hiện đổi vùng nhìn thấy -> căn lại cho khỏi tràn/cắt
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', relayout);
    window.visualViewport.addEventListener('scroll', relayout);
  }
  // Căn lại sau khi font thật (Space Grotesk) tải xong — tránh căn theo font dự phòng
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(layout);
  }
  // và căn lại vài lần đầu cho chắc (font có thể về trễ)
  setTimeout(layout, 300);
  setTimeout(layout, 1200);
  tick();
</script>
