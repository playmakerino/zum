<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đồng Hồ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
  :root{
    --bg:#fdf6f0;
    --ink:#3f3a5c;
    --muted:#a99fb8;
    --line:#e9cdb6;
    --neutral:#2b2b2b;       /* đen trung tính: mép đồng hồ + ngày chưa đến + tháng/năm */
    --accent:#ff5d97;
    --c-hour:#5a63d8;
    --c-min:#f5921b;
    --c-sec:#ff5d97;
    --c-buoi:#1fab95;
    --c-buoi-faint:rgba(31,171,149,.25);   /* xanh ngọc MỜ — khớp opacity 0.25 của vòng track */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{overflow:hidden;}            /* chặn cuộn ngang/dọc cấp tài liệu (iOS) */
  body{
    height:100vh;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior:none;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
    padding:.5rem;
    font-family:'Space Grotesk',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* Khối "đồng hồ" = analog + digital(+cát). Mặc định (MOBILE DỌC) xếp dọc: analog trên, digital dưới. */
  .clock{ display:flex; flex-direction:column; align-items:center; }

  /* NGANG (rộng >= 768px): toàn bộ ĐỒNG HỒ bên TRÁI, LỊCH bên PHẢI. */
  @media (min-width:768px){
    body{ flex-direction:row; gap:24px; }
    .calendar{ margin-top:0; }   /* căn giữa theo chiều dọc, không cần lề trên */
  }

  /* ANALOG */
  .analog{
    width:300px;height:300px;border-radius:50%;
    background:#fff;
    border:1px solid var(--neutral);  /* mép đồng hồ: đen trung tính */
    position:relative;
    margin:58px;
    box-shadow:0 24px 60px -28px rgba(0,0,0,.25);
  }
  .tick{position:absolute;left:50%;top:50%;transform-origin:0 0;}
  .tick span{
    position:absolute;
    width:1px;height:6px;
    background:var(--c-min);
    left:-0.5px;top:-118px;
  }
  .tick.major span{height:12px;width:1.5px;left:-0.75px;background:var(--c-hour);}
  .numeral{
    position:absolute;
    font-size:.95rem;font-weight:400;line-height:1;
    color:var(--c-hour);
    display:flex;align-items:center;justify-content:center;
    transform:translate(-50%,-50%);
  }
  .numeral.active{font-weight:700;}
  .hand{
    position:absolute;left:50%;top:50%;
    transform-origin:50% 100%;
    border-radius:99px;
    background:var(--ink);
  }
  .hour{width:5px;height:72px;margin-left:-2.5px;margin-top:-72px;background:var(--c-hour);}
  .minute{width:3px;height:104px;margin-left:-1.5px;margin-top:-104px;background:var(--c-min);}
  .second{width:1.5px;height:118px;margin-left:-.75px;margin-top:-118px;
    background:var(--c-sec);}
  .center{
    position:absolute;left:50%;top:50%;
    width:9px;height:9px;border-radius:50%;
    background:var(--accent);transform:translate(-50%,-50%);
    z-index:10;
    box-shadow:0 0 0 4px #fff;
  }
  .orbit{
    position:absolute;left:50%;top:50%;
    width:0;height:0;
    z-index:11;
  }
  .connector{
    position:absolute;left:50%;
    width:1.5px;margin-left:-.75px;
    background:var(--ink);
    transform-origin:center;
  }
  #connH{background:var(--c-hour);}
  #connM{background:var(--c-min);}
  .badge{
    position:absolute;left:50%;top:0;
    transform:translate(-50%,-50%);
    min-width:30px;
    padding:.18rem .35rem;
    border-radius:99px;
    font-size:.78rem;font-weight:500;
    font-variant-numeric:tabular-nums;
    line-height:1;
    /* Căn giữa số bằng flex (không dựa baseline/line-box) */
    display:flex;align-items:center;justify-content:center;
    background:var(--badge-bg);color:#fff;
  }
  #badgeH{--badge-bg:var(--c-hour);}
  #badgeM{--badge-bg:var(--c-min);}
  /* Nhãn EMOJI mốc trong ngày (tập 8h / ăn sáng 8h15 / ăn tối 19h30 / đi ngủ 22h):
     CÙNG màu xanh ngọc; NẰM DƯỚI nhãn giờ khi trùng vị trí. */
  .emoji-orbit{z-index:10;}                           /* < .orbit (11) -> nhãn giờ đè lên khi trùng */
  .emoji-orbit .connector{background:var(--c-buoi);}  /* nét nối xanh ngọc */
  .badge-emoji{padding:.18rem;border:1px solid var(--c-buoi);}
  /* CHƯA đến giờ: KHỚP vòng TRACK (stroke-width 1, opacity 0.25) -> nét nối + border đều
     1px VÀ màu xanh ngọc MỜ (nếu đặc sẽ trông dày hơn vòng mờ dù cùng 1px); nhãn chỉ có VIỀN */
  .emoji-orbit.upcoming .connector{width:1px;margin-left:-.5px;background:var(--c-buoi-faint);}
  .emoji-orbit.upcoming .badge-emoji{background:transparent;border-width:1px;border-color:var(--c-buoi-faint);}
  /* ĐÃ đến/qua giờ: KHỚP vòng ARC "đã qua" (luật mới: stroke-width 1, ĐẶC) -> nét nối + border
     đều 1px ĐẶC; khác 'upcoming' ở chỗ ĐẶC màu (không mờ); nhãn có NỀN xanh ngọc */
  .emoji-orbit.reached .connector{width:1px;margin-left:-.5px;}
  .emoji-orbit.reached .badge-emoji{background:var(--c-buoi);border-width:1px;}
  /* 2 class -> đè .badge span{display:block}; flex để emoji vào ĐÚNG TÂM (không theo baseline) */
  .badge-emoji .ic-emoji{display:flex;align-items:center;justify-content:center;
    width:100%;height:100%;font-size:15px;line-height:1;
    transform:translateY(.06em);}   /* glyph emoji nằm cao trong line-box -> bù xuống ~0.9px */
  .badge span{display:block;}

  /* Nhịp đếm ngược (giây 55-59): mỗi giây một cú nảy gọn, nền nhấp một nhịp.
     NỀN nhấp bằng CSS animation (chỉ đổi background/box-shadow -> không xê dịch).
     SCALE "nảy" do JS gộp thẳng vào transform của badge (cùng translate+rotate,
     transform-origin tâm) -> luôn scale quanh đúng tâm, không lệch vị trí. */
  .badge.beat{animation:beatBg .45s ease-out;}
  .badge.beat-final{animation:beatBgFinal .45s ease-out;}
  @keyframes beatBg{
    0%  {background:var(--badge-bg);}
    25% {background:var(--accent);}
    100%{background:var(--badge-bg);}
  }
  @keyframes beatBgFinal{
    0%  {background:var(--badge-bg);}
    20% {background:#ff3d83;box-shadow:0 0 0 8px rgba(255,93,151,.32);}
    100%{background:var(--badge-bg);box-shadow:0 0 0 0 rgba(255,93,151,0);}
  }

  /* DIGITAL */
  .digital{
    display:flex;
    align-items:flex-start;
    gap:clamp(.6rem,3vw,1.1rem);
  }
  .unit{display:flex;flex-direction:column;align-items:center;gap:.45rem;}
  /* Ô chứa icon: chiều cao cố định -> mọi số (và dấu :) bắt đầu cùng một mốc => thẳng hàng */
  .hg-slot{
    height:clamp(30px,8vw,42px);
    display:flex;align-items:center;justify-content:center;
  }
  .hourglass{
    width:clamp(27px,7vw,40px);
    height:100%;
    display:block;
    overflow:visible;
    transform-origin:50% 50%;
  }
  .hourglass.flip{animation:hgFlip .7s ease-in-out;}
  @keyframes hgFlip{
    0%  {transform:rotate(0deg);}
    100%{transform:rotate(180deg);}
  }
  .hg-glass{fill:none;stroke:var(--line);stroke-width:1.2;}
  .hg-cap{stroke-width:1.6;stroke-linecap:round;}
  .u-hour .hg-cap{stroke:var(--c-hour);}
  .u-min  .hg-cap{stroke:var(--c-min);}
  .u-hour .hg-sand,.u-hour .hg-stream{fill:var(--c-hour);}
  .u-min  .hg-sand,.u-min  .hg-stream{fill:var(--c-min);}
  .num{
    font-size:clamp(1.1rem,4.6vw,1.6rem);font-weight:300;line-height:1;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.02em;
  }
  #h{color:var(--c-hour);}
  #m{color:var(--c-min);}
  #s{color:var(--c-sec);}
  .sep{
    display:flex;flex-direction:column;align-items:center;gap:.45rem;
  }
  .sep-mark{
    font-size:clamp(1.1rem,4.6vw,1.6rem);font-weight:300;line-height:1;color:var(--line);
  }

  /* Cột digital: bọc đồng hồ số + dòng "văn nói" ngay dưới nó.
     Dòng văn nói nằm trong luồng, chiều cao cố định luôn được dành sẵn
     (chỉ đổi opacity khi hiện/ẩn -> không giật), và layout() đo cả cột này
     nên analog co vừa đủ để luôn còn chỗ cho dòng văn nói. */
  .digital-col{
    display:flex;flex-direction:column;align-items:center;
    position:relative;
    padding-bottom:2.1rem;   /* chừa chỗ cho dòng văn nói (đặt TUYỆT ĐỐI -> không nới rộng cột) */
  }
  .spoken{
    /* Tuyệt đối + translateX(-50%): căn giữa CHẮC CHẮN theo bề ngang cột, và KHÔNG
       làm cột digital rộng ra (tránh dòng dài làm analog co nhỏ ở landscape). */
    position:absolute;
    left:50%; bottom:0;
    transform:translateX(-50%);
    height:1.4em;
    white-space:nowrap;
    font-size:clamp(.85rem,3.6vw,1.05rem);
    font-weight:400;
    color:var(--muted);
    text-align:center;
    opacity:0;
    transition:opacity .4s ease;
    pointer-events:none;
  }
  .spoken.show{opacity:1;}
  /* Viết hoa chữ cái đầu câu (câu bắt đầu bằng số thì giữ nguyên; văn nói VN luôn bắt đầu bằng số) */
  .spoken::first-letter{text-transform:uppercase;}
  /* Giờ -> màu giờ; phần phút (đúng/rưỡi/kém/Y phút) -> màu phút; buổi -> xanh ngọc */
  .spoken .sp-h{color:var(--c-hour);}
  .spoken .sp-m{color:var(--c-min);}
  .spoken .sp-b{color:var(--c-buoi);}

  /* LỊCH THÁNG */
  .calendar{
    display:flex;flex-direction:column;align-items:center;
    gap:clamp(.5rem,2vw,.8rem);
    margin-top:.8rem;                 /* mobile: cách digital phía trên; desktop reset =0 */
    font-variant-numeric:tabular-nums;
  }
  .cal-head{                          /* tháng/năm (VN ở trên, EN ở dưới — cùng style) */
    font-size:clamp(.95rem,4vw,1.2rem);
    font-weight:500;
    letter-spacing:.02em;
    color:var(--neutral);             /* tháng/năm: đen trung tính */
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:clamp(.15rem,1vw,.4rem);
  }
  .cal-cell{
    width:clamp(1.7rem,6.5vw,2.3rem);
    height:clamp(1.7rem,6.5vw,2.3rem);
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(.78rem,3.2vw,1rem);
    line-height:1;
    border-radius:50%;
  }
  .cal-dow{                           /* tiêu đề thứ trong tuần */
    color:var(--muted);
    font-size:clamp(.6rem,2.6vw,.78rem);
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .cal-day{ color:var(--neutral); }   /* ngày chưa đến: đen trung tính */
  .cal-day.past{                      /* ngày đã qua: xanh ngọc đậm */
    color:var(--c-buoi);
  }
  .cal-day.today{                     /* hôm nay: nền xanh ngọc, chữ trắng đậm */
    background:var(--c-buoi);
    color:#fff;
    font-weight:700;
  }
</style>
</head>
<body>
  <div class="clock">
  <div class="analog" id="analog">
    <svg style="position:absolute;left:50%;top:50%;overflow:visible;pointer-events:none;z-index:9;">
      <!-- LUẬT MỚI — mỗi vòng MỘT màu, 3 lớp:
             track  = CẢ vòng, nét MẢNH + MỜ (opacity .25)  -> phần CHƯA tới
             arc    = phần ĐÃ QUA, nét MẢNH + ĐẶC (opacity 1)
             active = Ô HIỆN TẠI (giờ/phút này), nét ĐẬM + ĐẶC
           Màu: 2 vòng NGÀY/GIỜ = c-hour (xanh giờ); vòng PHÚT = c-min (cam).
           Vòng 1 = sáng (0-12h), vòng 2 = chiều/tối (12-24h). -->
      <path id="dayTrack1" fill="none" stroke="var(--c-hour)" stroke-width="1" stroke-linecap="butt" opacity="0.25"></path>
      <path id="dayTrack2" fill="none" stroke="var(--c-hour)" stroke-width="1" stroke-linecap="butt" opacity="0.25"></path>
      <path id="dayArc1" fill="none" stroke="var(--c-hour)" stroke-width="1" stroke-linecap="butt"></path>
      <path id="dayArc2" fill="none" stroke="var(--c-hour)" stroke-width="1" stroke-linecap="butt"></path>
      <path id="dayActive1" fill="none" stroke="var(--c-hour)" stroke-width="2.5" stroke-linecap="butt"></path>
      <path id="dayActive2" fill="none" stroke="var(--c-hour)" stroke-width="2.5" stroke-linecap="butt"></path>
      <path id="minTrack" fill="none" stroke="var(--c-min)" stroke-width="1" stroke-linecap="butt" opacity="0.25"></path>
      <path id="minArc" fill="none" stroke="var(--c-min)" stroke-width="1" stroke-linecap="butt"></path>
      <path id="minActive" fill="none" stroke="var(--c-min)" stroke-width="2.5" stroke-linecap="butt"></path>
    </svg>
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
    <div class="orbit emoji-orbit upcoming" id="orbitSleep">
      <div class="connector" id="connSleep"></div>
      <div class="badge badge-emoji" id="badgeSleep"><span class="ic-emoji">😴</span></div>
    </div>
    <div class="orbit emoji-orbit upcoming" id="orbitDinner">
      <div class="connector" id="connDinner"></div>
      <div class="badge badge-emoji" id="badgeDinner"><span class="ic-emoji">🍲</span></div>
    </div>
    <div class="orbit emoji-orbit upcoming" id="orbitExercise">
      <div class="connector" id="connExercise"></div>
      <div class="badge badge-emoji" id="badgeExercise"><span class="ic-emoji">🙌</span></div>
    </div>
    <div class="orbit emoji-orbit upcoming" id="orbitBreakfast">
      <div class="connector" id="connBreakfast"></div>
      <div class="badge badge-emoji" id="badgeBreakfast"><span class="ic-emoji">🍜</span></div>
    </div>
    <div class="orbit" id="orbitH">
      <div class="connector" id="connH"></div>
      <div class="badge" id="badgeH"><span id="textH">00</span></div>
    </div>
    <div class="orbit" id="orbitM">
      <div class="connector" id="connM"></div>
      <div class="badge" id="badgeM"><span id="textM">00</span></div>
    </div>
    <div class="center"></div>
  </div>

  <div class="digital-col">
    <div class="digital">
      <div class="unit u-hour">
        <span class="hg-slot">
          <svg class="hourglass" id="hgH" viewBox="0 0 24 32" aria-hidden="true">
            <use href="#hg-frame"></use>
            <clipPath id="hgH-top"><rect id="hgH-top-r" x="0" y="0" width="24" height="14"></rect></clipPath>
            <clipPath id="hgH-bot"><rect id="hgH-bot-r" x="0" y="32" width="24" height="0"></rect></clipPath>
            <path class="hg-sand" clip-path="url(#hgH-top)" d="M5 4 H19 L12.8 14.5 V16 H11.2 V14.5 Z"></path>
            <path class="hg-sand" clip-path="url(#hgH-bot)" d="M4 28 L11.2 17 V16 H12.8 V17 L20 28 Z"></path>
            <rect class="hg-stream" x="11.7" y="15" width="0.6" height="13"></rect>
          </svg>
        </span>
        <span class="num" id="h">00</span>
      </div>
      <span class="sep"><span class="hg-slot"></span><span class="sep-mark">:</span></span>
      <div class="unit u-min">
        <span class="hg-slot">
          <svg class="hourglass" id="hgM" viewBox="0 0 24 32" aria-hidden="true">
            <use href="#hg-frame"></use>
            <clipPath id="hgM-top"><rect id="hgM-top-r" x="0" y="0" width="24" height="14"></rect></clipPath>
            <clipPath id="hgM-bot"><rect id="hgM-bot-r" x="0" y="32" width="24" height="0"></rect></clipPath>
            <path class="hg-sand" clip-path="url(#hgM-top)" d="M5 4 H19 L12.8 14.5 V16 H11.2 V14.5 Z"></path>
            <path class="hg-sand" clip-path="url(#hgM-bot)" d="M4 28 L11.2 17 V16 H12.8 V17 L20 28 Z"></path>
            <rect class="hg-stream" x="11.5" y="15" width="1" height="13"></rect>
          </svg>
        </span>
        <span class="num" id="m">00</span>
      </div>
      <span class="sep"><span class="hg-slot"></span><span class="sep-mark">:</span></span>
      <div class="unit u-sec">
        <span class="hg-slot"></span>
        <span class="num" id="s">00</span>
      </div>
    </div>
    <div class="spoken" id="spoken"></div>
  </div>
  </div><!-- /clock -->

  <div class="calendar" id="calendar">
    <div class="cal-head" id="calHead"></div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-head" id="calHeadEn"></div>
  </div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <g id="hg-frame">
        <path class="hg-glass" d="M5 4 H19 L12.8 15 Q12 16 12.8 17 L19 28 H5 L11.2 17 Q12 16 11.2 15 Z"></path>
        <line class="hg-cap" x1="4" y1="4" x2="20" y2="4"></line>
        <line class="hg-cap" x1="4" y1="28" x2="20" y2="28"></line>
      </g>
    </defs>
  </svg>

<script>
  const $ = id => document.getElementById(id);
  const analog = $('analog');

  // Phần tử cập nhật MỖI FRAME -> cache sẵn, khỏi tra DOM lặp lại
  const elHour=$('hour'), elMin=$('minute'), elSec=$('second');
  const elOrbitH=$('orbitH'), elOrbitM=$('orbitM');
  const elBadgeH=$('badgeH'), elBadgeM=$('badgeM');
  const elConnH=$('connH'), elConnM=$('connM');
  const elOrbitSleep=$('orbitSleep'), elBadgeSleep=$('badgeSleep'), elConnSleep=$('connSleep');
  const elOrbitDinner=$('orbitDinner'), elBadgeDinner=$('badgeDinner'), elConnDinner=$('connDinner');
  const elOrbitExercise=$('orbitExercise'), elBadgeExercise=$('badgeExercise'), elConnExercise=$('connExercise');
  const elOrbitBreakfast=$('orbitBreakfast'), elBadgeBreakfast=$('badgeBreakfast'), elConnBreakfast=$('connBreakfast');
  // Mốc nhãn emoji trong ngày -> đổi trạng thái theo giờ hiện tại:
  //   chưa đến giờ = 'upcoming' (viền + nét mảnh); đã đến/qua = 'reached' (nền + nét đậm).
  const fixedLabels = [
    {orbit:elOrbitExercise,  hour:8},
    {orbit:elOrbitBreakfast, hour:8.25},
    {orbit:elOrbitDinner,    hour:19.5},
    {orbit:elOrbitSleep,     hour:22},
  ];
  function updateLabelStates(nowH){
    for(const L of fixedLabels){
      const reached = nowH >= L.hour;
      L.orbit.classList.toggle('reached', reached);
      L.orbit.classList.toggle('upcoming', !reached);
    }
  }
  const elTextH=$('textH'), elTextM=$('textM');
  const elH=$('h'), elM=$('m'), elS=$('s'), elSpoken=$('spoken');

  // Các path cung (cập nhật mỗi frame) gom theo 3 lớp: track(cả vòng, mờ) / arc(đã qua) / act(ô hiện tại, đậm)
  const ring = {
    min:  {track:$('minTrack'),  arc:$('minArc'),  act:$('minActive')},
    day1: {track:$('dayTrack1'), arc:$('dayArc1'), act:$('dayActive1')},
    day2: {track:$('dayTrack2'), arc:$('dayArc2'), act:$('dayActive2')},
  };
  // Đồng hồ cát: root + 2 clip-rect (cát trên / cát dưới)
  const hg = {
    H: {root:$('hgH'), top:$('hgH-top-r'), bot:$('hgH-bot-r')},
    M: {root:$('hgM'), top:$('hgM-top-r'), bot:$('hgM-bot-r')},
  };
  const setD=(el,d)=>el.setAttribute('d', d||'');

  const tickSpans=[];
  for(let i=0;i<60;i++){
    const t=document.createElement('div');
    t.className='tick'+(i%5===0?' major':'');
    t.style.transform=`rotate(${i*6}deg)`;
    const sp=document.createElement('span');
    t.appendChild(sp);
    tickSpans.push(sp);
    analog.appendChild(t);
  }
  const numerals=[];
  for(let n=1;n<=12;n++){
    const el=document.createElement('div');
    el.className='numeral';
    el.dataset.n=n;
    el.textContent=n;
    numerals.push(el);
    analog.appendChild(el);
  }

  const pad=n=>String(n).padStart(2,'0');

  // Số giờ kiểu 12h (1..12)
  function gio12(h){ const x=((h%12)+12)%12; return x===0?12:x; }

  // Phân buổi theo giờ 24h — MỘT nguồn ranh giới cho cả VN & EN (luôn đồng bộ)
  function buoiIdx(h){
    if(h>=4  && h<=10) return 0;   // sáng  / morning
    if(h>=11 && h<=12) return 1;   // trưa  / noon
    if(h>=13 && h<=17) return 2;   // chiều / afternoon
    if(h>=18 && h<=21) return 3;   // tối   / evening
    return 4;                      // đêm   / night (22,23,0–3)
  }
  const BUOI_VN = ['sáng','trưa','chiều','tối','đêm'];
  const BUOI_EN = ['in the morning','at noon','in the afternoon','in the evening','at night'];
  const buoi     = h => BUOI_VN[buoiIdx(h)];   // buổi tiếng Việt
  const periodEn = h => BUOI_EN[buoiIdx(h)];   // buổi tiếng Anh (cùng ranh giới)
  // Bọc span màu cho văn nói: 'h'=giờ, 'm'=phút/kém, 'b'=buổi
  const spk = (cls,x)=>`<span class="sp-${cls}">${x}</span>`;

  // Văn nói TIẾNG VIỆT — "giờ hơn": luôn đọc xuôi theo giờ HIỆN TẠI (mọi phút).
  //   0 -> "X giờ đúng"  ·  còn lại -> "X giờ m phút"
  //   (:30 -> "X giờ 30 phút", KHÔNG dùng "rưỡi" — rưỡi để cho cửa sổ kém, tránh trùng)
  function noiGioHon(h,m){
    const b=spk('b',buoi(h)), hr=spk('h',gio12(h)+' giờ');
    if(m===0) return hr+' '+spk('m','đúng')+' '+b;
    return hr+' '+spk('m',m+' phút')+' '+b;
  }
  // Văn nói TIẾNG VIỆT — "giờ kém": CHỈ có ở nửa sau giờ (rưỡi ở :30, kém ở 31–59).
  //   <30 -> null (ẩn — nửa đầu giờ không có cách đọc kém)
  //   30  -> "X giờ rưỡi"  ·  31–59 -> "(X+1) giờ kém (60-m) phút"
  //   (vd 16:30 -> "4 giờ rưỡi chiều"; 16:45 -> "5 giờ kém 15 phút chiều")
  function noiGioKem(h,m){
    if(m<30) return null;
    const b=spk('b',buoi(h));
    if(m===30) return spk('h',gio12(h)+' giờ')+' '+spk('m','rưỡi')+' '+b;
    return spk('h',gio12(h+1)+' giờ')+' '+spk('m','kém '+(60-m)+' phút')+' '+b;
  }

  // Số đếm tiếng Anh bằng CHỮ (0..59): giờ 1-12 và phút 0-59.
  const ONES=['zero','one','two','three','four','five','six','seven','eight','nine','ten',
              'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen',
              'eighteen','nineteen'];
  const TENS=['','','twenty','thirty','forty','fifty'];
  function numEn(n){
    if(n<20) return ONES[n];
    const o=n%10; return o ? TENS[(n/10)|0]+'-'+ONES[o] : TENS[(n/10)|0];
  }
  // Văn nói TIẾNG ANH — "giờ hơn": đọc giờ rồi phút (số viết bằng CHỮ).
  // Viết hoa chữ cái đầu câu lo bằng CSS (.spoken::first-letter).
  //   12:00 -> "twelve noon"; 0:00 -> "twelve midnight"
  //   :00 -> "four o'clock"   :01-:09 -> "four oh five"   >=:10 -> "four forty-five"
  function noiGioEnHon(h,m){
    if(m===0 && h===12) return spk('h','twelve')+' '+spk('b','noon');
    if(m===0 && h===0)  return spk('h','twelve')+' '+spk('b','midnight');
    const hr=spk('h',numEn(gio12(h))), b=spk('b',periodEn(h));
    if(m===0) return hr+' '+spk('m',"o'clock")+' '+b;     // four o'clock
    if(m<10)  return hr+' '+spk('m','oh '+numEn(m))+' '+b; // four oh five
    return hr+' '+spk('m',numEn(m))+' '+b;                 // four forty-five
  }
  // Văn nói TIẾNG ANH — "giờ kém": CHỈ có ở nửa sau giờ ("half past" :30, "... to ..." 31–59).
  //   <30 -> null (ẩn)  ·  30 -> "half past X"  ·  31–59 -> "(60-m) to (X+1)"
  //   (vd 16:30 -> "half past four..."; 16:45 -> "fifteen to five...")
  function noiGioEnKem(h,m){
    if(m<30) return null;
    if(m===30) return spk('m','half past')+' '+spk('h',numEn(gio12(h)))+' '+spk('b',periodEn(h));
    return spk('m',numEn(60-m)+' to')+' '+spk('h',numEn(gio12(h+1)))+' '+spk('b',periodEn(h));
  }

  /* ===== Bố cục nhãn — tự co theo màn hình =====
     px tính từ tâm. Nhãn nằm NGOÀI cả cụm vòng (phút + 2 vòng ngày); bán kính nhãn
     tính trong layout() theo mép ngoài cụm vòng + nửa bề rộng nhãn (lúc nhãn ở 3/9 giờ).
     Hai tâm nhãn cách nhau >= chiều cao nhãn => không đè khi hai kim trùng. */
  const BADGE_H    = 24;   // chiều cao một nhãn (chỉ còn số, không chữ -> thấp hơn)
  const BADGE_HALF = 16;   // nửa bề rộng nhãn (chỉ còn 2 chữ số, min-width 30px -> ~16)
  const SAFE       = 10;   // dư để hai nhãn chắc chắn không chạm
  const EDGE       = 12;   // lề tối thiểu tới cạnh màn hình

  let FACE;
  let ARC_R_M = 0, ARC_R_D1 = 0, ARC_R_D2 = 0;

  // Chiều cao vùng nhìn thấy THẬT (đã trừ thanh công cụ Safari): visualViewport chính
  // xác nhất; 100dvh/clientHeight trên vài bản Safari trả vùng LỚN -> căn giữa bị lệch.
  const viewportH = () => (window.visualViewport && window.visualViewport.height)
        || document.documentElement.clientHeight || window.innerHeight;

  // MediaQuery dùng chung cho layout()/relayout() (3 bố cục theo BỀ RỘNG màn hình):
  //   >=1200px desktop | 768–1199 ngang (cuộn được) | <768 dọc
  const MQ = {
    desktop:   window.matchMedia('(min-width:768px)'),     // ≥768: đồng hồ trái, lịch phải
    landscape: window.matchMedia('(max-width:0px)'),        // không còn mức trung gian -> luôn false
  };

  function layout(){
    const ARC_GAP = 8;

    // ===== Bán kính VÒNG & NHÃN (đều là độ lệch so với FACE, KHÔNG phụ thuộc FACE) =====
    const R_D1_OFF = 18;                       // vòng nửa ngày 1
    const R_D2_OFF = 23;                       // vòng nửa ngày 2 (NGOÀI cùng)
    const STREAK_HALF = 2;                     // nửa bề rộng vệt mờ rộng nhất (width 4)
    const RING_OUT = R_D2_OFF + STREAK_HALF;   // mép NGOÀI của cả cụm vòng

    // Nhãn quay quanh mặt: khi ở 3/9 giờ, điểm GẦN TÂM NHẤT của nhãn = tâm_nhãn - BADGE_HALF.
    // Phải tính cả 2 vòng ngày mới: điểm đó cách mép cụm vòng (RING_OUT) ít nhất CLEAR
    //   => tâm nhãn phút = RING_OUT + CLEAR + BADGE_HALF (xa hơn công thức cũ dựa vòng phút).
    const CLEAR = 3;
    const badgeM_off = RING_OUT + CLEAR + BADGE_HALF;   // khoảng cách tâm -> nhãn PHÚT
    const badgeH_off = badgeM_off + BADGE_H + SAFE;     // khoảng cách tâm -> nhãn GIỜ (xa hơn, không đè)

    // Lề quanh mặt = mép NGOÀI nhãn giờ lúc nằm ngang (tâm + nửa bề rộng) + 1 ARC_GAP dư.
    const maxReach = badgeH_off + BADGE_HALF + ARC_GAP;

    const vh = viewportH();

    // 3 bố cục theo CHIỀU RỘNG (khớp media query CSS): desktop | ngang (cuộn) | dọc
    const desktop      = MQ.desktop.matches;
    const mobLandscape = MQ.landscape.matches;

    // Mobile NGANG cho CUỘN -> KHÔNG ghim chiều cao (để body cao theo nội dung).
    // Chế độ khác: ghim chiều cao = vùng nhìn thấy để căn giữa khỏi lọt dưới thanh công cụ Safari.
    document.body.style.height = mobLandscape ? '' : (vh + 'px');
    // Đo CẢ cột digital (gồm dòng văn nói đã dành chỗ) -> luôn còn chỗ hiển thị.
    const digitalCol = document.querySelector('.digital-col');
    const digitalH = digitalCol?.offsetHeight || 140;
    const digitalW = digitalCol?.offsetWidth  || 200;
    // Lịch là khối riêng: desktop nằm bên PHẢI (chừa bề rộng), mobile nằm DƯỚI (chừa chiều cao)
    const calendar = document.querySelector('.calendar');
    const calW = calendar?.offsetWidth  || 0;
    const calH = calendar?.offsetHeight || 0;
    const bodyPad = 16;                       // padding .5rem hai đầu

    // ===== Lề dọc analog: đẩy analog LÊN, cách digital/cát xa hơn — KHÔNG co FACE =====
    // marginTop=maxReach (tính theo bề NGANG nhãn) dư hơn tầm với THẲNG ĐỨNG (topNeed) ~12px
    // -> dời phần dư xuống dưới: analog nhích LÊN. GAP_EXTRA lấy thêm từ ĐỆM ĐÁY (bù trong
    // faceByH) -> khe hở tới digital rõ hơn mà FACE giữ nguyên.
    const topNeed   = badgeH_off + BADGE_H/2;
    const RAISE     = mobLandscape ? 0 : Math.max(0, maxReach - topNeed);   // dời analog lên (~12px)
    const GAP_EXTRA = mobLandscape ? 0 : (desktop ? 24 : 8);                // khe thêm lấy từ đệm đáy
    const marginTop = maxReach - RAISE;
    const marginBottom = Math.max(8, topNeed) + RAISE + GAP_EXTRA;
    const GAP = 24;  // khe giữa các khối (khớp gap của body & .clock)
    const availW = Math.min(window.innerWidth, 1600) - EDGE*2;
    let faceByW, faceByH;
    if(desktop){
      // [analog/digital] | LỊCH. Chừa thêm ~40px chiều cao (clock căn giữa -> ~28px lề
      // trên & dưới) để DÒNG VĂN NÓI ở đáy cột digital không sát mép dưới màn hình.
      faceByH = (vh - bodyPad - marginTop - marginBottom - digitalH - 40 + GAP_EXTRA) / 2;
      faceByW = (availW - 2*maxReach - calW - GAP) / 2;
    } else if(mobLandscape){
      // [analog | digital] ở trên, LỊCH ở dưới -> cao chứa analog + lịch; rộng trừ digital + 1 khe.
      faceByH = (vh - bodyPad - marginTop - marginBottom - calH - GAP) / 2;
      faceByW = (availW - 2*maxReach - digitalW - GAP) / 2;
    } else {
      // Mobile DỌC: chiều cao phải chứa analog + digital + LỊCH (xếp dọc).
      const halfW = (Math.min(window.innerWidth, 900) / 2) - EDGE;
      faceByW = halfW - maxReach;
      faceByH = (vh - bodyPad - marginTop - marginBottom - digitalH - calH - 16 + GAP_EXTRA) / 2;
    }

    FACE = Math.min(faceByW, faceByH);
    // Sàn tối thiểu 70 NHƯNG không bao giờ vượt quá giới hạn BỀ RỘNG (faceByW) ->
    // bề ngang khối analog luôn vừa viewport, không gây scroll ngang. (Màn quá thấp
    // thì chấp nhận co theo chiều cao thay vì tràn ngang.)
    FACE = Math.max(FACE, Math.min(70, faceByW));

    const D = FACE*2;
    analog.style.width  = D+'px';
    analog.style.height = D+'px';
    // Lề: trên = marginTop (đã nhích analog lên); dưới = marginBottom (khe hở tới digital);
    //     hai bên = maxReach (đủ chỗ nhãn lúc 3/9 giờ).
    analog.style.margin = `${marginTop}px ${maxReach}px ${marginBottom}px`;

    // Vòng đồng tâm. Hai vòng "ngày" gom SÁT nhau thành một nhóm và đặt CÁCH XA
    // vòng phút để tách bạch hai nhóm. (Vệt mờ rộng vẫn không đè nhau.)
    ARC_R_M  = FACE + ARC_GAP;        // vòng phút (60') — nhóm trong, sát mặt
    ARC_R_D1 = FACE + R_D1_OFF;       // vòng nửa ngày 1 (sáng 0-12h) — xa hẳn vòng phút
    ARC_R_D2 = FACE + R_D2_OFF;       // vòng nửa ngày 2 (chiều/tối 12-24h) — sát vòng 1

    // Tâm nhãn: nằm NGOÀI cả cụm vòng (đã tính ở trên), không đè vòng ngày khi quay tới 3/9 giờ
    const badgeM_r = FACE + badgeM_off;   // nhãn phút
    const badgeH_r = FACE + badgeH_off;   // nhãn giờ

    // Nét nối: nhãn PHÚT nối từ VÒNG PHÚT (ARC_R_M); nhãn GIỜ nối từ VÒNG NGÀY ngoài (ARC_R_D2).
    //   Dùng chiều cao thật của nhãn đo được để nét nối kết thúc đúng tại mép nhãn.
    const realHalfM = elBadgeM.offsetHeight/2 || BADGE_H/2;
    const realHalfH = elBadgeH.offsetHeight/2 || BADGE_H/2;
    const lenM = (badgeM_r - realHalfM) - ARC_R_M;
    const lenH = (badgeH_r - realHalfH) - ARC_R_D2;

    place(elConnM, elBadgeM, ARC_R_M, lenM, badgeM_r);
    place(elConnH, elBadgeH, ARC_R_D2, lenH, badgeH_r);

    // Nhãn EMOJI cố định: GIỐNG nhãn giờ (cùng bán kính badgeH_r, nét nối từ vòng ngày ngoài
    // ARC_R_D2) nhưng đặt tại 'hour' giờ thập phân. Trên mặt 12h: góc = hour*30 (vd 22h -> 660°≡300°).
    const placeFixed = (orbit, conn, badge, hour) => {
      const deg = hour * 30;
      const ringR = hour < 12 ? ARC_R_D1 : ARC_R_D2;   // SÁNG -> vòng TRONG (AM); CHIỀU/TỐI -> vòng NGOÀI (PM)
      const realHalf = badge.offsetHeight/2 || BADGE_H/2;
      const len = (badgeH_r - realHalf) - ringR;
      place(conn, badge, ringR, len, badgeH_r);                          // nét nối CHẠM đúng vòng AM/PM
      orbit.style.transform = `rotate(${deg}deg)`;                       // hướng nhãn ra đúng giờ
      badge.style.transform = `translate(-50%,-50%) rotate(${-deg}deg)`; // giữ nhãn thẳng đứng
    };
    placeFixed(elOrbitExercise,  elConnExercise,  elBadgeExercise,  8);     // tập thể dục 8h
    placeFixed(elOrbitBreakfast, elConnBreakfast, elBadgeBreakfast, 8.25);  // ăn sáng 8h15
    placeFixed(elOrbitDinner,    elConnDinner,    elBadgeDinner,    19.5);  // ăn tối 19h30
    placeFixed(elOrbitSleep,     elConnSleep,     elBadgeSleep,     22);    // đi ngủ 22h

    layoutFace();
  }

  function polar(r, deg){
    const a=(deg-90)*Math.PI/180;
    return [r*Math.cos(a), r*Math.sin(a)];
  }
  function arcPath(r, startDeg, endDeg){
    const sweep=endDeg-startDeg;
    if(sweep<=0.001) return '';
    const [x1,y1]=polar(r, startDeg);
    const [x2,y2]=polar(r, endDeg);
    const largeArc = sweep>180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
  }
  // Vẽ MỘT vòng 3 lớp: track(cả vòng, MỜ = chưa tới) + arc(đã qua, ĐẶC mảnh) + act(ô hiện tại, ĐẬM).
  //   doneDeg = hết các đơn vị đã qua; slot = bề rộng 1 đơn vị (6° phút / 30° giờ).
  //   slot=0 -> không có ô hiện tại (dùng cho nửa ngày KHÔNG diễn ra).
  function drawRing(g, r, doneDeg, slot){
    setD(g.track, arcPath(r, 0, 359.999));                         // cả vòng: nền mờ (phần chưa tới)
    setD(g.arc,   arcPath(r, 0, doneDeg));                         // đã qua: đặc, mảnh
    setD(g.act,   slot ? arcPath(r, doneDeg, doneDeg+slot) : '');  // ô hiện tại: đậm
  }
  // Vòng phút (60'): đơn vị 6°; đã qua = phút trọn, ô PHÚT hiện tại = nét đậm.
  function updateMinArc(m){
    drawRing(ring.min, ARC_R_M, m*6, 6);
  }
  // Hai vòng nửa ngày (mỗi vòng 12h, đơn vị GIỜ = 30°): SÁNG -> vòng 1 chạy, CHIỀU/TỐI -> vòng 2.
  //   Vòng đang chạy: track mờ + giờ đã qua đặc + ô GIỜ hiện tại đậm.
  //   Vòng kia: nửa ĐÃ xong -> đầy đặc (track bị cung phủ); chưa tới -> chỉ track mờ.
  function drawDayRings(g1, g2, r1, r2, h){
    const H = h % 12, doneDeg = H*30, pm = h >= 12;
    drawRing(pm ? g2 : g1, pm ? r2 : r1, doneDeg, 30);          // nửa đang chạy: ô giờ hiện tại đậm
    drawRing(pm ? g1 : g2, pm ? r1 : r2, pm ? 359.999 : 0, 0); // nửa kia: đầy nếu đã qua / trống(mờ) nếu chưa tới
  }
  function updateDayArcs(h){
    drawDayRings(ring.day1, ring.day2, ARC_R_D1, ARC_R_D2, h);
  }

  function place(conn, badge, connStart, len, badgeR){
    conn.style.top    = (-(connStart+len))+'px';   // điểm xa tâm nhất của nét nối
    conn.style.height = len+'px';
    badge.style.marginTop = (-badgeR)+'px';
  }

  // Đặt lại vạch chia và số theo FACE hiện tại
  function layoutFace(){
    // Hai khoảng riêng:
    //   G_RIM: mép -> đầu vạch
    //   G_NUM: đuôi vạch -> chữ số  (để nhỏ cho số sát vạch)
    const G_RIM = 5;
    const G_NUM = 2;
    const majorLen = 8;
    const minorLen = 4;
    const tickOuter = FACE - G_RIM;
    const tickInner = tickOuter - majorLen;

    tickSpans.forEach((sp,i)=>{
      const major=(i%5===0);
      const len=major?majorLen:minorLen;
      sp.style.top=(-tickOuter)+'px';
      sp.style.height=len+'px';
    });

    // Đặt BÁN KÍNH RIÊNG cho từng số: mép ngoài mỗi số cách đuôi vạch đúng G_NUM
    numerals.forEach(el=>{
      const n=+el.dataset.n;
      const ang=(n*30-90)*Math.PI/180;
      const rg=document.createRange(); rg.selectNodeContents(el);
      const r=rg.getBoundingClientRect();
      const halfReach=Math.abs(Math.cos(ang))*r.width/2 + Math.abs(Math.sin(ang))*r.height/2;
      const radius=(tickInner - G_NUM) - halfReach;
      el.style.left=`calc(50% + ${Math.cos(ang)*radius}px)`;
      el.style.top=`calc(50% + ${Math.sin(ang)*radius}px)`;
    });
    // Kim ngắn hơn vòng số để không đè lên số (dùng ref đã cache)
    const hh=FACE*0.34, mh=FACE*0.55, sh=FACE*0.62;
    elHour.style.height=hh+'px'; elHour.style.marginTop=(-hh)+'px';
    elMin.style.height=mh+'px';  elMin.style.marginTop=(-mh)+'px';
    elSec.style.height=sh+'px';  elSec.style.marginTop=(-sh)+'px';
  }

  function updateBadge(el, txt){
    if(el.textContent!==txt) el.textContent=txt;
  }

  // Trạng thái "nảy" của mỗi nhãn: thời điểm bắt đầu + đỉnh scale. Scale do JS lo (xem tick).
  const BEAT_MS = 450;
  const beat = { H:{start:-1e12, peak:1, badge:elBadgeH},
                 M:{start:-1e12, peak:1, badge:elBadgeM} };

  // Hệ số scale tại thời điểm now cho một nhãn (envelope: lên đỉnh ~22% rồi về 1).
  function beatScale(b, now){
    const t = (now - b.start) / BEAT_MS;
    if(t<=0 || t>=1) return 1;
    const up = 0.22;
    const e = t<up ? t/up : 1-(t-up)/(1-up);   // tam giác 0..1..0
    return 1 + (b.peak-1) * (e*(2-e));          // ease-out nhẹ
  }

  // Bắn một nhịp lên nhãn (key 'H'/'M'): NỀN nhấp bằng CSS; SCALE do JS gộp vào transform.
  // cls = 'beat' (thường) hoặc 'beat-final' (nhịp cuối, nảy mạnh hơn).
  function pulse(key, cls){
    const b = beat[key];
    b.badge.classList.remove('beat','beat-final');
    void b.badge.offsetWidth;          // restart CSS animation nền
    b.badge.classList.add(cls);
    b.start = performance.now();
    b.peak  = cls==='beat-final' ? 1.3 : 1.12;
  }

  // Lật đồng hồ cát (one-shot): gỡ class rồi thêm lại để animation chạy lại từ đầu
  function flipHourglass(el){
    el.classList.remove('flip');
    void el.offsetWidth;
    el.classList.add('flip');
    el.addEventListener('animationend', ()=>el.classList.remove('flip'), {once:true});
  }

  let lastSec=-1;
  let lastSecHg=-1;
  // Đồng hồ cát: p = tiến trình 0..1. Cát trên vơi (lùi xuống), cát dưới đầy (dâng lên).
  //   Hai buồng cát là TAM GIÁC (đỉnh ở cổ) nên THỂ TÍCH (~ diện tích) tỉ lệ với
  //   chiều cao BÌNH PHƯƠNG. Muốn cát chảy đều theo thời gian (thể tích tuyến tính
  //   theo p) thì chiều cao phải đi theo CĂN BẬC HAI, không tuyến tính.
  //   Cát trên còn lại = (1-p) thể tích  -> chiều cao còn lại ~ sqrt(1-p)
  //   Cát dưới phần TRỐNG phía trên = (1-p) thể tích -> chiều cao trống ~ sqrt(1-p)
  function updateHourglass(g, p){
    // Đang lật: giữ cát ở trạng thái CẠN cho khớp lúc xoay, chưa refill vội
    if(g.root.classList.contains('flip')) p=1;
    const TOP_Y=4,  TOP_NECK=15;     // tam giác trên: đáy y=4, đỉnh ở cổ y=15
    const BOT_Y=28, BOT_NECK=17;     // tam giác dưới: đáy y=28, đỉnh ở cổ y=17
    const rem=Math.sqrt(Math.max(0, 1-p));   // tỉ lệ CHIỀU CAO ứng với (1-p) thể tích
    const topStart=TOP_NECK - (TOP_NECK-TOP_Y)*rem;
    g.top.setAttribute('y', topStart);
    g.top.setAttribute('height', Math.max(0, TOP_NECK - topStart));
    const botStart=BOT_NECK + (BOT_Y-BOT_NECK)*rem;
    g.bot.setAttribute('y', botStart);
    g.bot.setAttribute('height', Math.max(0, BOT_Y - botStart));
    // Nét dọc cát rơi: chiều dài CỐ ĐỊNH (khai báo sẵn trong rect), luôn hiện -> không xử lý ở JS.
  }

  /* ===== LỊCH THÁNG =====
     Lưới 7 cột (T2..CN, bắt đầu từ Thứ Hai).
       - Hôm nay      : nền xanh ngọc, chữ trắng đậm (.today)
       - Ngày đã qua  : xanh ngọc đậm (.past)
       - Ngày sắp tới : màu chữ thường */
  const DOW = ['T2','T3','T4','T5','T6','T7','CN'];
  // Hàng "thứ" tiếng Anh: cùng thứ tự (bắt đầu Thứ Hai) để thẳng cột với hàng VN
  const DOW_EN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTH_EN = ['January','February','March','April','May','June','July','August',
                    'September','October','November','December'];
  let lastDay = -1;

  function buildCalendar(){
    const now = new Date();
    const y = now.getFullYear(), mo = now.getMonth(), today = now.getDate();
    $('calHead').textContent   = `Tháng ${mo+1}, ${y}`;   // tháng/năm VN — TRÊN ngày
    $('calHeadEn').textContent = `${MONTH_EN[mo]} ${y}`;   // tháng/năm EN — DƯỚI ngày (cùng style)
    const grid = $('calGrid');
    grid.innerHTML = '';
    const addCell=(cls,txt)=>{
      const c=document.createElement('div');
      c.className=cls;
      if(txt!=null) c.textContent=txt;
      grid.appendChild(c);
    };
    // Hàng "thứ" tiếng Việt — TRÊN ngày
    DOW.forEach(d=>addCell('cal-cell cal-dow', d));
    // Ô trống đầu tháng: lùi theo thứ (Thứ Hai = 0)
    const startOffset = (new Date(y,mo,1).getDay()+6)%7;
    for(let i=0;i<startOffset;i++) addCell('cal-cell');
    // Các ngày trong tháng
    const daysInMonth = new Date(y,mo+1,0).getDate();
    for(let d=1;d<=daysInMonth;d++){
      addCell('cal-cell cal-day'+(d<today?' past':d===today?' today':''), d);
    }
    // Ô trống cuối: lấp đầy hàng cuối để hàng "thứ" EN bên dưới thẳng cột
    const trailing = (7 - ((startOffset+daysInMonth)%7))%7;
    for(let i=0;i<trailing;i++) addCell('cal-cell');
    // Hàng "thứ" tiếng Anh — DƯỚI ngày (cùng thứ tự & style với hàng VN)
    DOW_EN.forEach(d=>addCell('cal-cell cal-dow', d));
    lastDay = today;
  }

  function tick(){
    const now=new Date();
    const tNow=performance.now();
    const h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();

    // Nhãn mốc: bật/tắt trạng thái 'reached'/'upcoming' theo giờ hiện tại
    updateLabelStates(h + m/60 + s/3600);

    // Kim: góc tăng liên tục, cập nhật MỖI FRAME cho mượt
    const totalSec = now.getTime()/1000 - now.getTimezoneOffset()*60;
    const secDeg  = totalSec*6;
    const minDeg  = (totalSec/60)*6;
    const hourDeg = (totalSec/3600)*30;
    elSec.style.transform=`rotate(${secDeg}deg)`;
    elMin.style.transform=`rotate(${minDeg}deg)`;
    elHour.style.transform=`rotate(${hourDeg}deg)`;
    elOrbitH.style.transform=`rotate(${hourDeg}deg)`;
    elOrbitM.style.transform=`rotate(${minDeg}deg)`;
    elBadgeH.style.transform=`translate(-50%,-50%) rotate(${-hourDeg}deg) scale(${beatScale(beat.H, tNow)})`;
    elBadgeM.style.transform=`translate(-50%,-50%) rotate(${-minDeg}deg) scale(${beatScale(beat.M, tNow)})`;

    // Cung: cập nhật theo giờ/phút hiện tại
    updateDayArcs(h);
    updateMinArc(m);

    // Đồng hồ cát: giờ theo phút trôi trong giờ; phút theo giây trôi trong phút (mượt theo ms)
    const ms = now.getMilliseconds();
    // Lật NGAY khi sang chu kỳ mới (kiểm tra trước khi vẽ cát để cát không "đầy" lố 1 frame)
    if(s!==lastSecHg){
      if(lastSecHg===59 && s===0){
        flipHourglass(hg.M.root);
        if(m===0) flipHourglass(hg.H.root);
      }
      lastSecHg=s;
    }
    updateHourglass(hg.H, (m + (s + ms/1000)/60) / 60);
    updateHourglass(hg.M, (s + ms/1000) / 60);

    // Text + nhãn: chỉ cập nhật khi giây đổi (đỡ tải, không gây giật)
    if(s!==lastSec){
      const justSwitched = (lastSec===59 && s===0); // vừa qua mốc 59->00
      lastSec=s;

      // Sang ngày mới -> dựng lại lịch (di chuyển ô "hôm nay") rồi căn lại bố cục
      if(now.getDate()!==lastDay){ buildCalendar(); layout(); }
      updateBadge(elTextH, String(gio12(h)));
      updateBadge(elTextM, String(m));
      elH.textContent=pad(h);
      elM.textContent=pad(m);
      elS.textContent=pad(s);

      // Văn nói: 0–5s VN hơn · 5–10s EN hơn · 10–15s VN kém · 15–20s EN kém.
      // Nửa đầu giờ (<:30) không có cách đọc kém -> trả null. Khi hết câu: bỏ 'show' cho
      // mờ dần, giây sau XOÁ HẲN nội dung -> không để text ẩn nằm lại trong DOM.
      const phrase = s<5  ? noiGioHon(h,m)
                   : s<10 ? noiGioEnHon(h,m)
                   : s<15 ? noiGioKem(h,m)
                   : s<20 ? noiGioEnKem(h,m)
                   : null;
      if(phrase){
        if(elSpoken.innerHTML!==phrase) elSpoken.innerHTML=phrase;
        elSpoken.classList.add('show');
      }else if(elSpoken.classList.contains('show')){
        elSpoken.classList.remove('show');   // vừa hết câu -> mờ dần
      }else if(elSpoken.innerHTML){
        elSpoken.innerHTML='';               // đã mờ xong -> xoá hẳn, không render nữa
      }

      // Tô đậm số giờ hiện tại trên mặt (1-12; giờ 0/12 -> số 12)
      const hourNum = (h%12)===0 ? 12 : (h%12);
      numerals.forEach(el=>{
        el.classList.toggle('active', +el.dataset.n===hourNum);
      });

      // Đếm ngược 6 nhịp: giây 55,56,57,58,59 (nhịp thường) rồi 00 (nhịp CUỐI).
      // Nhãn phút đập mỗi phút; nhãn giờ chỉ khi đang chạm mốc sang giờ mới.
      if(s>=55){
        pulse('M','beat');             // phút: 55-59
        if(m===59) pulse('H','beat');  // giờ : 55-59 của phút 59
      }else if(justSwitched){
        pulse('M','beat-final');       // phút: nhịp cuối tại 00
        if(m===0) pulse('H','beat-final'); // giờ: nhịp cuối tại 00
      }
    }

    requestAnimationFrame(tick);
  }
  // Chỉ căn lại khi kích thước THẬT SỰ đổi -> tránh giật.
  //   Mobile NGANG (cuộn được): chỉ relayout khi đổi BỀ RỘNG; bỏ qua đổi CHIỀU CAO do
  //   thanh công cụ Safari ẩn/hiện lúc cuộn (nếu không analog sẽ bị resize giật theo).
  //   Chế độ khác: relayout khi đổi rộng HOẶC cao đáng kể (>2px, bỏ nhiễu).
  let lastW=-1, lastVh=-1;
  function relayout(){
    const w=window.innerWidth;
    const vh=viewportH();
    const mobLandscape=MQ.landscape.matches;
    if(mobLandscape ? w===lastW : (w===lastW && Math.abs(vh-lastVh)<2)) return;
    lastW=w; lastVh=vh; layout();
  }

  buildCalendar();   // dựng lịch TRƯỚC khi layout để đo đúng bề rộng/chiều cao lịch
  layout();
  window.addEventListener('resize', relayout);
  window.addEventListener('orientationchange', relayout);
  // Thanh công cụ Safari ẩn/hiện đổi vùng nhìn thấy -> căn lại cho khỏi tràn/cắt
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', relayout);
    window.visualViewport.addEventListener('scroll', relayout);
  }
  // Căn lại sau khi font thật (Space Grotesk) tải xong — tránh căn theo font dự phòng
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(layout);
  }
  // và căn lại vài lần đầu cho chắc (font có thể về trễ)
  setTimeout(layout, 300);
  setTimeout(layout, 1200);
  tick();
</script>
