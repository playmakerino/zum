<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TC Embroidery — upload &amp; create ads</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #121212;
      --surface: #181818;
      --surface-hover: #282828;
      --surface-elevated: #242424;
      --accent: #1DB954;
      --accent-hover: #1ed760;
      --accent-soft: rgba(29,185,84,0.12);
      --accent-glow: rgba(29,185,84,0.30);
      --text: #FFFFFF;
      --text-sub: #B3B3B3;
      --text-muted: #6A6A6A;
      --success: #1DB954;
      --success-soft: rgba(29,185,84,0.10);
      --error: #F15E6C;
      --error-soft: rgba(241,94,108,0.10);
      --divider: rgba(255,255,255,0.06);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 380px;
      background: linear-gradient(180deg, rgba(29,185,84,0.10) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    .header { margin-bottom: 24px; text-align: center; }
    .header h1 {
      font-size: 40px; font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 10px;
    }
    .header p { font-size: 14px; color: var(--text-sub); line-height: 1.5; font-weight: 400; }

    .card { background: var(--surface); border-radius: 13px; padding: 24px 22px; }

    .section-label {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-label .count {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: none;
    }

    /* Product row block */
    .prow {
      background: var(--surface-elevated);
      border-radius: 10px;
      padding: 16px 16px 14px;
      margin-bottom: 14px;
      border: 1px solid var(--divider);
    }
    .prow-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .prow-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      letter-spacing: 0.01em;
    }
    .remove-row {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-muted);
      cursor: pointer;
      padding: 5px 12px;
      font-family: var(--font);
      font-size: 11px; font-weight: 700;
      border-radius: 999px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      letter-spacing: 0.01em;
    }
    .remove-row:hover {
      color: var(--error); border-color: var(--error); background: var(--error-soft);
    }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }

    /* Print ID + Product URL: stacked on mobile, side-by-side on desktop */
    .field-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .field-row .field { margin-bottom: 0; }
    @media (min-width: 560px) {
      .field-row { grid-template-columns: minmax(120px, 0.5fr) 1fr; }
    }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-sub); margin-bottom: 7px; letter-spacing: 0.01em;
    }
    .field input[type="text"] {
      width: 100%; height: 44px;
      background: var(--surface);
      border: none; border-radius: 6px;
      padding: 0 14px;
      font-family: var(--font);
      font-size: 13px; font-weight: 400;
      color: var(--text);
      outline: none;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .field input[type="text"]::placeholder { color: var(--text-muted); }
    .field input[type="text"]:hover { background: #2a2a2a; }
    .field input[type="text"]:focus { background: #2a2a2a; box-shadow: 0 0 0 2px var(--text); }

    /* Add-image tile (lives inside the thumbnail grid) */
    .add-tile {
      aspect-ratio: 1;
      border: 2px dashed var(--text-muted);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.12s;
    }
    .add-tile:hover {
      border-color: var(--text);
      color: var(--text);
      background: rgba(255,255,255,0.06);
      transform: scale(1.04);
    }
    .add-tile svg { width: 22px; height: 22px; }
    /* Whole grid acts as a drop target */
    .thumbs.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: 5px;
      border-radius: 8px;
    }
    .thumbs.drag-over .add-tile {
      border-color: var(--accent); color: var(--accent); background: var(--accent-soft);
    }

    /* Thumbnails */
    .thumbs {
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
      gap: 10px;
    }
    .thumb {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--bg);
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-remove {
      position: absolute;
      top: 4px; right: 4px;
      width: 20px; height: 20px;
      border: none;
      background: rgba(0,0,0,0.7);
      color: #fff;
      cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .thumb:hover .thumb-remove { opacity: 1; }
    .thumb-remove:hover { transform: scale(1.12); background: rgba(0,0,0,0.9); }
    .thumb-name {
      position: absolute; left: 0; right: 0; bottom: 0;
      font-size: 9px; color: #fff;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
      padding: 10px 4px 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-img-count {
      font-size: 11px; color: var(--text-muted);
      margin-top: 8px; text-align: right;
    }

    /* Single print/flatlay reference slot */
    .print-slot { display: flex; }
    .print-slot .thumb, .print-slot .add-tile { width: 84px; height: 84px; aspect-ratio: 1; }
    .opt { font-weight: 400; color: var(--text-muted); text-transform: none; letter-spacing: 0.01em; }

    /* Add product button */
    .add-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.20);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px; font-weight: 700;
      padding: 9px 16px;
      border-radius: 18px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      letter-spacing: 0.01em;
      margin-top: 4px;
    }
    .add-btn:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.06);
      transform: scale(1.04);
    }

    .submit-wrap { margin-top: 24px; }
    .submit-btn {
      width: 100%; max-width: 300px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 0 auto;
      background: var(--accent); border: none;
      color: #000;
      font-family: var(--font);
      font-size: 14px; font-weight: 700;
      padding: 14px 24px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.12s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.04);
      box-shadow: 0 6px 24px var(--accent-glow);
    }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .status {
      margin-top: 14px; padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px; font-weight: 500;
      display: none; line-height: 1.5;
    }
    .status.success { display: block; background: var(--success-soft); color: var(--success); }
    .status.error { display: block; background: var(--error-soft); color: var(--error); }
    .status.loading { display: block; background: var(--accent-soft); color: var(--accent); }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TC Embroidery</h1>
      <p>Each product row: Print ID + Product URL + Print/Flatlay (optional, for AI copy) + ad images. 1 image = 1 ad.</p>
    </div>

    <div class="card">

      <div class="section-label">
        <span>Products</span>
        <span class="count" id="rowCount"></span>
      </div>

      <div id="rowsContainer"></div>

      <button class="add-btn" onclick="addRow()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add product
      </button>

      <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn" onclick="submitForm()">
          Upload &amp; Create Ads
        </button>
        <div class="status" id="statusMsg"></div>
      </div>

    </div>
  </div>

  <script>
    // ============================================================
    //   CONFIG
    // ============================================================
    const N8N_WEBHOOK_URL = "https://playmakerino.app.n8n.cloud/webhook/tc-embroidery-form";
    // ============================================================

    let rowSeq = 0;
    const filesByRow = {};   // rowId -> [File, ...]  (ad images)
    const printByRow = {};   // rowId -> File (single print/flatlay reference) | undefined

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    function cleanProductUrl(url) {
      return url.replace(/\/collections\/[^/]+(?=\/products\/)/, '');
    }

    function updateCount() {
      const rows = document.querySelectorAll('#rowsContainer .prow').length;
      const imgs = Object.values(filesByRow).reduce((s, a) => s + a.length, 0);
      document.getElementById('rowCount').textContent =
        `${rows} ${rows === 1 ? 'product' : 'products'} · ${imgs} ${imgs === 1 ? 'ad' : 'ads'}`;
      renumberRows();
    }

    function renumberRows() {
      const rows = document.querySelectorAll('#rowsContainer .prow');
      rows.forEach((el, i) => {
        el.querySelector('.prow-title').textContent = 'Product ' + (i + 1);
        // Hide Remove when there's only one product (can't drop the last row)
        el.querySelector('.remove-row').style.display = rows.length === 1 ? 'none' : '';
      });
    }

    function addRow(product_url = '', print_id = '') {
      const id = 'r' + (rowSeq++);
      filesByRow[id] = [];

      const div = document.createElement('div');
      div.className = 'prow';
      div.dataset.rowId = id;
      div.innerHTML = `
        <div class="prow-head">
          <span class="prow-title">Product</span>
          <button class="remove-row" onclick="removeRow(this)">Remove</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Print ID</label>
            <input type="text" class="row-print" placeholder="xua1234" value="${escapeHtml(print_id)}" />
          </div>
          <div class="field">
            <label>Product URL</label>
            <input type="text" class="row-url" placeholder="https://zumbamboo.com/products/..." value="${escapeHtml(product_url)}" />
          </div>
        </div>
        <div class="field">
          <label>Print Image or Flatlay Image</label>
          <input type="file" class="row-print-file" accept="image/*" style="display:none" />
          <div class="print-slot" data-row-id="${id}"></div>
        </div>
        <div class="field">
          <label>Ad images</label>
          <input type="file" class="row-file" multiple accept="image/*" style="display:none" />
          <div class="thumbs" data-row-id="${id}"></div>
          <div class="row-img-count"></div>
        </div>
      `;
      document.getElementById('rowsContainer').appendChild(div);

      const thumbs = div.querySelector('.thumbs');
      const fi = div.querySelector('.row-file');
      thumbs.addEventListener('click', e => { if (e.target.closest('.add-tile')) fi.click(); });
      thumbs.addEventListener('dragover', e => { e.preventDefault(); thumbs.classList.add('drag-over'); });
      thumbs.addEventListener('dragleave', e => { if (!thumbs.contains(e.relatedTarget)) thumbs.classList.remove('drag-over'); });
      thumbs.addEventListener('drop', e => {
        e.preventDefault(); thumbs.classList.remove('drag-over');
        addImages(id, e.dataTransfer.files);
      });
      fi.addEventListener('change', () => { addImages(id, fi.files); fi.value = ''; });

      const pfi = div.querySelector('.row-print-file');
      pfi.addEventListener('change', () => { setPrintImage(id, pfi.files); pfi.value = ''; });

      renderThumbs(id);
      renderPrint(id);
      updateCount();
    }

    function removeRow(btn) {
      const el = btn.closest('.prow');
      delete filesByRow[el.dataset.rowId];
      delete printByRow[el.dataset.rowId];
      el.remove();
      if (document.querySelectorAll('#rowsContainer .prow').length === 0) addRow();
      updateCount();
    }

    function addImages(rowId, fileListObj) {
      const arr = filesByRow[rowId];
      for (const f of fileListObj) {
        if (!f.type.startsWith('image/')) continue;
        if (arr.some(s => s.name === f.name && s.size === f.size)) continue;
        arr.push(f);
      }
      renderThumbs(rowId);
      updateCount();
    }

    function removeImage(rowId, idx) {
      filesByRow[rowId].splice(idx, 1);
      renderThumbs(rowId);
      updateCount();
    }

    function renderThumbs(rowId) {
      const row = document.querySelector(`.prow[data-row-id="${rowId}"]`);
      if (!row) return;
      const thumbs = row.querySelector('.thumbs');
      const countEl = row.querySelector('.row-img-count');
      const arr = filesByRow[rowId];

      thumbs.innerHTML = '';
      arr.forEach((f, idx) => {
        const t = document.createElement('div');
        t.className = 'thumb';
        t.title = f.name;

        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);

        const name = document.createElement('div');
        name.className = 'thumb-name';
        name.textContent = f.name;

        const rm = document.createElement('button');
        rm.className = 'thumb-remove';
        rm.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
        rm.onclick = () => removeImage(rowId, idx);

        t.appendChild(img);
        t.appendChild(name);
        t.appendChild(rm);
        thumbs.appendChild(t);
      });

      const add = document.createElement('div');
      add.className = 'add-tile';
      add.title = 'Add images';
      add.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
      thumbs.appendChild(add);

      countEl.textContent = arr.length ? `${arr.length} ${arr.length === 1 ? 'image' : 'images'}` : '';
    }

    function setPrintImage(rowId, fileListObj) {
      const f = fileListObj && fileListObj[0];
      if (!f || !f.type.startsWith('image/')) return;
      printByRow[rowId] = f;
      renderPrint(rowId);
      updateCount();
    }

    function removePrintImage(rowId) {
      delete printByRow[rowId];
      renderPrint(rowId);
      updateCount();
    }

    function renderPrint(rowId) {
      const row = document.querySelector(`.prow[data-row-id="${rowId}"]`);
      if (!row) return;
      const slot = row.querySelector('.print-slot');
      const f = printByRow[rowId];
      slot.innerHTML = '';

      if (f) {
        const t = document.createElement('div');
        t.className = 'thumb';
        t.title = f.name;

        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);

        const name = document.createElement('div');
        name.className = 'thumb-name';
        name.textContent = f.name;

        const rm = document.createElement('button');
        rm.className = 'thumb-remove';
        rm.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
        rm.onclick = () => removePrintImage(rowId);

        t.appendChild(img);
        t.appendChild(name);
        t.appendChild(rm);
        slot.appendChild(t);
      } else {
        const add = document.createElement('div');
        add.className = 'add-tile';
        add.title = 'Add print / flatlay image';
        add.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
        add.onclick = () => row.querySelector('.row-print-file').click();
        slot.appendChild(add);
      }
    }

    async function submitForm() {
      const submitBtn = document.getElementById('submitBtn');
      const rowEls = [...document.querySelectorAll('#rowsContainer .prow')];

      const meta = [];
      const fd = new FormData();
      let total = 0;

      rowEls.forEach((el, i) => {
        const id = el.dataset.rowId;
        const url = cleanProductUrl(el.querySelector('.row-url').value.trim());
        const print_id = el.querySelector('.row-print').value.trim();
        const files = filesByRow[id] || [];
        if (!url || !print_id || files.length === 0) return;
        meta.push({ index: i, product_url: url, print_id });
        files.forEach((f, j) => fd.append('img_' + i + '_' + j, f, f.name));
        const printFile = printByRow[id];
        if (printFile) fd.append('print_' + i, printFile, printFile.name);
        total += files.length;
      });

      if (total === 0) {
        return showStatus('error', '&#9888; Each product needs a Product URL, a Print ID, and at least one image.');
      }
      fd.append('meta', JSON.stringify(meta));

      showStatus('loading', '<span class="spinner"></span> Uploading ' + total + ' images...');
      submitBtn.disabled = true;

      const totalMB = rowEls.reduce((s, el) =>
        s + (filesByRow[el.dataset.rowId] || []).reduce((a, f) => a + f.size, 0), 0) / (1024 * 1024);

      try {
        const res = await fetch(N8N_WEBHOOK_URL, { method: 'POST', body: fd });

        if (res.ok) {
          showStatus('success', '&#10003; Sent ' + total + ' images across ' + meta.length + ' products — creating ' + total + ' ads.');
        } else {
          const errText = await res.text();
          showStatus('error', '&#10007; Error (' + res.status + '): ' + errText.slice(0, 150));
        }
      } catch (err) {
        showStatus('error', '&#10007; Upload failed (' + totalMB.toFixed(1) + ' MB, ' + total + ' files): ' + err.message + '. Likely too large — try fewer images.');
      } finally {
        submitBtn.disabled = false;
      }
    }

    function showStatus(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = 'status ' + type;
      el.innerHTML = html;
    }

    // Default: 1 row present
    addRow();
  </script>
</body>
</html>
