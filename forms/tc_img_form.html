<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TC Image Upload</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #121212;
      --surface: #181818;
      --surface-hover: #282828;
      --surface-elevated: #242424;
      --accent: #1DB954;
      --accent-hover: #1ed760;
      --accent-soft: rgba(29,185,84,0.12);
      --accent-glow: rgba(29,185,84,0.30);
      --text: #FFFFFF;
      --text-sub: #B3B3B3;
      --text-muted: #6A6A6A;
      --success: #1DB954;
      --success-soft: rgba(29,185,84,0.10);
      --error: #F15E6C;
      --error-soft: rgba(241,94,108,0.10);
      --divider: rgba(255,255,255,0.06);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 40px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 380px;
      background: linear-gradient(180deg, rgba(29,185,84,0.10) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
    }

    .header {
      margin-bottom: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .header h1 span { color: var(--text); }

    .header p {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.5;
      font-weight: 400;
    }

    .header .fmt {
      display: inline-block;
      margin-top: 6px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-elevated);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .card {
      background: var(--surface);
      border-radius: 13px;
      padding: 20px 20px;
    }

    .drop-zone {
      border: 2px dashed var(--text-muted);
      border-radius: 10px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .drop-zone svg {
      width: 28px;
      height: 28px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .drop-zone.drag-over svg { color: var(--accent); }

    .drop-zone p {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.5;
    }

    .drop-zone .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .file-list {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 12px;
      max-height: 380px;
      overflow-y: auto;
    }

    .file-item {
      position: relative;
      background: transparent;
      border-radius: 8px;
      padding: 12px;
      cursor: default;
      transition: background 0.3s;
    }

    .file-item:hover {
      background: #282828;
    }

    .file-item.invalid .file-thumb {
      opacity: 0.5;
    }

    .file-thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      background: var(--bg);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .file-info {
      padding-top: 8px;
    }

    .file-name {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .file-meta {
      font-size: 11px;
      color: #a7a7a7;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta .tag {
      color: #a7a7a7;
      font-weight: 400;
    }

    .file-meta .tag.err {
      color: var(--error);
    }

    .file-remove {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(0,0,0,0.7);
      color: #fff;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s, transform 0.15s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .file-item:hover .file-remove { opacity: 1; }

    .file-remove:hover {
      transform: scale(1.1);
      background: rgba(0,0,0,0.9);
    }

    .counter {
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
    }

    .submit-wrap { margin-top: 16px; }

    .submit-btn {
      width: 100%;
      max-width: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.12s, box-shadow 0.2s;
    }

    .submit-btn svg { width: 14px; height: 14px; }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.04);
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .submit-btn:active { transform: scale(0.99); }

    .submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      display: none;
      line-height: 1.5;
    }

    .status.success { display: block; background: var(--success-soft); color: var(--success); }
    .status.error   { display: block; background: var(--error-soft); color: var(--error); }
    .status.loading { display: block; background: var(--accent-soft); color: var(--accent); }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .file-list::-webkit-scrollbar {
      width: 8px;
    }

    .file-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-list::-webkit-scrollbar-thumb {
      background: hsla(0,0%,100%,0.3);
      border-radius: 4px;
    }

    .file-list::-webkit-scrollbar-thumb:hover {
      background: hsla(0,0%,100%,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Test Mockup Image</h1>
      <p>Upload images to auto create Facebook ads.</p>
    </div>

    <div class="card">

      <div class="drop-zone" id="dropZone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 16V4m0 0l-4 4m4-4l4 4"/>
          <path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/>
        </svg>
        <p>Drop images here or click to browse</p>
        <p class="hint">[PrintID-TypeID] mockupID.jpg</p>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" />
      </div>

      <div class="file-list" id="fileList"></div>
      <div class="counter" id="counter" style="display:none"></div>

      <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn" onclick="submitForm()" disabled>
          Upload & Create Ads
        </button>
        <div class="status" id="statusMsg"></div>
      </div>

    </div>
  </div>

  <script>
    const N8N_WEBHOOK_URL = "https://playmakerino.app.n8n.cloud/webhook/tc-img-form";

    let selectedFiles = [];

    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList  = document.getElementById('fileList');
    const counter   = document.getElementById('counter');
    const submitBtn = document.getElementById('submitBtn');

    function parseFilename(name) {
      const m = name.match(/^\[([^\]\-]+)-([^\]]+)\](?:\s+(\S+?))?(?:\.\w+)?$/i);
      if (!m) return null;
      const mid = m[3] && !/^\(\d+\)$/.test(m[3]) ? m[3] : null;
      return { print_id: m[1], type_id: m[2], mockup_id: mid };
    }

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(fileListObj) {
      for (const f of fileListObj) {
        if (!f.type.startsWith('image/')) continue;
        if (selectedFiles.some(s => s.file.name === f.name && s.file.size === f.size)) continue;
        const parsed = parseFilename(f.name);
        selectedFiles.push({ file: f, parsed });
      }
      renderFiles();
    }

    function removeFile(idx) {
      selectedFiles.splice(idx, 1);
      renderFiles();
    }

    function renderFiles() {
      fileList.innerHTML = '';
      const validCount = selectedFiles.filter(s => s.parsed).length;

      selectedFiles.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'file-item' + (item.parsed ? '' : ' invalid');
        div.title = item.file.name;

        const thumb = document.createElement('img');
        thumb.className = 'file-thumb';
        thumb.src = URL.createObjectURL(item.file);

        const info = document.createElement('div');
        info.className = 'file-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'file-name';
        nameEl.textContent = item.file.name;

        const meta = document.createElement('div');
        meta.className = 'file-meta';
        if (item.parsed) {
          const parts = [item.parsed.print_id, item.parsed.type_id];
          if (item.parsed.mockup_id) parts.push(item.parsed.mockup_id);
          meta.innerHTML = `<span class="tag">${parts.join(' · ')}</span>`;
        } else {
          meta.innerHTML = '<span class="tag err">Invalid file name</span>';
        }

        info.appendChild(nameEl);
        info.appendChild(meta);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'file-remove';
        removeBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>';
        removeBtn.onclick = () => removeFile(idx);

        div.appendChild(thumb);
        div.appendChild(info);
        div.appendChild(removeBtn);
        fileList.appendChild(div);
      });

      if (selectedFiles.length > 0) {
        counter.style.display = 'block';
        counter.textContent = `${validCount} / ${selectedFiles.length} valid files`;
      } else {
        counter.style.display = 'none';
      }

      submitBtn.disabled = validCount === 0;
    }

    async function submitForm() {
      const valid = selectedFiles.filter(s => s.parsed);
      if (valid.length === 0) return;

      showStatus('loading', '<span class="spinner"></span> Uploading ' + valid.length + ' images...');
      submitBtn.disabled = true;

      try {
        const formData = new FormData();
        for (const item of valid) {
          formData.append('images', item.file, item.file.name);
        }

        const res = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          const body = await res.text();
          showStatus('success', '&#10003; Upload successful! ' + valid.length + ' images sent.');
          selectedFiles = [];
          renderFiles();
        } else {
          const errText = await res.text();
          showStatus('error', '&#10007; Error (' + res.status + '): ' + errText.slice(0, 150));
        }
      } catch (err) {
        showStatus('error', '&#10007; Connection failed: ' + err.message);
      } finally {
        submitBtn.disabled = selectedFiles.filter(s => s.parsed).length === 0;
      }
    }

    function showStatus(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = 'status ' + type;
      el.innerHTML = html;
    }
  </script>
</body>
</html>
