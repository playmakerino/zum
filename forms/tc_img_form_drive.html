<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TC Image (Drive)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #121212;
      --surface: #181818;
      --surface-hover: #282828;
      --surface-elevated: #242424;
      --accent: #1DB954;
      --accent-hover: #1ed760;
      --accent-soft: rgba(29,185,84,0.12);
      --accent-glow: rgba(29,185,84,0.30);
      --text: #FFFFFF;
      --text-sub: #B3B3B3;
      --text-muted: #6A6A6A;
      --success: #1DB954;
      --success-soft: rgba(29,185,84,0.10);
      --error: #F15E6C;
      --error-soft: rgba(241,94,108,0.10);
      --divider: rgba(255,255,255,0.06);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 16px 80px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 380px;
      background: linear-gradient(180deg, rgba(29,185,84,0.10) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }

    .header {
      margin-bottom: 32px;
      text-align: center;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 12px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.5;
      font-weight: 400;
    }

    .header .fmt {
      display: inline-block;
      margin-top: 6px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-elevated);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .card {
      background: var(--surface);
      border-radius: 13px;
      padding: 32px 28px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .field input[type="text"] {
      width: 100%;
      height: 48px;
      background: var(--surface-elevated);
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .field input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .field input[type="text"]:hover {
      background: #2a2a2a;
    }

    .field input[type="text"]:focus {
      background: #2a2a2a;
      box-shadow: 0 0 0 2px var(--text);
    }

    .submit-wrap {
      margin-top: 32px;
    }

    .submit-btn {
      width: 100%;
      max-width: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.12s, box-shadow 0.2s;
    }

    .submit-btn svg {
      width: 14px;
      height: 14px;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.04);
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .submit-btn:active {
      transform: scale(0.99);
    }

    .submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      display: none;
      line-height: 1.5;
    }

    .status.success {
      display: block;
      background: var(--success-soft);
      color: var(--success);
    }

    .status.error {
      display: block;
      background: var(--error-soft);
      color: var(--error);
    }

    .status.loading {
      display: block;
      background: var(--accent-soft);
      color: var(--accent);
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #payloadPreview {
      font-family: 'SF Mono', 'Fira Code', monospace !important;
      font-size: 11px !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TC Image</h1>
      <p>Dán link folder Google Drive chứa ảnh để tự động tạo ads.</p>
      <span class="fmt">[PrintID-TypeID_MockupID].jpg</span>
    </div>

    <div class="card">

      <div class="field">
        <label>Google Drive folder url</label>
        <input type="text" id="folder_input" placeholder="https://drive.google.com/drive/folders/..." />
      </div>

      <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn" onclick="submitForm()">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          Tạo Ads
        </button>
        <div class="status" id="statusMsg"></div>
      </div>

      <div id="payloadPreview" style="display:none; margin-top:14px; padding:14px; background:#0d0d0d; border-radius:8px; font-size:11px; color:#6A6A6A; line-height:1.7; white-space:pre-wrap; word-break:break-all;"></div>

    </div>
  </div>

  <script>
    const N8N_WEBHOOK_URL = "https://playmakerino.app.n8n.cloud/webhook/tc-img-form-drive";

    function extractFolderId(input) {
      if (!input) return '';
      const trimmed = input.trim();
      const patterns = [
        /\/folders\/([a-zA-Z0-9_-]+)/,
        /[?&]id=([a-zA-Z0-9_-]+)/,
        /\/drive\/u\/\d+\/folders\/([a-zA-Z0-9_-]+)/
      ];
      for (const p of patterns) {
        const m = trimmed.match(p);
        if (m) return m[1];
      }
      if (/^[a-zA-Z0-9_-]{15,}$/.test(trimmed)) return trimmed;
      return '';
    }

    async function submitForm() {
      const rawInput = document.getElementById('folder_input').value;
      const folder_id = extractFolderId(rawInput);

      if (!folder_id) {
        return showStatus('error', '&#9888; Vui lòng nhập link folder Google Drive hoặc folder ID hợp lệ.');
      }

      const payload = { folder_id };

      showStatus('loading', '<span class="spinner"></span> Đang gửi đến n8n...');
      document.getElementById('submitBtn').disabled = true;

      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          showStatus('success', '&#10003; Đã gửi thành công! Workflow đang chạy.');
          const preview = document.getElementById('payloadPreview');
          preview.style.display = 'block';
          preview.textContent = JSON.stringify(payload, null, 2);
        } else {
          const errText = await res.text();
          showStatus('error', '&#10007; Lỗi từ n8n (' + res.status + '): ' + errText.slice(0, 120));
        }
      } catch (err) {
        showStatus('error', '&#10007; Không kết nối được n8n: ' + err.message);
      } finally {
        document.getElementById('submitBtn').disabled = false;
      }
    }

    function showStatus(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = 'status ' + type;
      el.innerHTML = html;
    }
  </script>
</body>
</html>
