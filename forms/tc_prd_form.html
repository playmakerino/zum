<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test new print</title>

  <script type="text/javascript"
    src="https://www.dropbox.com/static/api/2/dropins.js"
    id="dropboxjs"
    data-app-key="omrmsrosehpy3vi">
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #121212;
      --surface: #181818;
      --surface-hover: #282828;
      --surface-elevated: #242424;
      --accent: #1DB954;
      --accent-hover: #1ed760;
      --accent-soft: rgba(29,185,84,0.12);
      --accent-glow: rgba(29,185,84,0.30);
      --text: #FFFFFF;
      --text-sub: #B3B3B3;
      --text-muted: #6A6A6A;
      --success: #1DB954;
      --success-soft: rgba(29,185,84,0.10);
      --error: #F15E6C;
      --error-soft: rgba(241,94,108,0.10);
      --divider: rgba(255,255,255,0.06);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 16px 80px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 380px;
      background: linear-gradient(180deg, rgba(29,185,84,0.10) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
    }

    .section { min-width: 0; }

    @media (min-width: 768px) {
      .container { max-width: 960px; }
      .section-fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 32px;
      }
    }

    /* Header */
    .header {
      margin-bottom: 32px;
      text-align: center;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 12px;
    }

    .header h1 span { color: var(--accent); }

    .header p {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.5;
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--surface);
      border-radius: 13px;
      padding: 32px 28px;
    }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin: 28px 0 14px;
      padding-top: 22px;
      border-top: 1px solid var(--divider);
    }

    .section:first-child .section-label {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    /* Field */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .field input[type="text"] {
      width: 100%;
      height: 48px;
      background: var(--surface-elevated);
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .field input[type="text"]::placeholder { color: var(--text-muted); }
    .field input[type="text"]:hover { background: #2a2a2a; }

    .field input[type="text"]:focus {
      background: #2a2a2a;
      box-shadow: 0 0 0 2px var(--text);
    }

    /* Chooser field */
    .chooser-field {
      background: var(--surface-elevated);
      border-radius: 6px;
      padding: 8px 10px 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
      height: 48px;
    }

    .chooser-field:hover { background: #2a2a2a; }
    .chooser-field.has-value { background: rgba(29,185,84,0.10); }

    .chooser-field .chooser-path {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chooser-field.has-value .chooser-path {
      color: var(--success);
      font-weight: 500;
    }

    /* Chooser button */
    .chooser-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.20);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 18px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .chooser-btn:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.06);
      transform: scale(1.04);
    }

    .chooser-btn svg { width: 12px; height: 12px; }

    /* Clear button */
    .clear-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: none;
      border-radius: 50%;
      transition: color 0.15s, background 0.15s;
    }

    .chooser-field.has-value .clear-btn { display: flex; }

    .clear-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.1);
    }

    /* Submit button */
    .submit-wrap { margin-top: 32px; }

    .submit-btn {
      width: 100%;
      max-width: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 auto;
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.12s, box-shadow 0.2s;
    }

    .submit-btn svg { width: 14px; height: 14px; }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.04);
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .submit-btn:active { transform: scale(0.99); }

    .submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      display: none;
      line-height: 1.5;
    }

    .status.success { display: block; background: var(--success-soft); color: var(--success); }
    .status.error   { display: block; background: var(--error-soft);   color: var(--error); }
    .status.loading { display: block; background: var(--accent-soft);  color: var(--accent); }

    /* File tag chips */
    .file-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-hover);
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 8px 5px 12px;
      border-radius: 18px;
      max-width: 220px;
      transition: background 0.15s;
    }

    .file-tag:hover { background: #333; }

    .file-tag span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-tag button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      display: flex;
      flex-shrink: 0;
      transition: color 0.15s;
      border-radius: 50%;
    }

    .file-tag button:hover { color: var(--error); }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Add product dropdown */
    .add-product-wrap {
      position: relative;
      display: inline-block;
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid var(--divider);
    }

    .add-product-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-sub);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.12s;
      letter-spacing: 0.01em;
    }

    .add-product-btn:hover {
      border-color: var(--text);
      color: var(--text);
      background: rgba(255,255,255,0.06);
      transform: scale(1.04);
    }

    .add-product-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 6px;
      background: var(--surface-elevated);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      min-width: 200px;
      padding: 4px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: opacity 0.15s, visibility 0.15s, transform 0.15s;
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .add-product-btn:hover + .add-product-dropdown,
    .add-product-dropdown:hover {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .add-product-dropdown button {
      display: flex;
      align-items: center;
      width: 100%;
      background: none;
      border: none;
      color: var(--text-sub);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .add-product-dropdown button:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    /* Section header (dynamic sections) */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--divider);
      margin-top: 28px;
      padding-top: 22px;
    }

    .section-header .section-label {
      flex: 1;
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .remove-section-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-sub);
      cursor: pointer;
      padding: 5px 14px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.12s;
      letter-spacing: 0.01em;
    }

    .remove-section-btn:hover {
      color: var(--error);
      border-color: var(--error);
      background: var(--error-soft);
      transform: scale(1.04);
    }

    #payloadPreview {
      font-family: 'SF Mono', 'Fira Code', monospace !important;
      font-size: 11px !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Test new print</h1>
      <p>Fill in print information and select images from Dropbox to automatically create ads.</p>
    </div>

    <div class="card">
      <div class="form-grid">

        <!-- Print -->
        <div class="section">
          <div class="section-label">Print</div>
          <div class="section-fields">
            <div class="field">
              <label>Print ID</label>
              <input type="text" id="ad_set_name" placeholder="Abc1234" />
            </div>
            <div class="field">
              <label>Print image</label>
              <div class="chooser-field" id="field_print_image">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
                <span class="chooser-path" id="path_print_image"></span>
                <button class="chooser-btn" onclick="choosePrintImage()">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                  </svg>
                  Select image
                </button>
                <button class="clear-btn" onclick="clearField('print_image')" title="Clear">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </div>
              <input type="hidden" id="dropbox_print_image" />
            </div>
          </div>
        </div>

        <!-- Long zippy -->
        <div class="section">
          <div class="section-label">Long zippy</div>
          <div class="section-fields">
            <div class="field">
              <label>Long zippy product url</label>
              <input type="text" id="url_czr" placeholder="https://zumbamboo.com/products/convertible-zippered-romper" />
            </div>
            <div class="field">
              <label>Long zippy ad images</label>
              <div class="chooser-field" id="field_czr">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
                <span class="chooser-path" id="path_czr"></span>
                <button class="chooser-btn" onclick="chooseCZR()">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                  </svg>
                  Select images
                </button>
                <button class="clear-btn" onclick="clearField('czr')" title="Clear">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </div>
              <div id="tags_czr" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
              <input type="hidden" id="dropbox_czr" />
            </div>
          </div>
        </div>

        <!-- Long pajama -->
        <div class="section">
          <div class="section-label">Long pajama</div>
          <div class="section-fields">
            <div class="field">
              <label>Long pajama product url</label>
              <input type="text" id="url_tpj" placeholder="https://zumbamboo.com/products/two-piece-pajama-set" />
            </div>
            <div class="field">
              <label>Long pajama ad images</label>
              <div class="chooser-field" id="field_tpj">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
                <span class="chooser-path" id="path_tpj"></span>
                <button class="chooser-btn" onclick="chooseTPJ()">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                  </svg>
                  Select images
                </button>
                <button class="clear-btn" onclick="clearField('tpj')" title="Clear">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </div>
              <div id="tags_tpj" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
              <input type="hidden" id="dropbox_tpj" />
            </div>
          </div>
        </div>

        <div id="dynamicSections"></div>

        <div class="add-product-wrap" id="addProductWrap">
          <button class="add-product-btn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add product
          </button>
          <div class="add-product-dropdown">
            <button type="button" id="addBtn_szr" onclick="addProduct('szr')">Short zippy</button>
            <button type="button" id="addBtn_spj" onclick="addProduct('spj')">Short pajama</button>
          </div>
        </div>

      </div>

      <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn" onclick="submitForm()">Create ad set</button>
        <div class="status" id="statusMsg"></div>
      </div>

      <div id="payloadPreview" style="display:none; margin-top:14px; padding:14px; background:#0d0d0d; border-radius:8px; font-size:11px; color:#6A6A6A; line-height:1.7; white-space:pre-wrap; word-break:break-all;"></div>
    </div>
  </div>

  <script>
    const N8N_WEBHOOK_URL = 'https://playmakerino.app.n8n.cloud/webhook/ffd4d42f-73a4-4be9-a0dd-b4c960b6dcb6';

    const DYNAMIC_TYPES = {
      szr: { label: 'Short zippy', code: 'SZR', placeholder: 'https://zumbamboo.com/products/shorty-zippered-romper' },
      spj: { label: 'Short pajama', code: 'SPJ', placeholder: 'https://zumbamboo.com/products/two-piece-short-sleeve-pajama-set' }
    };

    const state = {
      dropbox_print_image: null,
      dropbox_czr: [],
      dropbox_tpj: [],
      dynamicProducts: []
    };

    function choosePrintImage() {
      Dropbox.choose({
        success(files) {
          const file = files[0];
          state.dropbox_print_image = file.link;
          document.getElementById('dropbox_print_image').value = file.link;
          setFieldValue('print_image', file.name);
        },
        cancel() {},
        linkType: 'direct',
        multiselect: false,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    function chooseCZR() {
      Dropbox.choose({
        success(files) {
          files.forEach(f => {
            if (!state.dropbox_czr.find(x => x.link === f.link))
              state.dropbox_czr.push({ name: f.name, link: f.link });
          });
          syncMultiField('czr');
        },
        cancel() {},
        linkType: 'direct',
        multiselect: true,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    function chooseTPJ() {
      Dropbox.choose({
        success(files) {
          files.forEach(f => {
            if (!state.dropbox_tpj.find(x => x.link === f.link))
              state.dropbox_tpj.push({ name: f.name, link: f.link });
          });
          syncMultiField('tpj');
        },
        cancel() {},
        linkType: 'direct',
        multiselect: true,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    function chooseDynamic(key) {
      Dropbox.choose({
        success(files) {
          files.forEach(f => {
            if (!state[`dropbox_${key}`].find(x => x.link === f.link))
              state[`dropbox_${key}`].push({ name: f.name, link: f.link });
          });
          syncMultiField(key);
        },
        cancel() {},
        linkType: 'direct',
        multiselect: true,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    function syncMultiField(key) {
      const arr = state[`dropbox_${key}`];
      const field = document.getElementById(`field_${key}`);
      const pathEl = document.getElementById(`path_${key}`);
      const tagsEl = document.getElementById(`tags_${key}`);
      const hiddenEl = document.getElementById(`dropbox_${key}`);

      hiddenEl.value = JSON.stringify(arr.map(f => f.link));

      if (arr.length > 0) {
        field.classList.add('has-value');
        pathEl.textContent = `${arr.length} images selected`;
      } else {
        field.classList.remove('has-value');
        pathEl.textContent = '';
      }

      tagsEl.innerHTML = arr.map((f, i) => `
        <div class="file-tag">
          <span title="${f.name}">${f.name}</span>
          <button onclick="removeFile('${key}', ${i})" title="Clear">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    function removeFile(key, index) {
      state[`dropbox_${key}`].splice(index, 1);
      syncMultiField(key);
    }

    function setFieldValue(key, displayText) {
      document.getElementById(`field_${key}`).classList.add('has-value');
      document.getElementById(`path_${key}`).textContent = displayText;
    }

    function clearField(key) {
      if (key === 'czr' || key === 'tpj' || state.dynamicProducts.includes(key)) {
        state[`dropbox_${key}`] = [];
        syncMultiField(key);
      } else {
        state[`dropbox_${key}`] = null;
        document.getElementById(`dropbox_${key}`).value = '';
        document.getElementById(`field_${key}`).classList.remove('has-value');
        document.getElementById(`path_${key}`).textContent = '';
      }
    }

    function cleanProductUrl(url) {
      return url.replace(/\/collections\/[^/]+(?=\/products\/)/, '');
    }

    function addProduct(key) {
      if (state.dynamicProducts.includes(key)) return;
      state.dynamicProducts.push(key);
      state[`dropbox_${key}`] = [];

      const t = DYNAMIC_TYPES[key];
      const section = document.createElement('div');
      section.className = 'section';
      section.id = `section_${key}`;
      section.innerHTML = `
        <div class="section-header">
          <div class="section-label">${t.label}</div>
          <button class="remove-section-btn" type="button" onclick="removeProduct('${key}')">Remove</button>
        </div>
        <div class="section-fields">
          <div class="field">
            <label>${t.label} product url</label>
            <input type="text" id="url_${key}" placeholder="${t.placeholder}" />
          </div>
          <div class="field">
            <label>${t.label} ad images</label>
            <div class="chooser-field" id="field_${key}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
              </svg>
              <span class="chooser-path" id="path_${key}"></span>
              <button class="chooser-btn" type="button" onclick="chooseDynamic('${key}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
                Select images
              </button>
              <button class="clear-btn" type="button" onclick="clearField('${key}')" title="Clear">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            <div id="tags_${key}" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
            <input type="hidden" id="dropbox_${key}" />
          </div>
        </div>
      `;

      document.getElementById('dynamicSections').appendChild(section);
      document.getElementById(`addBtn_${key}`).style.display = 'none';
      updateAddProductVisibility();
    }

    function removeProduct(key) {
      const section = document.getElementById(`section_${key}`);
      if (section) section.remove();
      delete state[`dropbox_${key}`];
      state.dynamicProducts = state.dynamicProducts.filter(k => k !== key);
      document.getElementById(`addBtn_${key}`).style.display = '';
      updateAddProductVisibility();
    }

    function updateAddProductVisibility() {
      const allAdded = state.dynamicProducts.length >= Object.keys(DYNAMIC_TYPES).length;
      document.getElementById('addProductWrap').style.display = allAdded ? 'none' : '';
    }

    async function submitForm() {
      const ad_set_name = document.getElementById('ad_set_name').value.trim();
      const dropbox_print_image = document.getElementById('dropbox_print_image').value;

      if (!ad_set_name) return showStatus('error', 'Please enter Print ID.');
      if (!dropbox_print_image) return showStatus('error', 'Please select Print image from Dropbox.');

      const products = [];
      const url_czr = cleanProductUrl(document.getElementById('url_czr').value.trim());
      if (url_czr && state.dropbox_czr.length > 0)
        products.push({ code: 'CZR', url: url_czr, images: state.dropbox_czr.map(f => f.link) });

      const url_tpj = cleanProductUrl(document.getElementById('url_tpj').value.trim());
      if (url_tpj && state.dropbox_tpj.length > 0)
        products.push({ code: 'TPJ', url: url_tpj, images: state.dropbox_tpj.map(f => f.link) });

      state.dynamicProducts.forEach(key => {
        const url = cleanProductUrl(document.getElementById(`url_${key}`).value.trim());
        if (url && state[`dropbox_${key}`].length > 0)
          products.push({ code: DYNAMIC_TYPES[key].code, url, images: state[`dropbox_${key}`].map(f => f.link) });
      });

      const payload = { ad_set_name, dropbox_print_image, products };

      showStatus('loading', '<span class="spinner"></span> Sending to n8n...');
      document.getElementById('submitBtn').disabled = true;

      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          showStatus('success', 'Sent! n8n workflow is running.');
          const preview = document.getElementById('payloadPreview');
          preview.style.display = 'block';
          preview.textContent = JSON.stringify(payload, null, 2);
        } else {
          const errText = await res.text();
          showStatus('error', `Error from n8n (${res.status}): ${errText.slice(0, 120)}`);
        }
      } catch (err) {
        showStatus('error', `Cannot connect to n8n: ${err.message}`);
      } finally {
        document.getElementById('submitBtn').disabled = false;
      }
    }

    function showStatus(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = `status ${type}`;
      el.innerHTML = html;
    }
  </script>
</body>
</html>
