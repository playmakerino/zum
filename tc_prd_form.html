<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Ad Set — TC Prd</title>

  <!-- Dropbox Chooser SDK -->
  <script type="text/javascript"
    src="https://www.dropbox.com/static/api/2/dropins.js"
    id="dropboxjs"
    data-app-key="omrmsrosehpy3vi">
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --border-active: #5b5bd6;
      --accent: #5b5bd6;
      --accent-soft: rgba(91,91,214,0.12);
      --accent-glow: rgba(91,91,214,0.35);
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --success: #22c55e;
      --success-soft: rgba(34,197,94,0.12);
      --error: #ef4444;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,91,214,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,91,214,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(91,91,214,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      margin-bottom: 40px;
    }

    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(91,91,214,0.3);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .header .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .header h1 {
      font-family: var(--display);
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* Section divider */
    .section-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 28px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-label:first-child {
      margin-top: 0;
    }

    /* Field group */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .field input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .field input[type="text"]:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* Dropbox chooser field */
    .chooser-field {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      min-height: 46px;
    }

    .chooser-field.has-value {
      border-color: rgba(34,197,94,0.4);
      background: var(--success-soft);
    }

    .chooser-field .chooser-path {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }

    .chooser-field.has-value .chooser-path {
      color: var(--success);
      font-style: normal;
    }

    .chooser-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      border: 1px solid rgba(91,91,214,0.3);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .chooser-btn:hover {
      background: rgba(91,91,214,0.2);
      border-color: var(--accent);
    }

    .chooser-btn svg {
      width: 13px;
      height: 13px;
    }

    /* Clear button */
    .clear-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      display: none;
      transition: color 0.2s;
    }

    .chooser-field.has-value .clear-btn {
      display: flex;
    }

    .clear-btn:hover {
      color: var(--error);
    }

    /* Submit button */
    .submit-wrap {
      margin-top: 32px;
    }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      padding: 15px 24px;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .submit-btn:hover {
      background: #6a6adf;
      box-shadow: 0 8px 24px var(--accent-glow);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Status message */
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: var(--success-soft);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--success);
    }

    .status.error {
      display: block;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--error);
    }

    .status.loading {
      display: block;
      background: var(--accent-soft);
      border: 1px solid rgba(91,91,214,0.3);
      color: var(--accent);
    }

    /* File tag chips */
    .file-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--accent-soft);
      border: 1px solid rgba(91,91,214,0.25);
      color: var(--text);
      font-size: 11px;
      padding: 3px 8px 3px 10px;
      border-radius: 20px;
      max-width: 200px;
    }

    .file-tag span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-tag button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      display: flex;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .file-tag button:hover { color: var(--error); }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Webhook config notice */
    .webhook-notice {
      margin-top: 24px;
      padding: 14px 16px;
      background: rgba(255, 180, 0, 0.06);
      border: 1px solid rgba(255, 180, 0, 0.2);
      border-radius: 8px;
      font-size: 12px;
      color: #c9a227;
      line-height: 1.6;
    }

    .webhook-notice code {
      background: rgba(255,180,0,0.12);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">TC Production</div>
      <h1>Tạo <span>Ad Set</span></h1>
      <p>Điền thông tin campaign và chọn file từ Dropbox để tự động tạo ads.</p>
    </div>

    <div class="card">

      <!-- SECTION: Campaign info -->
      <div class="section-label">Thông tin Campaign</div>

      <div class="field">
        <label>Ad Set Name</label>
        <input type="text" id="ad_set_name" placeholder="vd: SS25_Bamboo_Bears_US_W" />
      </div>

      <!-- SECTION: URLs -->
      <div class="section-label">Product URLs</div>

      <div class="field">
        <label>URL Zippy</label>
        <input type="text" id="url_zippy" placeholder="https://thecozybambi.com/products/..." />
      </div>

      <div class="field">
        <label>URL Pajama</label>
        <input type="text" id="url_pajama" placeholder="https://thecozybambi.com/products/..." />
      </div>

      <!-- SECTION: Dropbox files -->
      <div class="section-label">Dropbox Assets</div>

      <!-- Print Image (single file) -->
      <div class="field">
        <label>Dropbox Print Image <span style="color:var(--text-muted);font-style:italic">(1 file ảnh)</span></label>
        <div class="chooser-field" id="field_print_image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5b5bd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span class="chooser-path" id="path_print_image">Chưa chọn file...</span>
          <button class="chooser-btn" onclick="choosePrintImage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Chọn file
          </button>
          <button class="clear-btn" onclick="clearField('print_image')" title="Xóa">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <input type="hidden" id="dropbox_print_image" />
      </div>

      <!-- Zippy images (multi-select) -->
      <div class="field">
        <label>Dropbox Zippy <span style="color:var(--text-muted);font-style:italic">(chọn nhiều ảnh)</span></label>
        <div class="chooser-field" id="field_zippy">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5b5bd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <span class="chooser-path" id="path_zippy">Chưa chọn ảnh...</span>
          <button class="chooser-btn" onclick="chooseZippy()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            Chọn ảnh
          </button>
          <button class="clear-btn" onclick="clearField('zippy')" title="Xóa">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="tags_zippy" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
        <input type="hidden" id="dropbox_zippy" />
      </div>

      <!-- Pajama images (multi-select) -->
      <div class="field">
        <label>Dropbox Pajama <span style="color:var(--text-muted);font-style:italic">(chọn nhiều ảnh)</span></label>
        <div class="chooser-field" id="field_pajama">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5b5bd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <span class="chooser-path" id="path_pajama">Chưa chọn ảnh...</span>
          <button class="chooser-btn" onclick="choosePajama()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            Chọn ảnh
          </button>
          <button class="clear-btn" onclick="clearField('pajama')" title="Xóa">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="tags_pajama" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
        <input type="hidden" id="dropbox_pajama" />
      </div>

      <!-- Submit -->
      <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn" onclick="submitForm()">
          Tạo Ad Set →
        </button>
        <div class="status" id="statusMsg"></div>
      </div>

      <!-- Payload preview -->
      <div id="payloadPreview" style="display:none; margin-top:16px; padding:14px 16px; background:rgba(91,91,214,0.06); border:1px solid rgba(91,91,214,0.2); border-radius:8px; font-size:11px; color:var(--text-muted); line-height:1.7; white-space:pre-wrap; word-break:break-all;"></div>

    </div>
  </div>

  <script>
    // ============================================================
    // ⚙️  CẤU HÌNH
    // ============================================================
    const N8N_WEBHOOK_URL = "https://playmakerino.app.n8n.cloud/webhook-test/ffd4d42f-73a4-4be9-a0dd-b4c960b6dcb6";
    // ============================================================

    // State — zippy/pajama là arrays of {name, link}
    const state = {
      dropbox_print_image: null,
      dropbox_zippy: [],
      dropbox_pajama: []
    };

    // ── Dropbox Chooser: Print Image (1 file ảnh, direct link) ─
    function choosePrintImage() {
      Dropbox.choose({
        success: function(files) {
          const file = files[0];
          state.dropbox_print_image = file.link;
          document.getElementById('dropbox_print_image').value = file.link;
          setFieldValue('print_image', file.name, file.link);
        },
        cancel: function() {},
        linkType: "direct",
        multiselect: false,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    // ── Dropbox Chooser: Zippy — multi-select images ────────────
    function chooseZippy() {
      Dropbox.choose({
        success: function(files) {
          // Append vào state (không ghi đè — cho phép chọn thêm nhiều lần)
          files.forEach(f => {
            if (!state.dropbox_zippy.find(x => x.link === f.link)) {
              state.dropbox_zippy.push({ name: f.name, link: f.link });
            }
          });
          syncMultiField('zippy');
        },
        cancel: function() {},
        linkType: "direct",
        multiselect: true,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    // ── Dropbox Chooser: Pajama — multi-select images ───────────
    function choosePajama() {
      Dropbox.choose({
        success: function(files) {
          files.forEach(f => {
            if (!state.dropbox_pajama.find(x => x.link === f.link)) {
              state.dropbox_pajama.push({ name: f.name, link: f.link });
            }
          });
          syncMultiField('pajama');
        },
        cancel: function() {},
        linkType: "direct",
        multiselect: true,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    // ── Sync multi-file field UI + hidden input ─────────────────
    function syncMultiField(key) {
      const arr = state[`dropbox_${key}`];
      const field = document.getElementById(`field_${key}`);
      const pathEl = document.getElementById(`path_${key}`);
      const tagsEl = document.getElementById(`tags_${key}`);
      const hiddenEl = document.getElementById(`dropbox_${key}`);

      // Update hidden input — JSON array of links
      hiddenEl.value = JSON.stringify(arr.map(f => f.link));

      // Update header text
      if (arr.length > 0) {
        field.classList.add('has-value');
        pathEl.textContent = `${arr.length} ảnh đã chọn`;
      } else {
        field.classList.remove('has-value');
        pathEl.textContent = 'Chưa chọn ảnh...';
      }

      // Render file tags
      tagsEl.innerHTML = arr.map((f, i) => `
        <div class="file-tag">
          <span title="${f.name}">${f.name}</span>
          <button onclick="removeFile('${key}', ${i})" title="Xóa">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    // ── Xóa 1 file khỏi danh sách ──────────────────────────────
    function removeFile(key, index) {
      state[`dropbox_${key}`].splice(index, 1);
      syncMultiField(key);
    }

    // ── UI helpers ─────────────────────────────────────────────
    function setFieldValue(key, displayText, value) {
      const field = document.getElementById(`field_${key}`);
      const path  = document.getElementById(`path_${key}`);
      field.classList.add('has-value');
      path.textContent = displayText;
    }

    function clearField(key) {
      if (key === 'zippy' || key === 'pajama') {
        state[`dropbox_${key}`] = [];
        syncMultiField(key);
      } else {
        state[`dropbox_${key}`] = null;
        document.getElementById(`dropbox_${key}`).value = '';
        document.getElementById(`field_${key}`).classList.remove('has-value');
        document.getElementById(`path_${key}`).textContent = 'Chưa chọn file...';
      }
    }

    // ── Submit ─────────────────────────────────────────────────
    async function submitForm() {
      const ad_set_name = document.getElementById('ad_set_name').value.trim();
      const url_zippy   = document.getElementById('url_zippy').value.trim();
      const url_pajama  = document.getElementById('url_pajama').value.trim();
      const dropbox_print_image = document.getElementById('dropbox_print_image').value;

      // Validation
      if (!ad_set_name) return showStatus('error', '⚠️ Vui lòng nhập Ad Set Name.');
      if (!url_zippy)   return showStatus('error', '⚠️ Vui lòng nhập URL Zippy.');
      if (!url_pajama)  return showStatus('error', '⚠️ Vui lòng nhập URL Pajama.');
      if (!dropbox_print_image) return showStatus('error', '⚠️ Vui lòng chọn Print Image từ Dropbox.');
      if (state.dropbox_zippy.length === 0) return showStatus('error', '⚠️ Vui lòng chọn ít nhất 1 ảnh Zippy.');
      if (state.dropbox_pajama.length === 0) return showStatus('error', '⚠️ Vui lòng chọn ít nhất 1 ảnh Pajama.');

      const payload = {
        ad_set_name,
        url_zippy,
        url_pajama,
        dropbox_print_image,
        dropbox_zippy: state.dropbox_zippy.map(f => f.link),
        dropbox_pajama: state.dropbox_pajama.map(f => f.link)
      };

      showStatus('loading', '<span class="spinner"></span> Đang gửi đến n8n...');
      document.getElementById('submitBtn').disabled = true;

      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          showStatus('success', '✅ Đã gửi thành công! Workflow n8n đang chạy...');
          // Show payload sent
          const preview = document.getElementById('payloadPreview');
          preview.style.display = 'block';
          preview.textContent = '📦 Payload đã gửi:\n' + JSON.stringify(payload, null, 2);
        } else {
          const errText = await res.text();
          showStatus('error', `❌ Lỗi từ n8n (${res.status}): ${errText.slice(0,120)}`);
        }
      } catch (err) {
        showStatus('error', `❌ Không kết nối được n8n: ${err.message}`);
      } finally {
        document.getElementById('submitBtn').disabled = false;
      }
    }

    function showStatus(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = `status ${type}`;
      el.innerHTML = html;
    }
  </script>
</body>
</html>
