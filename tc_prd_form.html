<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Ad Set — TC Prd</title>

  <!-- Dropbox Chooser SDK -->
  <script type="text/javascript"
    src="https://www.dropbox.com/static/api/2/dropins.js"
    id="dropboxjs"
    data-app-key="omrmsrosehpy3vi">
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #121212;
      --surface: #181818;
      --surface-hover: #282828;
      --surface-elevated: #242424;
      --accent: #1DB954;
      --accent-hover: #1ed760;
      --accent-soft: rgba(29,185,84,0.12);
      --accent-glow: rgba(29,185,84,0.30);
      --text: #FFFFFF;
      --text-sub: #B3B3B3;
      --text-muted: #6A6A6A;
      --success: #1DB954;
      --success-soft: rgba(29,185,84,0.10);
      --error: #F15E6C;
      --error-soft: rgba(241,94,108,0.10);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 20px 80px;
      overflow-x: hidden;
    }

    /* Subtle top gradient */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 340px;
      background: linear-gradient(180deg, rgba(29,185,84,0.08) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 580px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      margin-bottom: 36px;
      text-align: center;
    }

    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .header .badge-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2.4s ease infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.75); }
    }

    .header h1 {
      font-size: 40px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.6;
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 36px 32px;
      animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.08s both;
    }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 32px 0 14px;
    }

    .section-label:first-child {
      margin-top: 0;
    }

    /* Field */
    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 7px;
      letter-spacing: 0.01em;
    }

    .field label em {
      font-style: normal;
      font-weight: 400;
      color: var(--text-muted);
      font-size: 11px;
      margin-left: 4px;
    }

    .field input[type="text"] {
      width: 100%;
      background: var(--surface-elevated);
      border: none;
      border-radius: 8px;
      padding: 13px 16px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .field input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .field input[type="text"]:hover {
      background: #2a2a2a;
    }

    .field input[type="text"]:focus {
      background: #2a2a2a;
      box-shadow: 0 0 0 2px var(--accent);
    }

    /* Chooser field */
    .chooser-field {
      background: var(--surface-elevated);
      border-radius: 8px;
      padding: 10px 12px 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
      min-height: 48px;
    }

    .chooser-field:hover {
      background: #2a2a2a;
    }

    .chooser-field.has-value {
      background: rgba(29,185,84,0.08);
      box-shadow: inset 0 0 0 1px rgba(29,185,84,0.25);
    }

    .chooser-field .chooser-path {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chooser-field.has-value .chooser-path {
      color: var(--success);
      font-weight: 500;
    }

    .chooser-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .chooser-btn:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .chooser-btn svg {
      width: 12px;
      height: 12px;
    }

    /* Clear button */
    .clear-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: none;
      border-radius: 50%;
      transition: color 0.15s, background 0.15s;
    }

    .chooser-field.has-value .clear-btn {
      display: flex;
    }

    .clear-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.1);
    }

    /* Submit button */
    .submit-wrap {
      margin-top: 32px;
    }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      padding: 17px 24px;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.12s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
      box-shadow: 0 6px 28px var(--accent-glow);
    }

    .submit-btn:active {
      transform: scale(0.99);
    }

    .submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Status */
    .status {
      margin-top: 14px;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      line-height: 1.5;
    }

    .status.success {
      display: block;
      background: var(--success-soft);
      color: var(--success);
    }

    .status.error {
      display: block;
      background: var(--error-soft);
      color: var(--error);
    }

    .status.loading {
      display: block;
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* File tag chips */
    .file-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-hover);
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 8px 4px 12px;
      border-radius: 20px;
      max-width: 220px;
      transition: background 0.15s;
    }

    .file-tag:hover {
      background: #333;
    }

    .file-tag span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-tag button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      display: flex;
      flex-shrink: 0;
      transition: color 0.15s;
      border-radius: 50%;
    }

    .file-tag button:hover { color: var(--error); }

    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Payload preview */
    #payloadPreview {
      font-family: 'SF Mono', 'Fira Code', monospace !important;
      font-size: 11px !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge"><span class="badge-dot"></span>TC Production</div>
      <h1>Tạo <span>Ad Set</span></h1>
      <p>Điền thông tin campaign và chọn file từ Dropbox để tự động tạo ads.</p>
    </div>

    <div class="card">

      <!-- SECTION: Campaign info -->
      <div class="section-label">Thông tin Campaign</div>

      <div class="field">
        <label>Ad Set Name</label>
        <input type="text" id="ad_set_name" placeholder="vd: SS25_Bamboo_Bears_US_W" />
      </div>

      <!-- SECTION: URLs -->
      <div class="section-label">Product URLs</div>

      <div class="field">
        <label>URL Zippy</label>
        <input type="text" id="url_zippy" placeholder="https://thecozybambi.com/products/..." />
      </div>

      <div class="field">
        <label>URL Pajama</label>
        <input type="text" id="url_pajama" placeholder="https://thecozybambi.com/products/..." />
      </div>

      <!-- SECTION: Dropbox files -->
      <div class="section-label">Dropbox Assets</div>

      <!-- Print Image (single file) -->
      <div class="field">
        <label>Dropbox Print Image <em>(1 file ảnh)</em></label>
        <div class="chooser-field" id="field_print_image">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span class="chooser-path" id="path_print_image">Chưa chọn file...</span>
          <button class="chooser-btn" onclick="choosePrintImage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Chọn file
          </button>
          <button class="clear-btn" onclick="clearField('print_image')" title="Xóa">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <input type="hidden" id="dropbox_print_image" />
      </div>

      <!-- Zippy images (multi-select) -->
      <div class="field">
        <label>Dropbox Zippy <em>(chọn nhiều ảnh)</em></label>
        <div class="chooser-field" id="field_zippy">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <span class="chooser-path" id="path_zippy">Chưa chọn ảnh...</span>
          <button class="chooser-btn" onclick="chooseZippy()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            Chọn ảnh
          </button>
          <button class="clear-btn" onclick="clearField('zippy')" title="Xóa">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="tags_zippy" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
        <input type="hidden" id="dropbox_zippy" />
      </div>

      <!-- Pajama images (multi-select) -->
      <div class="field">
        <label>Dropbox Pajama <em>(chọn nhiều ảnh)</em></label>
        <div class="chooser-field" id="field_pajama">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <span class="chooser-path" id="path_pajama">Chưa chọn ảnh...</span>
          <button class="chooser-btn" onclick="choosePajama()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
            Chọn ảnh
          </button>
          <button class="clear-btn" onclick="clearField('pajama')" title="Xóa">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="tags_pajama" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
        <input type="hidden" id="dropbox_pajama" />
      </div>

      <!-- Submit -->
      <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn" onclick="submitForm()">
          Tạo Ad Set
        </button>
        <div class="status" id="statusMsg"></div>
      </div>

      <!-- Payload preview -->
      <div id="payloadPreview" style="display:none; margin-top:14px; padding:16px; background:#0d0d0d; border-radius:10px; font-size:11px; color:#6A6A6A; line-height:1.8; white-space:pre-wrap; word-break:break-all;"></div>

    </div>
  </div>

  <script>
    // ============================================================
    // ⚙️  CẤU HÌNH
    // ============================================================
    const N8N_WEBHOOK_URL = "https://playmakerino.app.n8n.cloud/webhook-test/ffd4d42f-73a4-4be9-a0dd-b4c960b6dcb6";
    // ============================================================

    // State — zippy/pajama là arrays of {name, link}
    const state = {
      dropbox_print_image: null,
      dropbox_zippy: [],
      dropbox_pajama: []
    };

    // ── Dropbox Chooser: Print Image (1 file ảnh, direct link) ─
    function choosePrintImage() {
      Dropbox.choose({
        success: function(files) {
          const file = files[0];
          state.dropbox_print_image = file.link;
          document.getElementById('dropbox_print_image').value = file.link;
          setFieldValue('print_image', file.name, file.link);
        },
        cancel: function() {},
        linkType: "direct",
        multiselect: false,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    // ── Dropbox Chooser: Zippy — multi-select images ────────────
    function chooseZippy() {
      Dropbox.choose({
        success: function(files) {
          // Append vào state (không ghi đè — cho phép chọn thêm nhiều lần)
          files.forEach(f => {
            if (!state.dropbox_zippy.find(x => x.link === f.link)) {
              state.dropbox_zippy.push({ name: f.name, link: f.link });
            }
          });
          syncMultiField('zippy');
        },
        cancel: function() {},
        linkType: "direct",
        multiselect: true,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    // ── Dropbox Chooser: Pajama — multi-select images ───────────
    function choosePajama() {
      Dropbox.choose({
        success: function(files) {
          files.forEach(f => {
            if (!state.dropbox_pajama.find(x => x.link === f.link)) {
              state.dropbox_pajama.push({ name: f.name, link: f.link });
            }
          });
          syncMultiField('pajama');
        },
        cancel: function() {},
        linkType: "direct",
        multiselect: true,
        extensions: ['.jpg', '.jpeg', '.png', '.webp', '.gif'],
        folderselect: false
      });
    }

    // ── Sync multi-file field UI + hidden input ─────────────────
    function syncMultiField(key) {
      const arr = state[`dropbox_${key}`];
      const field = document.getElementById(`field_${key}`);
      const pathEl = document.getElementById(`path_${key}`);
      const tagsEl = document.getElementById(`tags_${key}`);
      const hiddenEl = document.getElementById(`dropbox_${key}`);

      // Update hidden input — JSON array of links
      hiddenEl.value = JSON.stringify(arr.map(f => f.link));

      // Update header text
      if (arr.length > 0) {
        field.classList.add('has-value');
        pathEl.textContent = `${arr.length} ảnh đã chọn`;
      } else {
        field.classList.remove('has-value');
        pathEl.textContent = 'Chưa chọn ảnh...';
      }

      // Render file tags
      tagsEl.innerHTML = arr.map((f, i) => `
        <div class="file-tag">
          <span title="${f.name}">${f.name}</span>
          <button onclick="removeFile('${key}', ${i})" title="Xóa">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    // ── Xóa 1 file khỏi danh sách ──────────────────────────────
    function removeFile(key, index) {
      state[`dropbox_${key}`].splice(index, 1);
      syncMultiField(key);
    }

    // ── UI helpers ─────────────────────────────────────────────
    function setFieldValue(key, displayText, value) {
      const field = document.getElementById(`field_${key}`);
      const path  = document.getElementById(`path_${key}`);
      field.classList.add('has-value');
      path.textContent = displayText;
    }

    function clearField(key) {
      if (key === 'zippy' || key === 'pajama') {
        state[`dropbox_${key}`] = [];
        syncMultiField(key);
      } else {
        state[`dropbox_${key}`] = null;
        document.getElementById(`dropbox_${key}`).value = '';
        document.getElementById(`field_${key}`).classList.remove('has-value');
        document.getElementById(`path_${key}`).textContent = 'Chưa chọn file...';
      }
    }

    // ── Submit ─────────────────────────────────────────────────
    async function submitForm() {
      const ad_set_name = document.getElementById('ad_set_name').value.trim();
      const url_zippy   = document.getElementById('url_zippy').value.trim();
      const url_pajama  = document.getElementById('url_pajama').value.trim();
      const dropbox_print_image = document.getElementById('dropbox_print_image').value;

      // Validation
      if (!ad_set_name) return showStatus('error', '⚠️ Vui lòng nhập Ad Set Name.');
      if (!url_zippy)   return showStatus('error', '⚠️ Vui lòng nhập URL Zippy.');
      if (!url_pajama)  return showStatus('error', '⚠️ Vui lòng nhập URL Pajama.');
      if (!dropbox_print_image) return showStatus('error', '⚠️ Vui lòng chọn Print Image từ Dropbox.');
      if (state.dropbox_zippy.length === 0) return showStatus('error', '⚠️ Vui lòng chọn ít nhất 1 ảnh Zippy.');
      if (state.dropbox_pajama.length === 0) return showStatus('error', '⚠️ Vui lòng chọn ít nhất 1 ảnh Pajama.');

      const payload = {
        ad_set_name,
        url_zippy,
        url_pajama,
        dropbox_print_image,
        dropbox_zippy: state.dropbox_zippy.map(f => f.link),
        dropbox_pajama: state.dropbox_pajama.map(f => f.link)
      };

      showStatus('loading', '<span class="spinner"></span> Đang gửi đến n8n...');
      document.getElementById('submitBtn').disabled = true;

      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          showStatus('success', '✅ Đã gửi thành công! Workflow n8n đang chạy...');
          // Show payload sent
          const preview = document.getElementById('payloadPreview');
          preview.style.display = 'block';
          preview.textContent = '📦 Payload đã gửi:\n' + JSON.stringify(payload, null, 2);
        } else {
          const errText = await res.text();
          showStatus('error', `❌ Lỗi từ n8n (${res.status}): ${errText.slice(0,120)}`);
        }
      } catch (err) {
        showStatus('error', `❌ Không kết nối được n8n: ${err.message}`);
      } finally {
        document.getElementById('submitBtn').disabled = false;
      }
    }

    function showStatus(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = `status ${type}`;
      el.innerHTML = html;
    }
  </script>
</body>
</html>
